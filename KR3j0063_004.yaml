body:
  text: 疑耀卷四明張萱撰圖書生剋有盛必有衰有進必有退有存必有亡余於河圖洛書得之河圖左旋生數也洛書右旋剋數也一生一剋天地且不能違而況於人乎故河圖洛書相繼而出天地之情見矣雲列祀典雨以潤物有雲乃有雨據祀典皆有功于民物者也古人止祀風雷雨而不及雲豈以雨雲相因祀雨即祀雲耶至我朝始兼風雲雷雨而並祀之又至世宗乃易風雲雷雨之序而曰雲風雨雷以雲為首祀是雲之為神不知歷幾萬劫幸遇我世宗始大遇也亦竒矣哉附徐司馬鑾議易屯象稱雲雷屯以坎不言水而言雲明雲之氣即雨也嘗登髙山雲氣濛濛然與雨無别然此乃為雨之雲如卿雲五雲之雲又自不同古人以雲紀官太史分至啓閉必書雲物為備則昭代列于四祀之首於義誠是拜帖不古余閲一小説古人書啓往來及姓名相通皆以木竹為之所謂刺也至宋時王荆公居半山寺每以金漆木版寫經書名目往寺僧處借經時人遂以金漆版代書帖已而恐有宣泄又作兩版相合以片紙封其際久之其製漸精或又以縑囊盛而封之在宋時南人謂之簡板北人謂之牌其後通謂之簡版至淳熙之世朝士乃以小紙髙四五寸濶尺餘相往來謂之手簡市中遂製手簡紙賣之而竹木之刺廢矣今之拜帖用紙蓋起于熙寧也余謂簡札用紙其來已久矣馮盛嘗誚盧杞提三百綾文刺為名利奴郤愔遣箋詣桓溫子超取視寸寸毁裂若竹木之刺何稱綾文又寧堪寸裂耶意東漢造紙後簡札之制已為之一變矣王沂公取殘柬裂去前幅以遺孫京是時書帖已有長餘但不如今之侈耳其以金漆版代書帖特取一時之便倣古制而為之決非古制至此時猶存也若從前未有書帖何言代乎吳質答子建書發函伸紙文帝與劉楨書獲纍紙之命此漢魏間語尤可證但其製止濶尺餘而已今用七八摺為全柬者是後人積奢之所致也余嘗見楊公士竒一帖其紙即今長安中之連七紙最粗惡者亦僅三摺面上一紅籖僅如筯姓名之字僅大如指頂其所語事即書於左不用今之副啓而其字草書蓋真迹也今用副啓聞亦起於世廟末年書名字大則近見今日凡京朝官其字至多與政府相等此亦士風之不古也東坡前定天之生賢不與庸衆同者才與位而已二者兼全十不得三故與角去齒亦乘除之數也蘇東坡志林韓退之磨蝎為身宫而已以磨蝎守命故平生謗譽略同及南海謫還有問其艱苦者坡曰少時入京師有相者云一雙學士眼半箇配軍頭然則公之流離顛沛不獲安於大位者固才大不容而於星相二説亦前定之矣噫與角去齒豈惟坡公佛經不真余嘗疑佛經五千八百卷皆華語不知凡經幾譯乃成亦不知與佛所説同否孰從而辨唐顯慶中玄奘譯經帝勑于志寧等監譯有勑曰特為看閲有不穩當處即隨事潤色之是今之經典中多有中國人潤色處未必一一皆佛説也經語未必皆出於佛而欲以經語作佛此與按圖索駿何異通家之稱今人朋友相知往來皆稱通家宋以前已然但汪彥章誡其子恪曰自吾父及汝三世矣未嘗與人通家往來夫家者妻也妻者自娶之為後嗣計耳豈可以娛他人稱通家耶余思通家二字施於往來外姓委不雅觀然相沿已久難於頓革也莫愁莫愁樂古樂府及唐書樂志樂府解題皆謂出於石城樂以石城有女子名莫愁也石城皆謂金陵之石頭城故金陵亦有莫愁湖宋曾三異以石頭城在楚之郢中而漢江之西岸至今有莫愁村及閲統志金陵故無莫愁湖是三異之説亦有據也三異又云曾見莫愁之像有石本衣冠甚古乃古之神仙者流非女子也郢中倡女常有自名為莫愁者甚為僣瀆是以莫愁為女子其誤已久矣石城晉杜預第在今承天府即古竟陵也樂府石城樂臧質為竟陵郡時所作是為荆楚西聲莫愁樂亦西曲也今漢江西有莫愁村志云盧家女善歌謠嘗召入楚宫古辭云莫愁在何處莫愁在城西又云聞歡下揚州相送楚山頭唐人詩莫愁魂散石城荒又村近莫愁連竹塢人歌楚些下蘋洲則莫愁為楚女明甚今金陵莫愁湖在三山門外相傳有妓盧莫愁家此或後代倡女慕莫愁名好事者因其人以名湖而竟陵之與金陵石城之與石頭城又易訛也即金陵有莫愁當是兩莫愁矣又樂府解題云古歌有莫愁洛陽女則是有三莫愁矣李至有功名教前代俳優之輩多有以吾孔子為戲至宋至道二年重陽皇太子諸王宴瓊林苑教坊有以吾孔子為戲者賓客李至言唐太和中樂府以此為戲太宗笞伶人以懲無禮魯哀公以儒為戲尚不可況敢戲及先聖乎太子歎其言而止之此戲遂絶若李至者誠有功於名教也假葬今俗過信堪輿多停捾於土上以磚石甃之至數十年逺猶不瘞埋者徽郡為甚余閲通典亦有假葬三年即吉除服議晉郤詵母亡便於堂北壁外下棺謂之假葬三年即吉衛瓘以其不應除服而議之是假葬雖聞於古然而非禮也今有數十年不下棺而子孫除服從吉仕宦者可令衛瓘見乎建文還京建文帝之老而還京也廣西通志正統五年帝在思恩州自言於知州岑英轉聞巡按御史奏驛送赴京嘗留題四詩於橫州南門夀佛寺貴州通志則以所題四詩乃在金築長官司羅永菴與鄭曉吾學編同余意當以貴州志為正且帝之還京在天順年間而正統五年有僧自稱為建文帝者乃姦僧楊行祥也廣西志書正統五年帝還京其失於考訂如此壇醮之始僧道二流道士之名先見太霄經云周穆王因尹軌真人制樓觀遂召幽隱之人置為道士平王東遷洛邑置道士七人漢明帝永平五年置二十二人是時佛方入中國也趙與時謂用道士設醮祈福延夀則漢建安二十四年吳將吕蒙病孫權命道士於星辰下為請命是設醮之法始于此亦周公金縢子路請禱遺意余謂唐陳羽詩云漢武清齋讀鼎書內官扶上畫雲車壇上月明宫殿閉仰看星斗禮空虛是設醮祈請漢武已有矣非始於吳孫權也地下有世界西僧利瑪竇嘗謂余言天上有一世界地之下亦有一世界皆如此世界聞者多以為幻妄余閲酉陽雜俎有人掘井深已倍于常井數丈不見水忽聞向下有車馬人物喧鬨之聲近如隔壁出以告州將將遣人驗之不誣欲奏其事恐涉於怪而止遽令塞之是瑪竇之言亦似有據也周禮大司樂辨周禮大司樂所載大祭樂止有四音而無商音鄭氏注曰祭尚柔商屬金剛也故不用商此傅會於內事外事剛日柔日之説也賈公彥亦從之先儒乃為之説曰周以木德王商之金能尅木故諱而不用余謂楚固失之齊亦未得也夫五德之運起於後世讖緯家周公制樂時未聞其語且司馬史周武王伐殷時有火自上復于下至于王屋流為烏其色赤故先儒皆謂周以火德王是木王諱金不足據矣宋儒又有言鬼神畏銅商屬銅故佩玉之聲中商律者不用尤為臆説余不知樂苐以樂志諸書細按其圖有正聲有子聲有變聲太蔟在少商調中者即黃鍾之商也特用太蔟之子聲子聲者正聲之半也故曰少商夫五音之全易辨也其半而為少為子又為變難辨也周樂奏於圓丘者圜鍾為宫黃鍾為角太蔟為徵姑洗為羽奏於方澤者函鍾為宫太蔟為角姑洗為徵南吕為羽奏於宗廟者黃鍾為宫大吕為角太蔟為徵應鍾為羽或皆自其正聲言之未及詳述其子聲耳故熊朋來謂大司樂未嘗無商而闕商聲者特不用於起調與畢曲也似亦得之然謂更代易世俗樂不知改作如唐以土王不知去角而但因周禮亦闕商宋因唐制亦闕商此又偏信五德之説者也宋樂書注引琵琶如夢人授譜始有湘妃怨哭顔回二曲皆徵調近代俗樂原無徵調亦猶大司樂之無商也夫五音十二律循環相生原無間斷此乃天地自然之妙凡一律中既有正有子有變而十二律之為正為子為變者亦皆含焉一毫無所增減乃可成律倘周公作樂果不用商必且參差不齊豈能與黃帝之雲門咸池堯之大章舜之大韶禹之大夏湯之大濩叶奏一堂以供六祀哉夫六代之樂五音皆全而謂叶六代之樂者五音有不全乎故余謂周樂雖止四音而五音必無不全之理即其上文亦曰凡六樂者文以五音矣又何疑焉古人文字簡要特舉其槩鄭氏未及細詳遂謂無商而疑於剛柔之説後人又疑於鬼神五德之説此皆強作解事者也夫樂以象德也余聞之賓牟賈問武樂於孔子遲之遲而又久何也孔子曰病不得其衆也又曰恐不逮事也又曰久立於綴以待諸侯之至也又曰周道四達禮樂交通則夫武之遲久不亦宜乎夫商屬金屬義屬言其聲明而敏與武王病不得衆恐不逮事而舒緩以待諸侯之意稍乖故周公制樂尚遲久而嫌敏急不以商之正聲為宫耳謂之無商聲不可也又嘗退而求樂歌先儒謂欲知樂者先須識等子今按周之樂歌載在三百篇者試以四聲等子韻之則又專用宫商徵羽夫歌與奏相合乃為樂歌有商聲而奏可無商聲乎故余謂周樂之未嘗無商也於此益明獨角之一聲則樂歌始終不用此又何説焉自古制樂者其五音十二律皆起調於宫音蓋宫者五音十二律之君也周樂祭天則以黃鍾之羽起調祭地則以太蔟之羽起調至祭宗廟則雖黃鍾為宫而其起調亦黃鍾之羽非黃鍾之宫也夫黃鍾為君律宫為君聲起調即無君而入調雖有君又為他音所役是尊臣而抑君也説者又為之説曰羽水也周以木德王水能生木故皆起調於羽君弱臣強已兆于此周公聖人豈其智有不及或者天定之數聖人亦且安之未可知耳余又不敢以為然也孔子之對賓牟賈亦曰有司失其傳久矣周衰諸侯僣竊又皆去其籍禮樂之制蓋殘闕不完復經秦火樂比禮更為殘闕漢孝文時得魏文侯樂人竇公者年百八十嵗兩目皆瞽獻其書乃周官宗伯之大司樂也夫以數百年之簡帙出於一瞽人之手能保其無殘闕乎大司樂之旋宫不相管攝今太蔟為徵又復重出其為錯簡明甚漢初諸儒尚能習禮而習樂者則寥寥無聞周禮一書多出漢儒手稍得其影響輒附會之大司樂所載必非周公當時之制抑當時五音十二律其上下損益相生及四聲之韻與今或當微異後世以今人音律求古音律豈能一一皆合乎且上下損益相生其為隔八無疑而先儒又有謂周樂皆隔五易律者是今人求今人尚覺矛盾況以漢儒求周制乎故樂歌闕角必别有義亦斷非五行之説若起調以羽不以宫安知今之所謂羽即周公所謂羽乎羅長源有言後世黃鍾安知非古大呂後世應鍾安知非古無射故薑夔議樂請各用本均宫角徵羽正謂此也然其稱為角為徵為羽可見古人已備六十調矣故謂周樂皆以羽起調者余又不能無疑也或曰天地元聲豈以世代變易子謂五音十二律古今微異者此亦臆説余曰説則臆矣不觀之詩乎詩三百篇先儒謂皆可被管絃者朱晦菴乃言三百篇中可被管絃止數章此既異矣先儒有以等子韻譜取三百篇字字韻之竟無一章合律者孰謂古今人音韻一一同哉夫人之聲固萬有不齊總之止有五音而已律且有八十四矣人之聲能有八十四音乎故古之聖人所稱聲為律者止禹一人是自禹而外即聖人之聲亦未皆一一合律也蓋五音十二律既有正有子有變而三聲之中有老有少有次又有老之老有少之少有次之次故曰五音之變不可勝窮也夫等子於五音亦足以盡變者尚難以叶三百篇具在之詩當漢儒時即平上去入四聲尚未立而遽信其所附會影響者謂聖人之樂果闕商闕角且以兆弱君也何其過信漢儒輕疑聖人哉余讀書不多讀樂書尤不能多故臆説如此以俟知樂者是正焉附徐司馬鑾議古樂殘缺莫甚於今博士家絶不置談況有能尋其聲數正其訛誤益寥然矣周禮大司樂分樂而序之黃鍾一均以祀天神太蔟以下五均以祭地祇祀四望祭山川饗祖妣蓋調五聲兼八音而有之其云祭祀樂無商聲者則五氣不備髙下奪倫安在為樂鄭氏之謬蓋泥于圜鍾為宫以下三段有宫角徴羽四聲而無商音與上文不同因槩疑祭祀歌奏皆不用商而後儒附會其説引五德相勝益增其妄蓋此為圜丘方澤及禘夾三大祀降神之樂凡祀皆有樂降神後合樂而奏之三大祀為重故迎神至六變八變九變若他祀樂則無此數注中所謂各以聲類求之是也其云本宫相生為角徵羽有用有避者非也蓋降神之樂既與六樂不同作者明取别義如圜鍾得房心之氣是為大辰帝之明堂故首奏之以降天神函鍾輿鬼之分是為天社坤之門户故首奏以出地示黃鍾虛危之宫是為宗廟故首奏以迓人鬼各以其類以合神明之德即鼓鼗孤竹雲和之類亦與八音稍殊明為降神而作矣若夫四聲無商如鄭注以祭尚柔商音堅剛不用推之旋宫之法並無一合朱晦翁亦嘗非之據晦翁説以為此自四樂各舉其一如黃鍾一宫次太蔟為徵即林鍾為宫應鍾為羽即大蔟為宫太吕為角即南吕為宫之類然圜鍾一宫再奏黃鍾為角係夷則宫又奏太蔟為徵姑洗為羽俱在林鍾宫無取相生之次第又非音節之和諧其理終不可解即朱説亦未為得也愚謂聲氣之和生于人心符于理數樂律長者聲濁而髙短者聲清而下宫聲最濁損之為徵次清益之為商次濁又損之為羽最清又益之為角居清濁之中相生者一髙一下相比者自髙及下取唱隨子母之義三大祀者天陽而健純粹以精數竒而圓其知大始圜鍾隂律以帝之明堂奏之以道和氣次黃鍾太蔟姑洗居子寅辰始于一陽極于三陽陽明用事相間各一律律遞減一寸吹之而和調俱含宫象天德也地道柔剛含𢎞光大數偶而方萬物資生林鍾得坤之本位隔八而上生太蔟太蔟隔八而下生南吕南吕隔八而上生姑洗四維之氣已備以姑洗律長于南吕故後生而先用法地道也人者參天兩地兼隂兼陽相得有合順位成章黃鍾起于虛危其位屬子子與丑合間以大吕太蔟寅氣寅與丑合和以應鍾黃鍾律之始應鍾律之終四德無所不統立人道也合三樂凡十二律以足十二辰之數以分祀天神地祇人鬼其義甚著圜鍾六變一天之始五天之中也函鍾八變二地之始六地之中也黃鍾九變人參三才三三而九也奏既四律故音取四聲為義其實奏曲時五音及變聲子聲髙下相從當無不備不然則不成調矣然則剛柔五德之説不足深信甚明唐太常祖孝孫制有十二和其饗圜丘以黃鍾祀方澤以林鍾祭宗廟以太蔟既與三樂稍别協律郎張文收乃復採三禮仍用圜鍾祀天函鍾祭地黃鍾祫禘樂曲凡四又似合樂不但為降神之奏蓋古樂之亡久矣乃若宫聲起調于羽其説難明五聲中羽為物以羽役宫為以臣役君非其本義沈存中云君臣民不可相凌事物則不必避余意猶非之蓋旋宫也者即潛宫也古人以其遞相生為旋其實太和元氣潛行于十二辰之內黃鍾潛行于十二律之中無時間斷唯是管長聲濁髙下難諧故有半聲變聲以合其節豈以尊君抑臣故諱避之哉試推旋宫圖起黃鍾宫至夾鍾為羽凡五十五律而調畢奏一闋復起宫音以七聲按之大不踰宫細不過羽羽上生宫音調不諧故黃鍾以應鍾為變宫收之上生無射之宫然則起調以羽入調以宫或以貞元相生之序言之而訛以為周樂皆起于羽為臣弱君之兆乎若夫樂歌之闕角也三百篇之不盡協律也竊謂作者當以意求之書云聲依永律和聲歌咏樂章或朝廷所製或太史所陳豈能一一盡中宫商在登歌者自當隨律髙下依律以和聲不當移律以就聲如今之譜曲子句字不同而調同況雅樂乎四聲七音等子來自西域濫觴于李登沈約輩大備于宋儒中間有其理可信者有甚非其理而必不可信者可信者四聲為經即一宫一徵一商一羽聲止于四故不及角也七音為緯則宫商角徵羽半商半徵備焉古詩歌多四言疑無角聲以此蓋四聲之虛角亦猶三樂之藏商也以宫商角徵羽為次宫可含商以宫徵商羽角相生為次則角聲半清半濁行乎其中合之則無不備矣等子必不可信者必字字如聲乃為合律或有聲無字至強造字以傳會之或上去二聲相犯者則一音别為二義以活字為上聲實字為去聲支離穿鑿沈休文自不能解後人遵之若金科玊條可發一噱況欲以此定樂則三百篇不當盡付之祝融乎等子韻甚欲别著一論闢之樂律之辨不敢附于知者姑述其胸臆以請是正于大方如此帝王簪珠翠今制冕旒皆綴以珠寶獨不用翠福府畢姻余見王簪翠花兩枝此婦人之飾也頗以為疑及詢諸內侍皆云朝廷嘗簪之此亦有所倣魏明帝好婦人之飾冕旒改珊瑚珠晉元帝嘗以翡翠飾冕帝王服飾乃爾檮杌檮杌惡獸楚以名史主於懲惡又云檮杌能逆知未來故人有掩捕者必先知之史以示往知來者也故取名焉亦一説也雞口牛後之誤蘇秦説韓寧為雞口無為牛後今本國䇿史記皆同惟爾雅翼釋豵篇寧為雞尸無為牛從尸主也一羣之主所以將衆者從從物者也隨羣而往制不在我矣此必有據且於縱橫事相合今本口字當是尸字之誤後字當是從字之誤也晏安鴆毒之誤左傳管仲語齊桓公以救邢曰晏安鴆毒不可懷也余見一書晏安作燕安燕處堂幕知安而不知危者燕安二字甚當今作晏安乃燕之訛也因知鴆毒之鴆亦當作鴆鴆乃毒鳥上曰燕安下曰鴆毒句中的對後人作鴆亦鴆之訛耳觷剒雕字爾雅釋器象謂之鵠角謂之觷一本作鷽犀謂之剒一本作鵲玊謂之雕一本作雕四者皆取鳥名豈古字皆相通耶抑别有據也窖養花木今京師入冬以地窖養花其法自漢已有之漢世大官園冬種蔥韭菜茹覆以屋廡晝夜􅀈煴火得溫氣諸菜皆生召信臣為少府謂此皆不時之物有傷於人不宜以奉供養奏罷之但此法以養菜蔬未言養花木也今內家十月即進牡丹亦是此法計其所費工耗每一枝至數十金但在漢止言覆以屋廡而已今法皆掘坑塹以窖之蓋入冬土中氣暖其所養花木借土氣火氣俱半也蘦苓字相通蘦即苓字與蓮字通龜䇿傳龜千歲遊蓮葉之上徐廣曰蓮一作苓聲相近借字也苓小草龜老而神其形轉小故能遊於小草之上若水中之蓮凡龜皆可遊不足竒矣又詩采苓以首陽之巔叶之是蓮亦有苓音也治亂甘苦黑白以亂為治以苦為甘故甘草名大苦禮記疏牽牛三點黑名為三點白介雞左傳季郈之雞鬬季氏介其羽爾雅翼作芥其羽謂以芥菜之芥播其羽也必有所據但未詳其義鬱鬯之辨古者釀酒以黑黍為上其色必黑祭祀用鬱草和之者以鬱草黃色故酒色黃而且香詩所謂黃流在中以其酒色黃而且流動也今又乃以黃色為酒品之惡者與古異矣又絶無以鬱草和酒豈其法不傳耶若酒之不和以鬱者又名為鬯是黑黍之酒即鬯也若加以鬱乃名鬱耳説文解鬯字乃云以秬釀鬱草是鬯亦可以兼鬱自鬱與鬯對言之則當致其辨耳虉字辨詩卭有旨虉旨虉小草五色似綬故名綬草詩言欲有文采具備以成調理之臣如虉者不戕賊之而後得也但鳥名亦有虉亦名綬故古本爾雅釋鳥有虉綬與釋草虉綬同文羅願遂以詩之旨虉為鳥與上防有鵲巢為偶謂鵲善相地而後纍巢若有驚懼則不纍也虉善相天而後吐綬若有戕賊之疑則不吐也此説亦有據但謂之旨虉則似是屬草蓋旨與旨畜之旨相同此草亦可食故云旨若是鳥未聞可食不應言旨矣苐未得詩之善本以正之若旨虉之虉從草其為草無疑不從草其為鳥無疑今世所行詩及字書皆混亂故無由辨之而諸説紛紛也無廉恥做得尚書長安中有一士人醉酒跨驢遇一八座於中衢不下驢引避𨽻人叱之此士人亦大相叱八座呼而問之士人生員也八座曰既是生員當有廉恥如何醉酒撒潑如此士人笑曰公乃無廉恥耳八座曰我如何無廉恥士人曰若有廉恥如何做得到尚書一時喧傳絶倒因憶杜有道妻嚴氏嘗以書與從子預有曰諺云忍辱至三公卿今可謂辱矣能忍之公是卿坐此亦無廉耻乃做得尚書之意也孔子采詩不及楚楚詞屈原諸作有用韻者有一二句即改韻者有全篇不用韻者當原之時四聲之學尚未出或皆用當時土語自可相叶後人以今所行韻語讀之自不可叶耳但三百篇在原之先而以今韻叶之又無不通楚之土語豈真南蠻鵙舌之音耶先儒以孔子采列國之詩為國風獨不及楚為疑余意楚在當時亦有詩可采或亦如離騷之用土韻不可施於管絃故孔子不之采耳有謂孔子修春秋以夷狄待楚故不采其詩是亦一説然秦亦猶楚也而秦風十篇尚序於豳風之上豈以平王東遷之時秦仲之孫能以兵送亦能尊王者不如楚之僣王耶三十六奉朝請陶𢎞景與從兄書仕宦四十左右作尚書郎即抽簮髙邁今三十六方作奉朝請頭顱可知不如早去余今將五十矣始作尚書郎仰望古人殊為低首詞人用事詞人用古事多有錯誤者王介甫桃源行望夷宫中鹿為馬秦人半死長城下二世致齋望夷宫在鹿馬之後長城之役乃始皇非二世也惡獸為名鑿齒乃惡獸名與檮杌同類余怪晉習主簿以之為名未審其意北魏元義名夜義弟羅名羅剎夜義羅剎皆食人之鬼亦以為名何也佛不度女人劉晝與髙歡書尼與優婆夷實是僧之妻妾損胎殺子其狀難言今僧尼二百許萬并俗女向有四百餘萬六月一損胎如是則年族二百萬户驗此佛是疫胎之鬼也大藏律文佛告諸弟子汝慎勿妄度沙彌尼女人恣態難保恱在須臾以後佛生惡意不真菩薩不可妄度是尼之醜行亦佛之所惡也上林羽獵二賦司馬相如上林揚雄羽獵二賦膾炙千古北齊楊斐謂離係以隤墻填壑亂以枚置落網而言無補於風規祗足昭其愆戾亦是名言風流罪過北齊郎基常語人曰任官之所木枕亦不須作況重於此事唯頗令寫書潘子美以書與之曰在官寫書亦是風流罪過余居京師别無所作止是乞俸寫書罪過多矣基答潘曰觀過知仁斯亦可矣未審京師中有能觀仁者否佛經恐非西來大意余嘗疑今中國所行佛經皆經數譯而後通中間不無乖其本旨者偶閲鳩摩羅什與慧壑書天竺國寶文製倡頌宫商體裁以入絃為義今改梵為秦失其藻蔚雖得大意殊隔文體有似嚼飯與人非徒失味乃令嘔饖也今之經卷果皆西來大意乎余不敢信矣仙書皆偽筆西王母訊上元夫人書云比不相見四千餘年西王母答云遂替顔色逮五千年不知所云年數如人間甲子耶不知西王母者開闢之初即有之抑生於中古也其書乃作今人筆其偽無疑且上元夫人書云先被太帝君敕使詣玄洲校定天元正爾暫去如是當還還便來席願暫少留麻姑報王方平書亦云先受命按行蓬萊今便暫往如是當往還便親覩願來即去其體裁相同是上元夫人麻姑書皆偽襲也仙宦非共途許長史穆精心仙學似非凡胎者保命君嘗示以書而引漁陽田豫鐘鳴漏盡之語以責之定録君亦責其不即褰裳乃知仙宦原非共途今逐逐緇塵耽耽青紫猥談玄學真癡前説夢也陶淵明乞食陶淵明恥以五斗折腰遂至貧而乞食有詩曰出門拙言詞王摩詰與魏居士書謂陶是屢乞而多慙也嘗一見督郵安食公田數頃一慙之不忍而終身慙乎孔子曰我則異於是無可無不可鄙哉摩詰宜其困辱於安祿山也終身之慙豈在乞食哉道學可護短王槐野與王立道書云傳言公今講學棄去文詞不理此近代道學自護其短之巧術乃公奈何效之此誠不易之論講學者可以愧矣薑維母書楊用修纂尺牘清裁凡十一卷王元美謂其挂漏增至二十八卷梓成復搜得四十條附之于後因識之曰令劉孝標陸澄為之當免此元美自謂可無遺漏矣余檢晉書五行志復得薑維報魏人書一章云良田百頃不計一畝但見逺志無有當歸時魏人獲維母令維母手書呼維以當歸譬之故維云云此元美所未及收也天問可疑孟子言堯殛鯀於羽山殛者殺也屈原天問永遏在羽山夫何三年不施是堯未嘗殺鯀特流放之而不赦耳又齊桓公以羣公子爭位身死不斂未嘗見弒今天問云齊桓公九會卒然見殺是鯀本見殺而謂之不殺桓本未弒而謂之見弒豈别有所據乎余按屈原天問今所行者王逸章句耳逸謂天問文義不次多竒怪之事司馬遷論道既所不逮劉向揚雄亦不能悉逸則稽之舊章合之經傳為之符驗事事可曉余未敢盡以為然也此文既云原觀壁間圖畫而作是事為一説當時未必相綴屬者原沈江後後人乃采而綴之故文義不次耳讀者亦宜逐段讀不宜總作一篇也但其事竒譎或亦疑誤相半未必皆原舊作元微之詩元微之放言五章余讀之殊未見佳處白樂天乃謂其韻髙而體律意古而詞新雖前輩深於詩未有此作豈古人評詩止以意不以詞耶元白皆無兒元白齊名且相友善白公無兒世皆知之微之亦無兒世未知也微之整比舊草以詩寄樂天云天遣兩家無嗣子欲將文集與他誰九歌楚詞九歌實十一篇乃知九者非篇數也或云九者陽數之極故陽九乃否極之會屈原取以名篇自喻其不得志之極也此亦有理禹娶四日即治水禹娶塗山氏以辛酉日娶甲子日即出而治水八年於外是新婚四日即有啓也荆公不事修飾王荆公禾遇時蓬頭垢面世多疑其為詐居政府時侍朝有蝨自荆公襦領而上直緣其鬚上顧之甚笑公不知也朝退同行王禹玉指以告公公命去之禹玉曰未可輕去請一言頌之曰屢遊相鬚曾經御覽荆公為解頥乃知荆公亦不事修飾者疑其詐則過也古今兩羿古今善射必稱羿但有兩羿一在夏弒夏后相者一在堯時射河伯妻洛妃者詳楚詞天問注西北水田今人欲於西北種水田此非創為説也唐王建水運歌有云逺徵海稻供邊食豈如多種邊頭地即此意也詩文顯白古奧典謨之文三百篇之詩為萬世詩文之祖者以其古而能奧也然於述事説理又未嘗不顯白若歐蘇之文元白之詩則一以顯白為主殊無一毫古奧意何以為詩文古無騎字古人畜馬唯以駕車未有單騎者故古經典並無騎字至六國時乃單騎馬惟曲禮前有車騎蓋禮記乃後漢書也露筋廟辨今髙郵州露筋廟世傳有兩女子過此遇夜一女入宿於人家一女貞潔不肯入宿宿於門外遂為蚉蚋所嘬抵曉露筋而死余嘗疑之蚉蚋雖猛豈能嘬人至死此女即貞潔亦豈能忍受此蚉蚋不自搏拂耶偶閲酉陽雜爼乃云江淮間露筋驛乃一醉人宿其處為蚉所嘬江德藻北道記邵伯閘露筋梁故老云有鹿過此一宿為蚉所食至曉見筋則今所云貞女露筋者乃後人傅會以惑人也苐淮揚之間俗涉溱洧後人傅會露筋以為貞女夫亦有所風耶儒釋不必相援使釋迦生中國設教當如周孔是周孔書中自有釋教儒者何必談佛使周孔生西方設教亦當如釋迦是釋教書中亦自有儒教釋者何必援儒宋玉招魂宋玉招魂為屈原而作是時屈原尚未沈江宋玉見其放斥愁悶恐其魂魄先已散去其身不能久存故招其魂使反於身非如今人已死而招其魂也二王書法二王書法妙絶今古大小想皆入神梁髙祖答陶𢎞景論書謂逸少書無甚極細者即樂毅論乃微粗健恐非真迹晉梁相去不逺而二王極小之書已不可復見矣余謂二王書即大如拳者亦不復見何也韋文休曰二王書自可稱能未是書也此必有説陶𢎞景又謂王逸少自吳興以前書猶未稱凡厥好迹皆是向會稽時永和十許年中者從失郡告靈不任以後略不復自書皆使此一人世中不能别見緩異呼為末年書逸少亡後子敬年十七八全倣此人書故遂成與之相似乃知今世所傳右軍遺迹不知是真是偽但陶公所云此一人竟闕其姓名可為遺恨丙午丁未俞文豹吹劒録凡丙午丁未年中國遇之必災故宋時有術士上丙午丁未龜鑑謂自秦昭襄五十二年迄五代凡二十一次其年皆不靖宋南渡丁未髙宗渡江淳熙丁未髙宗上仙獨淳祐丁未則無他異惟自夏迄冬不雨所在湖陂河井枯竭蓋丙午丁未在天之中丙丁屬火皆在丙午旺鄉五行中惟水火不宜旺旺則不可救藥非有興王盛德未易當也故大撓作甲子於丙午丁未為天河水以水能制火也戊午己未為天上火以戊巳土蓋其上則火不能熾也他不暇引宋以丙午丁未而元代之元以丙午丁未而我太祖興焉故有丙午丁未而天下或無大故者未有大故而不值丙午丁未者也天行之數亦可畏哉老於宦途不能自引余嘗謂官尊年至者多繫戀爵位不能自決往往皆妻孥所從臾也白樂天戊申嵗暮詠懷有猶被妻兒教漸退莫求致仕且分司計其時已五十六七矣又云龍尾趂朝無氣力又云老病旁人豈得知以此光景而猶欲求分司不意此老亦為妻孥所從臾如此其次章云更擬躊躇覓何事末章云萬一差池似前事則亦心欲去而不能自決矣近代一大老年已望八復以三年考滿臺省露章劾其不知引年此老乃自疏罪謂忘其年豈亦有妻兒為從臾耶一笑一笑疑耀卷四
