body:
  text: 疑耀卷五明張萱撰蒼梧寄生酒五嶺之外絶無佳醖近遊宦者宴㑹皆嗜蒼梧寄生酒獨其性酷熱不宜多飲苐蒼梧之酒自古有之晉張華輕薄篇有蒼梧竹葉清陳張正見置酒髙臺上詩浮蟻擅蒼梧未審即此寄生酒否螬可療目孟子陳仲子三日不食耳無聞目無見及食井上螬食之李然後耳目始有聞見余嘗疑螬可以治耳目之病及閲晉書盛彥之母失明年久嘗撻其婢婢恨以灸螬啖之母食之美後以示彥彥乃抱母痛哭然母從此目復明則仲子之目既盲而復見者以食螬之李也因閲本草亦云蠐螬汁滴目中可去障翳孟子之言不誣矣朱考亭妄評杜詩杜子美有仰面貪看鳥回頭錯應人之句乃詩家上乘而朱考亭引之謂其為心不在焉則不得其正真可發笑何異癡前說夢乎阮宣子斂錢為婚晉阮宣子居貧四十餘未有室王敦等斂錢為婚皆名士也慕之者求入錢而不得固是宣子勝事然以王敦而與斂錢不無損於匪人豈當其時敦惡尚未著耶然其家思曠謝幼輿諸人皆逆覩之而宣子獨不知何也至其時有求入錢而不得者其人亦自有致宣子奈何拒之後王敦為鴻臚卿謂宣子無食鴻臚丞差有祿宣子竟從其命為鴻臚丞此與阿兄遙集不肯與溫太真同受顧命便跌一著且宣子素不喜見俗人遇即舍去何至與王敦周旋乃爾大不及其家思曠以酒廢職也然宣子固可兒何至向王敦作活其為鴻臚丞也豈如思曠所云既不能躬耕自活必有所資故曲躬為憂生計耶帝王諡號上古帝王皆無諡號堯舜禹湯是也至周公旦始立諡法諡其父為文兄為武然止一字而已秦始皇削去諡法止以一世二世為稱漢仍秦俗故諡亦一字然亦皆死而定名至唐乃生而加美諡多至十餘字以上者我朝雖死方易名然唯臣子二字若帝王則亦多至十餘字矣不意元俗尚猶近古太祖之諡不過六字太宗以下皆兩字獨秦王太師巴延者人臣也生前輒加美諡十四字夫考行定名是非毫不可掩豈以字之多寡為美惡哉元俗近古元俗帝王送終之具梡木二片鑿空其中類人形合為棺置遺體於中加髹漆畢則以黃金為圈三圈定送至直北寢園之地深埋之用萬馬蹴平俟草青方解嚴則已漫同平坡無復考志遺跡此亦古人不封不樹者之遺意也以詩句定人品李布政昌祺江西人卓爾不羣其行槩詳水東日記嘗作剪燈餘話詞雖近䙝而意皆有所指故一時搢紳多有心非之者其作彈琴記有江南舊事休重省桃葉桃根盡可傷之句亦皆寓言韓公雍按江西即以公有此書不祠鄉賢因憶王荆公集四家詩不録李白蔡天綮問其故荆公曰才髙識卑言酒色者十八九夫文人遊戲筆墨二李之遭王韓亦不幸矣滁地為南北要地滁州雖彈丸地亦逐鹿者所必爭也蓋淮南無山惟此州邊淮有髙山大川江淮相近處為淮南屏蔽去金陵才一水隔耳既得滁州不惟可斷中原南顧即淮南以北一望平原無復險隘足虞故宋太祖之受周禪也其威名起于清流關之斬皇甫暉我太祖之混一四海也亦起于滁州之首克孰謂地險不足恃哉樂律不講國朝文明之運敻出前古獨樂律一事置而不講韓苑洛邦竒嘗為樂書行于世然未有能講解而施行之者洪武中有山西都指揮郭敬解鍾律以水置食器中斟酌損益以箸擊之即合音調嘗聞教坊奏登降之樂愀然不樂或問之曰非爾所知當事者誠加意此事請開一樂律科安知無郭敬其人者出而應乎國初乘驢國初風俗淳朴搢紳在京師多有乘驢者如草木子載李公紀為治中嘗有詩云五品京官亦美哉腰間銀帶象牙牌有時街上騎驢過人道遊春去未回嘉靖初年觀政進士每三四人共賃一驢此風今不可復覩矣詩法四言詩自三百篇後絶無繼者獨韋孟稍近之漢魏而下詞既偶儷氣亦緩弱至顔陸諸篇大非風人之㫖茂先勵志淵明停雲雖云古質然尚不逮陳思王況雅頌乎故作四言者必以三百篇為法而五言古必取材于漢魏蓋建安諸子猶有古風特華采過之故渾厚不逮耳若潘陸陶謝則去漢逺矣五七言近體唐初沿陳隋之習雖音響鏗鏘藻思麗逸而風骨未備李杜王孟髙岑諸子繼作陶鎔變化集厥大成至於錢劉元白則涉于淺易而才力頗弱故作者罕尚焉淫亂之始淫亂之俗軒轅氏而下皆未有見者至夏少康時浞國之君娶純狐氏有子早死其婦曰女岐寡居澆强禦往求之女岐為其縫裳共舍而宿男女淫亂實自此始婦人遭亂婦人不幸而遭變亂為人所執者止有一死乃稱完節别無他說可自解者宋建炎間金兵犯廣陵有晏氏者元獻公殊四世孫女年十五從其叔孝純官廣陵廣陵破氏在俘囚中敵人欲脅而汙之不從或自經或投井皆以救獲免主母愛之撫育如己出年至三十一嵗猶無恙也節則節矣國破家亡乃偷生十五年欲何為乎王導遺誅楊用修謂王導非忠臣其說甚詳余按晉書導之罪猶未盡也晉周札為右將軍都督石頭軍事王敦反攻石頭札開門應敦故王師敗績敦以札為㑹稽內史時札一門五侯吳士貴盛莫比敦已憚之及敦疾錢鳳欲害札宗以自託沈克譛之於敦敦遂誅周氏襲札於㑹稽札率兵拒敦兵散而死後札故吏詣闕訟寃宜加贈諡卞壼議以札開門延冦不宜追贈郤鑒亦謂札宜從卞議獨王導數為申復當與周顗戴若思同例朝廷竟從導議追贈余謂開門延冦乃不臣之大者後雖中異殉身何足以贖壼鑒之議於是為正導乃以石頭開門為信敦匡救札所以忠于社稷然則敦之舉兵內向即以隗協干政為名亦豈忠于社稷耶夫敦之不臣何待周顗見誅而後見其罪即其向石頭時雖三尺豎子豈受其欺者以札而信其為匡救此不足責以導而亦云然大義滅親者不如是也當壼鑒議駁導乃抗顔爭之將誰欺乎且札兄之子曰筵者聞札開門納敦噴咤慷慨義形于色札既可以愧死而導乃以敦之入石頭為匡救以札之納敦為忠蓋導亦一札耳何以謝筵於地下哉時有周撫者嘗為敦從事中郎從敦俱反敦敗撫亡入西陽蠻中後因詔原敦撫詣闕請罪詔禁錮之而導乃用為從事中郎又何疑導之以札為忠也導之黨惡如此萬世其有遺誅乎陶侃被誣陶士行唱義於晉室板蕩之秋破石頭斬蘇峻誠為一時元勳獨史載其夢生八翼登天門九重至八閽者以杖擊之墜地折左翼及握重兵居上流潜有窺伺之志輒思折翼之祥自抑而止嗟夫一何誣乎自古誣人而不得者必汙以閨房之事以其難明故也晉史欲誣士行至加以夢寐中事其難明更甚於閨房者且士行實懷異志果有此夢正令自知人安得而知之其說固不攻自破蘇子瞻嘗言士行忠節可橫秋霜而貫白日余因按其行事始末生當浮虛之俗動而見尤一入仕途荆棘萬狀終日自運百甓於竹頭木屑間雖一束之穟亦經營不怠卒能恢廓才猷立功立事蘇峻之禍賊將害其子者馮鐵也鐵奔石勒勒收為戍將勒卒畏士行威名遂殺鐵勒嘗自負標置二劉之間俯視曹孟德司馬仲達顧憚士行若此梅陶稱士行機神明鑒似魏武忠順勤勞似孔明豈欺我哉當其義旗既建一麾東下子喪不臨直趨蔡洲一時勤王蔑有先者逮元勳克集實主齊盟乃退然不居旋師歸藩臣節益著夫坐擁八州精兵在握設士行而誠有不臣之思其改步猶反掌耳雖朝廷憚其勳名每加疑備而士行處之泰然末年卧疾封府庫而登舟舉愆期以自代視去方伯之重任如脫屣然其始終本末無一可議不臣之迹果安在哉獨覽庾亮之傳應詹之書則疑其跋扈觀溫嶠之舉毛寶之謀則疑其顧望毋亦行髙者毁來加以蘇峻之誅庾亮恥為之屈士行且溘先朝露後嗣雕零庾氏世總朝權秉史筆者能不曲徇今乃舍其灼然之跡而信其夢寐之言豈為善觀史哉青紙詔晉楚王瑋𫝊有青紙詔密詔也說者意以青紙為之用藥物作書以水浮即見如今人挾帶文字入棘試者於青布衣上以藥物寫文字臨時以水沃之其字立見也祿命家言祿命家言自周以來有之小雅曰天之生我我辰安在辰即所值嵗時日月星辰五行之吉凶也賈誼王充輩亦皆有祿命之說苐未知其術何若耳惟吕才者獨著論以深絶之至唐乃有李虛中嘗為侍御史始精其術以人之始生年月日時支干斟酌夀夭貴賤亦往往有驗即今所傳子平是也晉王導病令戴洋推算洋曰君侯本命在申而於申上之石頭立冶金火相爍水火相煎故受害導即移居東府病差不知其術與今同否余謂星相之家自有其理原非幻妄苐非如今之術士所能推測耳術可不信理可不信乎大都十而不能得六七不足以見造化十而不失三四亦不足以見造化之巧無論星相即醫術亦然初學之醫十亦能活二三人三世之醫十亦常失二三人是人之生死自有定數非醫之功亦非醫之罪也司馬遷論五音宫商角徵羽五音乃天地間自然相生者司馬遷以宫生角角生羽羽生商商生徵徵生羽羽生宫是反其所剋也豈别有說乎請以質之知樂者改元道藏中三一等經有平初太始元景延和赤明延康康泰龍漢開皇無極等號皆云上境年號然則上境亦改元耶何怪乎漢武帝可發一笑州里難行孔子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉余謂行於蠻貊者易行於州里者難也何者州里得之於常蠻貊得之於暫暫者易持而常者難勉也士固有為天下之通貴而不見齒於州里者可不慎哉漢昭烈顧命五帝官天下三王家天下法雖不同但毫無私意區别其間無非欲乂安天下而已漢昭烈與諸葛孔明經營西蜀以窺中原無非為興復劉氏耳昭烈既崩其志未遂嗣子劉禪昏愚暗弱雖有孔明亦末如何昭烈生前豈不知之晏駕顧命宜曰嗣子可輔輔之如不可輔則擇劉氏之賢者立之孔明王佐之才必有處此而劉氏興矣夫天下者髙祖之天下也凡髙祖之子孫皆得而有之何必拘拘於子禪乃為漢祀不絶耶昭烈智不及此乃曰如不可輔卿可自取是置孔明於嫌疑之地欲變而擇賢則天下將以昭烈之言而疑己欲不變則劉禪又不足與有為此孔明所以不能混一天下而漢祀遂斬也宋張文潜有詩永安受命堪垂涕手挈庸兒是天意足為孔明置詞矣更漏厯法自古重事至國朝卒無士人能究心者民間更漏晷刻毫不可據昔張忠定公數領郡事其寢室中必張燈炷香通夕宴坐郡樓更鼓必令分明倘一刻差誤必詰之守籖者治以罪今郡邑守令且有不知銅壺滴漏為何物者又安望其如忠定之更漏分明也學官國朝設官分職祗具空名惟郡邑學官為甚不肖者無論己即翩翩文采者亦僅以筆札給事上人為要務至於作養人才講解經籍二事則毫不經心余憶宋政和中有建言者見任教授不得為人撰簡牘樂語之類庶日力得餘辦舉業事以副陛下責任師儒之意故鄒公浩嘗為頴昌府教授范純仁為守嘗加禮重一日純仁欲鄒公為撰樂語鄒辭不為范曰翰林學士亦作此鄒曰學士則可教授則不可范改容謝焉余故表而出之以告廣厲學官者邵堯夫不娶邵堯夫四十餘嵗始娶至四十五嵗始生男有詩曰我今行年四十五生男方始為人父豈其幼年斷意婚娶至是乃念及不孝為大耶陳希夷常相种明逸不娶可得中夀明逸從之六十嵗卒古人不娶者衆矣若明逸者豈天欲其無後耶險字押韻詩家押韻遇險字雖宗匠亦難藏拙而近體押韻尤難他且勿論即杜少陵數押為字終不能佳送王侍御往東川此贈怯輕為從驛至東屯一學楚人為同舍弟宴書齊書齊能爾為宴楊使君東樓樂任主人為贈畢曜顔狀老翁為偶題排律餘波綺麗為皆足掩口世宗崇道教世宗晚年專事祠禱每有賞罰或聽於神嵗己卯周太常怡為給事中嘗疏斥時相嚴嵩翟鑾言甚剴切疏中有陛下日事禱祀而四方水旱未銷之語相嵩以間入詔廷杖下錦衣獄乙巳始以箕仙言釋之未幾又以熊尚書浹格營箕仙臺復逮怡丁未二殿災又釋之時京城中相傳上實聞空中有神語當釋三人謂御史富平楊爵工部郎中泰和劉魁及怡皆以言事同繫云怡寧國府人晉八伯晉時兖州八伯擬古八俊阮放曰宏伯郤鑒曰方伯胡母輔之曰達伯卞壼曰戕伯蔡謨曰朗伯阮孚曰誕伯余知之矣至劉綏曰季伯羊曼曰䵬伯不得其解時兖州又有四伯以擬四凶張嶷之狡妄曰猾伯羊𥅆之狠戾曰瑣伯擬之於凶彼固低首而以江泉之能食為榖伯也史疇之大肥為笨伯也亦以凶擬之能無反唇燈夕上元張燈太平御覽謂起於史記樂書曰漢家祀太一以昏時祠到明今史記無其文豈史記復有别本耶宋太宗朝又不獨上元張燈七月之中元十月之下元亦皆張燈故上元皆不禁夜至淳化元年庚寅乃詔罷中元下元張燈惟上元仍舊至今因之蘇東坡寓惠余嘗怪蘇東坡寓吾惠最久寓惠録所載一時邂逅止翟夫子羅浮道士二三人别無有交往者其文字書畫遍遺海內而吾惠絶無片紙隻字豈其時未有能識公者抑無一人足與言耶偶讀公答李端叔書曰得罪以來深自閉塞扁舟草履放浪山水間與漁樵雜處往往為醉人所摧罵輒自喜漸不為人識平生親友無一字見及有書與之亦不答自幸庶幾免矣乃知當時惠人士知公者固少即公亦且深自韜晦知希我貴豈不信哉韓昌黎登華山李肇國史補載韓昌黎嘗登華嶽之巔顧視險絶恐不可復下遂發狂痛哭因縋遺書為訣且譏好竒者之過華隂令百計取之乃能下宋沈顔為之說謂昌黎憤世之趣榮貪位者若陟懸崖險不知止故身危而踣蹶不知稅駕之所世儒亦信從之余謂不然趣榮貪位孰有過於昌黎者其登華巔而痛哭也誠有怖死之心乎及讀隱居詩話引昌黎贈張籍詩洛邑復休告華山窮絶陘倚岩睨海浪引袖拂天星日駕此回轄金天所司刑泉紳拖修白石劍攢髙青磴蘚澾拳局梯飈颭伶俜悔狂已咋舌垂誡仍鑽銘則沈顔之妄說益較著矣戴逵阮瞻晉戴逵善鼓琴武陵王晞使人召之對使破琴曰戴安道不為王門伶人阮瞻亦善鼓琴人聞其能多往求聽不問貴賤長幼皆為彈之神氣沖和不知向人所在內兄潘嶽每令鼓琴終日達夜無忤色人皆知安道之髙抗而不知千里之以恬淡為髙抗也邊韶漢邊韶嘗為老子碑銘謂孔子學禮於老子時年十有七嵗按世家孔子年十七孟釐子病誡其子必師孔子故孟懿子與南宫敬叔往學焉其次又云敬叔與孔子適周見老子詳史之所記皆非一年中事況孟釐子卒在魯昭公二十四年孔子蓋年三十有五矣韶不詳究史家之㫖以大聖人事昭著耳目者而亦誤用之何貴乎五經笥也且韶以老子與子西同傳深詆班氏之失至於與韓非同傳何為置而不論韶即為五經笥是亦未聞道者孫叔敖楚孫叔敖左傳載為蒍敖又為蒍艾獵杜預稱為叔敖他書但云孫叔敖未知其名為饒也𨽻釋録楚相孫叔敖碑乃知名饒古之難博如此又云髙梱改幣乃敖革故易俗之事乘馬三年不别牝牡皆可以補左氏之闕寒食寒食節荆楚嵗時記云去冬至節一百五日即有疾風甚雨謂之寒食據厯當是春月清明前二日或謂冬至至清明凡七氣至寒食止百三日殊不知厯家以餘分演之也元微之連昌宫詞有云初過寒食一百六特𠡠宫中許然燭一百六又在清明前寒食後古人寒食之節初無定時後人既合為一而又指為三月之三日恐不可信民間值此節斷火凡三日齊人呼為冷節又曰熟食又曰禁煙又按桓談新論太原郡民以隆冬禁煙五日後漢周舉傳太原士民每冬中輒以介子推焚死之故一月寒食莫敢舉煙舉為并州刺史以盛冬去火損殘民命禁止之俗遂頓革則此節又在冬仲非春月矣禁火三日或五日或一月其風俗之不同乎初學記所載琴操注又謂介子推以五月五日焚死晉文公哀之每值是日禁民間不得舉火則寒食之說又非冬仲是寒食之節其說有三也及考左傳史記所紀介子推事絶無焚死之文惟晉乘及漢劉向新序乃云子推隱於介山文公求之不得遂以火焚其山子推堅不出因以焚死余按晉乘文字大非春秋時口吻其為僞書無疑蓋傅㑹劉向者不足據然亦未嘗明言春月冬仲及五月也先賢傳鄴中記皆因之余謂介子推事當以左傳史記為信焚死之說甚為謬妄晉文公好賢下士豈有賢人不肯出遂以火焚之其說不攻自破則寒食禁火自别有說非為子推斷可識也余偶閲周禮司烜氏仲春以木鐸徇火禁於國中注云為季春將出火也今寒食凖節氣是仲春之末清明是三月之初禁火當是周制但司烜氏徇火禁乃出火非禁火豈欲出新火故亦禁舊火乎或云龍星木之位也春屬東方心為大火懼火盛故禁火是以寒食有龍忌之禁其說益明矣上墓設烏飯寒食節上墓其制亦未見于古獨鄭正則祠享儀曰孔子許望墓以時祭祀未嘗明言以寒食節則四時皆可上墓矣五代史帝紀云寒食野祭焚紙錢亦止言野祭又未嘗明言上墓唯唐開元勑上墓以寒食日同拜掃禮此後世寒食上墓之所由起也夢華録乃云十月朔都城士庶皆出城饗墓又非以寒食也此則風俗之不同耳余里中上墓皆以清明重陽二節獨清明日上墓必以烏飯其法先以青礬漬米搗楓樹葉染之亦非無謂零陵總記居人遇寒食節以楊桐葉細冬青染飯色青而有光食之資陽氣道家謂之青精乾石䭀飯楊羲與許逺遊書故服䭀不即此物陶隱居登真訣亦云太祖真人有此法又法南天竹葉煮汁漬飯名曰黑飯故杜甫云豈無青精飯使我顔色好鄭畋詩圓明青䭀飯光潤碧霞漿余里中烏飯即此法也苐古人雖有此飯非以上墓上墓設烏飯豈亦薦其時食之意乎生兒詩蘇東坡洗兒詩人皆養子望聰明我被聰明誤一生惟願生兒愚且魯無災無難至公卿朱晦菴生其父松於晬日亦作詩行年已合識頭顱舊學屠龍意轉疏有子添丁助征戍肯令辛苦更冠儒二公皆一意也然士大夫生子而遇此時作此詩亦世道之不幸乎以行呼朋友相呼以行數唐宋以來皆然其俗起於北齊張稷為豫章王主簿與劉繪俱見禮接未嘗呼名呼為劉四張五前此未聞也苐此等相呼雖雅亦近於狎黃山谷嘗避暑於李氏園亭題壁云荷舞竹風宜永日氷壺凉簟不能回題詩未有驚人句㑹喚謫仙蘇二來秦少游見之言於坡公曰以先生為蘇二大似相薄公亦改容然坡公讀山谷煎茶詩曰黃九怎得不窮足以相當矣社稷禮記曰共工氏之霸九州也有子后土能平九州故祀以為社左傳曰共工氏有子句龍能平水土故祀以為社句龍即后土也厲山氏之子柱能植五榖故祀以為稷是后土乃社之神柱乃稷之神矣至蔡雍獨斷則曰周棄生而能植百榖稷乃百榖之長因以稷名其神此說為是蓋稷之神乃空名非實指棄與柱社之神亦空名非實指后土也又有祖社之社冬官左祖右社風俗通曰共工氏有子修好逺遊沒而祀為社故出行者皆祀之說文云祈清道神謂之社晉稽含社賦序有事於逺者吉凶偕名是共工氏有二子皆為社神矣又有社日之社亦實無定神歷代皆以國家所乘五行之運為之亦無定日杜工部社日詩用伏日事姚令威叢話以為誤不知史記年表秦德公始年用伏日祠社伏與社乃同日也至漢乃有春秋二社始與伏分耳二氏佛藏惟四十二章經其來甚古苐未知果出于佛否維摩經亦南北朝作如小乘諸品皆西僧為之道經獨道德南華列禦冦丹經黃庭隂符諸篇尚可觀其餘皆僞書也余嘗欲取二氏書刪之佛藏擬所存者不能十之一道藏擬所存者不能百之一未審功力能及此否太監雲竒丞相胡惟庸之變首發其謀者贈司禮監太監雲竒也竒南海人時竒以內使守西華門去庸居第甚邇庸謀逆詭稱所居井湧醴泉邀上幸而伏甲以待竒偵得之走當蹕道勒上馬言狀氣鬱舌鵙不能宣上恚甚左右撾箠亂下竒臂折猶奮指逆臣第上悟登西皇城樓瞰逆臣第中皆伏甲因亟發禁兵捕之而後召竒則氣絶矣詔贈竒內官監少監賜葬太平門北中山王墓之左有司嵗時致祭嘉靖中守備髙隆王萱等復上其事請于朝特贈司禮監太監加諭祭少司空何孟春為文紀之墓及考國史則謂惟庸以他事多不軌故被戮不及醴泉出邀上臨視事又以醴泉出為故里第石筍發井湧數尺非丞相府也雲竒發逆謀功甚大而史亦佚其名何也女兒把子今江南女兒未破瓜者額前髮縛一把子即張子野詞垂螺近額晏小山詞雙螺未學同心結垂螺雙螺即把子也諸葛入蜀諸葛孔明棄荆州入蜀蘇老泉甚詆其非世儒多是之而不知其說本元魏崔浩之對毛修也詳毛修之傳疑馮宿代韓昌黎筆韓昌黎文起八代之衰當時委未有能識之者其論佛骨疏宰執疑其同幕馮宿代筆亦是怪事宿浙之東陽人貞元中進士歷刑工二部侍郎有格後𠡠三十卷行于世弟定審寬皆進士俱以文名觀日出入周穆王駕八駿欲西觀日所入處秦始皇作石橋海上欲東觀日所出處英主好竒類如此東漢碑文東漢文字碑碣之類多有不成文理者如咸陽令唐扶頌云造立授堂四逺童冠摳衣受業著録千人夫以講堂為授堂又四逺童冠為句其下云五六六七訓導若神五六者用冠者五六人又六七者用童子六七人之文也此何等語篆體篆書以清圓徑拔為上秦李斯真蹟不可復覩唐李陽冰乃斯之復出也自江南徐鼎臣鉉始變而為肥已逺於古然猶不失古意至元趙子昻素愛鼎臣書所作大小篆多類鼎臣由是學者翕然效之甚至彭亨濁俗如腯豕然不知子昻天資髙邁所書自過于人俗子輩塵胞陋質欲逐其迹乃畫虎不成反類狗耳獸名窮竒神異經後人僞書也漢東方朔詼諧好言竒怪故此經托名朔耳且其文甚陋而野非朔之筆明甚苐所載有獸曰窮竒者言見忠信之人則嚙而食之見奸邪之人則擒禽獸而飼之此亦非茍作者豈有激而云然耶山海經有云邽山有獸狀如牛蝟毛曰窮竒音如嘷狗是食人郭璞注或云似虎一名神狗則實有此獸未知同否繡襦傳竒今俗演繡襦傳竒鄭元和殺駿馬奉妓人李亞仙此乃元翰林學士王元鼎與妓人順時秀事也古裝書法今祕閣中所藏宋板諸書皆如今制鄉㑹進呈試録謂之蝴蝶裝其糊經數百年不脫落不知其糊法何似偶閲王古心筆録有老僧永光相遇古心問僧前代藏經接縫如線日久不脫何也光云古法用楮樹汁飛麵白芨末三物調和如糊以之粘紙永不脫落堅如膠漆宋世裝書豈即此法耶秦始皇年嵗秦始皇十三嵗嗣位嵗在甲寅是年漢髙祖始生始皇元年為乙卯至二十六年庚辰乃自立為皇帝三十八年辛卯始崩是在位三十七年而稱皇帝止十二年也婦人不宜稱姬古者婦人不稱名出嫁之後即以父母之姓為名如春秋王姬齊姜宋子之類是也故姬者周之姓也如齊稱姜宋稱子耳後世字學不明以姬字為女人通稱已誤漢有薄姬栗姬憲姬是又以姬為妾矣蔡京當國改公主為帝姬更足掩口時公主乃趙姓既於姬字不合豈以帝之女可為人之妾耶宋人精于考究而當時卒無一人駁正者則為京之權所怵也五刑古今考謂五刑唐虞以來有之未知上古起在何時漢文帝始除肉刑刻顙截鼻刖足割勢四者皆肉刑也余閲黃帝針經帝與岐伯論人不生鬚者有宦不生鬚之語則黃帝時已有宦者是黃帝時即有宫刑也余意鴻荒之世禮樂刑罰雖不能如後世之詳悉苐其大槩在黃帝時皆已創立五刑其或起于黃帝乎但白虎通又云五帝畫象者其服象五刑也犯墨者幪巾犯劓者赭其衣犯臏者以其墨幪其臏處而畫之犯宫者履屝犯大辟者布衣無領又按慎子云以畫跪當墨草纓當劓履屝當刖艾蹕當宫是以尚書曰五刑有服故凡斬人體鑿其衍形曰刑畫衣冠異章服曰戮則黃帝時又似五刑未設何以有宦者請再考之張德釗書石本孝經昭德讀書志所録石經皆有書人姓字獨孝經云不知所書何人余閲他書乃知孝經張德釗書也德釗曽守簡州平泉縣令賜緋魚袋生而有文在手魯公子季友生而有文在手曰友因以命之初疑其妄及閲唐元和姓纂堯之長子監明死而子生有文在手曰劉故封於劉周平王少子生而有文在手曰武遂為武氏又南氏姓源韻譜盤庚妃姜氏夢龍入懷孕十二月而生手把南字長封荆州號南赤龍又鮮于氏血脈譜子仲之子曰文生而有文在手左曰魚右曰羊及長封漁陽為燕附庸又閻氏唐表周昭王少子生而有文在手曰閻康王封於閻城又薛氏血脈譜文王曹夫人見赤龍交而孕十二月生子手把薛字因以為氏此皆譜牒家之言多不足信然季友之說世亦有之非妄也戒蠟僧家言僧臘者猶言年嵗也又言戒蠟者臘當作蠟余偶閲一內典西方結夏時以蠟為人其輕重相同解夏之後以蠟人為驗輕重不差則為念定而無妄想否則血氣耗散必輕於蠟人故謂之曰戒蠟非年嵗之臘也受財産李藥師受張仲堅家産張建封受裴尚書資財既居之而不辭入室之初婢僕有不用命者即鞭撻之英雄行事大略相同玉牒宋朝玉牒凡一朝大政事大號令大更革大拜罷皆載焉仙源積慶乃牒中之一欵耳詳雲莊四六所載進玉牒表自首至尾皆世系與朝政相對今制玉牒乃止載宗室世系不及朝政也火葬姑蘇火葬雖屢經禁戒恬不為止蓋其俗自古已然矣元祐中范純仁嘗帥太原河東地狹民惜地不葬其親純仁收無主燼骨别男女異穴以葬又檄諸郡倣此仍自作記數百言曲折委致以規變薄俗而俗始稍變苐姑蘇純仁之鄉也能變太原而不能變其鄉何耶蓴鱸張季鷹見秋風起輒思蓴鱸世皆知其有初服之想而已余閲本草蓴鱸同羮可以下氣止嘔豈季鷹在當時意氣抑鬱遇事嘔逆故作此念耶牛頭阿旁古帝王多有云蛇身牛首者非真身如蛇首如牛也今相家者常稱人為鶴形虎形其人豈真如鶴如虎哉陶𢎞景乃疑佛氏所述地獄中有牛頭阿旁者為三皇五帝何怪誕若是巨靈巨靈之迹傳載所紀多在蜀中水經所稱巨靈謂河神漢武帝內傳東都進一小人長七寸東方朔謂為巨靈蓋名同而神異也皇帝王魏了翁謂皇帝王三者皆節惠易名之諡也人主生稱皇帝自秦政始漢髙帝遂因其陋至今不改是生而為諡也故三皇五帝三王皆後人所諡者苐今之有天下者不稱為皇帝將何稱耶安得此老復起而詰之梅竹宜瘠地梅與竹皆植物中有幽致者然梅以古為韻竹以堅為材故肥壤植梅雖華茂而其韻常之以枝幹不蒼也肥壤植竹雖森發而其材常脆以枝節易蠧也宋葉夢得善種竹後遇王份秀才曰竹在肥地雖美不如瘠地之竹或岩谷自生者其質堅實斷之如金石以為椽常竹十嵗一易者此倍之夢得歸而驗之果信余於竹而悟梅不宜肥壤又於梅與竹悟人間世之瘠者為藥石而肥者為疢疾也藥樹監搜元微之有詩曰松門待制應令逺藥樹監搜可得知余初不曉監搜之義又疑藥樹為有誤及閲龎元英文昌雜録亦為藥樹豈樹有名藥者耶抑或可為藥之樹也若監搜則唐制百官入宫殿門必搜檢而以監察御史掌之其立位在藥樹之下至大和元年始詔停此制云佛書可疑余嘗疑今中國所行佛書蓋經數譯而後成因憶契丹初入中國者實名安巴堅時李琪撰賜契丹詔乃作阿布機後有歸自虜中云虜人實呼為安巴非阿布也身毒國在漢時譯作捐篤其後又譯作乾篤復名之曰乾竺今且為天竺矣譯者但取語音相近不問字義云何設有人持中國所行五千八百卷往彼土不知與當時雙樹下語一一契合否漢閏之誤三嵗一小閏五嵗一大閏自唐虞已然若漢書表及史記漢未改秦厯之前迄至髙后文帝皆書閏九月蓋秦之厯法不明凡應置閏者皆總而致之於嵗末也其亦據左傳所云歸餘於終而誤用之者耶婟嫪今世諢語宿娼客曰孤老世多不解其語余閲要雅游壻曰婟嫪婟胡故切嫪力到切皆戀惜意因憶史記秦始皇母后所幸曰嫪毐者正義云嫪躬到反毐酷改反索隱云嫪姓毐名漢書注嫪氏出邯鄲王邵云賈侍中說秦始皇母與嫪毐淫坐誅故世人罵淫曰嫪毐廣韻亦云毐者無行之稱也則非名矣今之呼游壻為婟嫪也其起於毐耶是嫪毐非姓名而索隱及漢書似誤矣珠池廉州珠池乃海之港也劉恂嶺表録異記謂海邊之中有島島上有大池其底與海通豈恂之所見别有島上之池耶烏寶元髙明有烏寶傳曰寶素勢利其富室勢人每屈輒往雖終身服役弗為厭若窶子貧氓即傾心願見終不一往尤不喜儒雖暫相往來亦終不能久留也余之不能為烏寶主人也固宜石有生長漢青衣尉趙孟麟羊竇道碑乃磨崖也洪適𨽻釋謂此碑崖石增長字體失真余頗疑之崖石豈有增長之理或苔蘚所蝕耳後遇李觀察開芳為言晉江𫝊公夏器祖墓有一石笋初僅尺許嵗漸生長至三尺餘公遂為南宫第一人相墓者以此石笋為貴徵其族人妒忌夜折之遂不復長故公位僅至員外郎乃知洪氏之言非虛也子孫用祖宗樂韓苑洛論樂謂祖宗之樂決不可奏於子孫之廟豈可以子孫坐于上而呈祖宗之形容哉子孫有功德者宜别為樂蓋子孫之樂則可奏之祖宗之前以慰恱祖宗之心也此說亦近理苐樂所以象成功子孫豈一一皆有成功者功之未成而欲舍祖宗之樂未知有事於廟時用樂乎不用樂乎安得苑洛復起而質之骨董骨董二字乃方言初無定字東坡嘗作骨董羮用此二字朱晦菴語類乃作汨董今人作古董字其義不可曉拾青紫世人皆知拾青紫如拾地芥為夏侯勝語而不知青紫二字何所本漢制丞相太尉金印紫綬御史大夫銀印青綬皆官階之極崇者故云拾青紫謂紫綬青綬也顔師古注以青紫為卿大夫之服余因詳檢史漢諸書漢卿大夫未有服青紫者顔師古但據當時所見爾種竹種竹者必以五六月雖烈日無害世言五月十三日為竹醉日可移竹余居田間好種竹不必此日凡夏月雨天皆可種也若杜少陵詩西窗竹影薄臘月更須栽又以冬而種竹石林避暑録所載嘗依少陵詩於臘月種竹卒無一生者豈地有不同耶持齊宋文帝嘗謂求那跋摩曰弟子常欲齊戒不殺迫以身徇於世不獲從志跋摩曰刑不失命役無勞民則風雨順時寒暖應節百榖滋榮桑麻菀茂如此持齊齊亦大矣如此不殺德亦衆矣寧在闕半日之餐全一禽之命然後為齊耶噫今世之愚民無論已余嘗見縉紳間有手不離念珠口不離南無斷葷止酒持誦飯僧作大功德然而貪殺甚於盜跖者豈未聞跋摩之語耶疑耀卷五
