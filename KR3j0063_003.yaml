body:
  text: 疑耀卷三明張萱撰八分隸楷辨書家先有古文次有籒文籒文即大篆也次有小篆李斯損大篆而為之也次有隸秦政時法令繁劇軍期嚴迫大小篆難猝就乃約之而為隸以其可施於徒隸故曰隸或云程邈所作邈故徒隸也其法簡而且易便於佐使又曰佐書或又云王次仲所作李陽氷曰王次仲始作八分以當時隸字少波勢乃增之因其字方八分遂以為名蕭子良曰漢靈帝時上谷亦有王次仲與秦時王次仲同姓名亦常作八分書鍾元常謂之章程書此八分書所由始也蔡文姬曰割程邈字八分取二分割李斯小篆二分取八分故名八分則與陽氷字方八分之説又異漢石經者蔡雍所書即八分也元常善八分有隼尾波今泰山銘即此體是古之隸與八分有波勢無波勢微異非兩法也程逈曰東漢以來碑刻皆用八分書如程邈書是也今見古帖𨽻書自是今之小楷孫過庭書譜謂元常専精於隸書伯英尤工於草體彼之二美逸少兼之過庭所指元常隸書即今所傳力命宣示二帖是又以真行為隸矣故蕭子雲啓勑旨以逸少不及元常子敬不及逸少因此研思遂悟隸式與過庭之説相同歐陽集古録跋則以隸與八分為一趙明誠金石録又云隸者今之楷書亦曰真書是八分也隸也楷也似皆一體也黃長睿曰自秦易篆為隸漢世去古不逺當時正隸之體尚有篆籒意象魏晉以來元常士季及王世將逸少子敬輩始創作小楷皆遷就漢隸運筆結體尚圎而雅淡其字率扁而弗撱今傳世者若元常力命宣示二表世將上晉元帝二表逸少曹娥帖大令洛神帖雖經摹拓而古隸典刑具存至江右六朝若謝宣城蕭挹輩雖不以書名世而其小楷若齊海陵王志開善寺碑猶有鍾王遺範也惟陳隋間正書則結字漸尚方而不尚圎然猶依倣漢隸一二唐初亦爾也及歐陽率更虞永興出乃易方為長以就姿媚後人競效之鍾王楷法彌逺而漢隸遺意無復存矣是八分與隸及楷唐以前皆作一體唐以後隸與八分為一體而楷遂自為一體矣故今之楷全無隸意則歐虞壞之也余謂今之楷書不宜謂之楷只宜謂之今隸而漢之隸為古隸可也丘明非姓左左丘明古今相傳丘明名左姓也余偶閲一小説吳興地名丘墓者一村皆姓丘有大碑列其族黨稱左史丘明之後云明為魯國左史則左者乃史官之名如左史右史之左而丘乃姓明乃名也是必有所據故表而出之蚩尾誤作鴟今宫殿鴟尾之鴟非鴟也乃蚩字漢武帝作柏梁殿恐有火災乃飾以蚩尾蚩蓋海獸之名水之精也可以厭火今作鴟殊誤障車文世皆知古有催籹詩而不知有障車文唐天祐中南平王鍾傅女適江夏杜洪子時及昏暝令人走乞障車文於湯篔篔命小吏四人各執紙筆倚馬而成今其文不傳想亦催籹之類也射䇿之制今人皆知科場對䇿為射䇿謂如射覆之射是也唐托言載漢射䇿謂列數䇿於几案上令士人以矢投之隨所中之䇿而對之或亦一説也但考漢制並無此説不知其説何所據烏鬼之辨杜工部家家養烏鬼頓頓食黃魚沈存中以烏鬼為鸕鷀䂬溪詩話引元稹詩病賽烏稱鬼巫占瓦作龜稹自注云南人染病競賽烏鬼故䂬溪以工部所稱烏鬼為神鬼非鸕鷀也余嘗疑之謂稹或得於傳聞故戲而入詩耳一日讀稹集有聼人彈烏夜啼引詩乃謂作拾遺時被謫其妻竟禱於烏鬼始得還官則是實賽烏鬼也而烏鬼乃鬼神矣苐烏鬼不知何神而稹之妻禱之稹信之殊足掩口若工部所稱烏鬼則沈説為正䂬溪為謬蓋下有食黃魚語非鸕鷀而何朝無咎能畫唐以後文人未有不能畫者如朝無咎未嘗以畫名偶閲陳後山詩集有朝無咎畫山水扇詩云前生阮始平今代王摩詰偃屈蓋代氣萬里入方尺則無咎之畫亦有足觀惜世不傳耳若阮始平能畫畫譜亦未嘗載後山詩可以補其闕矣韓昌黎白太傅皆惑於服食韓昌黎文起八代之衰蘇東坡稱之謂其一言為天下法以余按之有可疑者昌黎諫佛骨矣晚乃與佛子大顛逰又作李干墓志歷敘以服食敗者數人為世誡而晚年復躬蹈之白樂天有詩曰退之服硫黃一病訖不痊是昌黎知誡人而不知自誡也然樂天既知誚昌黎亦好言服食事嘗有詩曰金丹同學都無益姹女丹砂燒即飛其序云豫與故刑部李侍郎早結道友以藥術為事乃知異端易惑即髙明之士亦所不免也古詩服食求神仙多為藥所誤二公豈未之聞耶男女兩體一友人嘗謂余言今武進縣尚書某者其夫人半月為男半月為女為男時能御女自置妾媵余始疑焉後閲諸傳記則往往有之晉惠帝時京洛有人具男女兩體亦能兩用人道而性尤淫亂晉五行志謂之人痾宋趙忠惠帥維揚日其僚友趙參議者有婢甚慧黠參議欲私之堅拒不從疑有異強即之則男體也遂聞於有司蓋身有兩形前後姧狀不一乃置極刑元有李安民者嘗於閩之福州得徐氏處子年十五六交接一再漸具男形與池州李氏女及婢添喜私通事正相類張師正採異録景祐中廣州舶商韋某女年十嵗變為男子與侍婢交有孕嘗與吳舍人濳同學好讀文選雖鬚出於頷然舉止言談猶婦人也彼武進尚書夫人何足訝哉然玉歷通政經曰男女兩體主國淫亂此非太平之世所宜有也大般若經載四種黃門其四為博乂半擇迦半月能男半月能女二十八宿真形圖心房二星皆男女兩形更為雌雄異物志靈貍者自為陰陽故能媚人若此輩者豈博乂半擇迦及心房二星靈貍所化生耶苐諸傳記所載皆非令善武進尚書夫人獨富貴終身則不得其説矣詠花不語牡丹有名醉西施者韓昌黎詩對客偏含不語情羅隱詩曰若教解語應傾國蘇東坡詩不如此花不解語世間言語原非真三公皆詠不語而一解轉深一解矣滕王蛺蝶圖滕王蛺蝶圖歐陽歸田録以為滕王元嬰余按畫斷乃元嬰之嗣王湛然者畫蛺蝶雀兒曲盡其妙非元嬰也婦人自稱衛夫人者尚書李充之母常以夫姓自稱為李衛今婦人自稱宜倣之瓊奴宋時永安驛廊東柱有女子題一詩云無人解妾心日夜長如醉妾不是瓊奴意與瓊奴類不書姓名陳后山有詩二首紀之然亦未詳瓊奴出處余偶閲青瑣髙議乃得之瓊奴姓王氏為郎中王某幼女父死失身於趙奉常家為主母凌辱道出淮上乃自書其事於驛壁見者哀之王平甫有歌紀焉則永安驛題詩之女子亦必名家子嫁為人妾而失意者也宋紙背面皆可書顔文忠每於公牒背作文稿黃長睿得雞林小紙一卷已為人書鄭衛國風復反其背以索靖體書章草急就二千一百五十字余嘗疑之自有側理以來未聞有背面皆書者顔乃惜紙黃或好竒耳余幸獲校祕閣書籍每見宋板書多以官府文牒翻其背以印行者如治平類篇一部四十卷皆元符二年及崇寧五年公私文牒箋啓之故紙也其紙極堅厚背面光澤如一故可兩用若今之紙不能爾也胡同今京師呼巷為胡同蓋胡語也世以為俗字不知山海經已有之食囂鳥可以止同郭璞注治洞下也音洞又飛魚食之已痔同獨胡字尚未經見骨肉相關宋楊敬仲曰仕宦以孤寒為安身讀書以飢餓為進道骨肉以不得信為平安朋友以相見疏為久要此誠理到語余於仕宦讀書朋友請從事矣獨骨肉一語不能如命衰慈八十膝下止萱一兒宦逺祿微不能迎養亡弟一兒猶未成立平安之耗兩目欲枯若於此事可不相關尚何事可相關耶給事中不宜稱黃門今人稱給事中為黃門蓋始於漢而不知其誤也余按漢輿服志禁門曰黃闥內人主之黃門即黃闥也內人者閹人也漢給事中位次中常侍侍中黃門之下是黃門止可以稱宦者不可稱給事中也但漢舊儀又曰黃門屬黃門令日莫入對青瑣門拜名曰夕郎夫曰入對青瑣門拜則又非宦者是給事中之呼為黃門自漢已誤矣蓋黃門本宦者之稱以其所司者黃門耳給事中不司黃門而可以黃門稱之耶二千石世皆知郡守為二千石不知在秦時郡之尉亦秩二千石也尉掌佐守典武職甲卒者五星聚五星之聚自周文王七年孟春五星聚房春秋時齊桓公將霸五星聚箕漢髙祖入關五星聚東井安祿山反天寶九年五星聚尾箕宋乾德五年三月二十七日五星聚奎皆載在史傳者凡四而已李鄴侯家傳謂肅宗復長安其年五星亦聚東井唐史未載是自周及宋五星凡五聚也天寶九年之聚無論矣即齊桓之霸亦何德以致之耶語曰天道逺信矣婦人以父姓為名古者婦人不稱名出嫁之後即以父之姓為名如春秋王姬齊薑宋子之類是也故姬者周之姓也如齊稱薑宋稱子耳後世字學不明以姬字為女人通稱已誤漢有薄姬栗姬憲姬是又以姬為妾矣蔡京當國改公主為帝姬更足掩口時公主乃趙姓既於姬不合豈以帝之女可為人之妾耶宋人精於考究而當時卒無一人駁正者則為京之權所怵也七均七始宫商角徴羽五音也曰七均者有變宫變徴是為七也宫與商商與角徴與羽相去皆一律角與徴羽與宫相去獨二律夫一律則近而和二律則逺而不相及不能和也五聲之序宫生徴徴生商商生羽羽生角至角則窮故至角乃隔八下生其位與宫相比謂之變宫是羽聲雖距正宫二律而距變宫止間一律也變宫又隔八上生其位與徴相比謂之變徴是角聲距正徴雖間二律而距變徴亦止間一律也正聲五變聲二每律用七聲為均相和以均調故曰七均七聲迭用以終始一調故曰七始雲南荔枝荔枝閩廣四川有之他處未聞元李京雲南志土獠蠻以採荔枝販賣為業當是荔之枝非龍眼荔枝之荔枝也習流史記越伐吳使習流二千索隱謂流放之罪人正義謂流利慣熟皆誤吳水國習流者謂習於水戰也文正美諡文正之諡美諡也宋時得此諡者惟吕蒙正王欽若司馬光王曾范仲淹鄭居中蔡卞陳康伯八人而已後張知白夏竦皆欲得此諡而司馬光論其不可故知白諡文節竦諡文莊其嚴如此若李公昉王公旦諡法通紀亦曰諡文正者非也二公原諡文貞後避御諱世遂呼為文正耳然欽若與卞何物而亦得諡文正何也石奴後魏時諸王孫貴臣多服石藥每病輒稱石發陳後山有詩服石為石奴言為石所使也石奴二字亦新茶用鹽薑烹茶今未聞有用鹽薑者薛能烏嘴茶詩鹽損添常戒薑宜煮更黃東坡和寄茶詩老妻稚子不知愛一半已入薑鹽煎陳無已乞茶詩愧無一縷破雙團慣下鹽薑枉肺肝是唐宋以前茶皆用薑鹽也有友人嘗為余言楚之長沙諸郡今茶猶用鹽薑乃為敬客豈亦古之遺俗耶白牯青奴傳燈録長沙岑和尚有曰貍奴白牯却知有白牯蓋謂水牯牛也陳后山齋居詩有云青奴白牯靜相宜老罷形骸不自持青奴二字黃魯直云趙子充竹夫人詩涼寢竹器憩臂休膝似非夫人之職宜名曰青奴及任淵注陳詩以白牯為白角簟乃借用以對青奴也恐未必然青奴是竹器疑白牯是簟固是的對苐後山詩博而核萬無如此借用者或白牯别為牀笫物當是鄉語耳秦法棄灰秦法棄灰於道者棄市此固秦法之苛苐棄灰何害於事而苛酷如此余嘗疑之先儒未有發明者偶閲馬經馬性畏灰更畏新出之灰馬駒遇之輒死故石礦之灰往往令馬落駒秦之禁棄灰也其為畜馬計耶一日又閲夏小正及月令乃畢得其説仲夏之月毋燒灰鄭氏注謂為傷火氣是矣是月王頒馬政遊牝别群是毋燒灰者亦為馬也固知棄灰於道乃古人先有此禁但未必刑之如秦法古人惟仲夏乃行此禁秦或四時皆禁故以為苛耳臧文仲臧文仲左傳言其不仁者三不知者三先聖又謂其竊位其人品可知苐古今三不朽之言首發之者文仲也在當時亦必能立言者今傳於世無幾豈以其人廢言耶抑遺逸多也至老稱詩龎相國籍喜稱詩即相府幾務冗雜而吟咏不絶口及疾亟猶手録十餘詩以示司馬溫公復書其後曰欲令吾弟知老夫病中尚有此意思耳其字已慘淡難識後數日薨今操觚之士一入仕籍便絶口不復稱詩且以此道相戒此固汨沒於世態蓋亦於此道淺故不得不棄去耳樂府訛缺風雅滅而離騷作離騷又廢樂府繼之此詩之正宗也樂府者漢之鐃歌是也當時采於民謡雜以趙代秦楚之風而傳世永久訓詁訛缺至有不可曉者自樂府解題出而後稍稍能發明然今之辭存而可以測其義者不過一十八篇耳前後文人擬而作之無慮百數大率不宗本旨或自立新意以句讀富贍為雄且言語淺陋皆失古人之意又題解出於二三子之手或智識淺薄不能究見其微使後之學者無所依據故千載之間竟無定論特存其名句而已如思悲翁一篇有奪翁美人梟子五梟母六之句以理推之必無五子而六母也大意以梟為不順之鳥言母攜其子捨己從人而去力不能取故發於音聲而悲怨之今究其義則似是言五子與母併其數為六也又有所思一篇乃男女相絶而相怨者其言摧折之焚燒之與君斷絶不復相思不為已甚乎以此喻君臣則非三宿而後出晝之義以此喻夫婦則略無忠厚之旨豈若氓之詩猶有道其宿昔拳拳不忍之意乎余嘗欲變其本旨謂與君雖絶専思君庶可補於風雅而有益於世教也尚當與博古者再詳之官吏不得受監臨飲食漢法凡吏受監臨飲食皆免官景帝時以為其法太重更議著令於是丞相廷尉議凡吏及諸有秩者受其官屬所監所治所行所將飲食計償費勿論故此時吏亦得受監臨飲食也苐必須償費乃可如不償費則猶免官故卓茂為密令民有言部亭長受其米肉者茂雖不為聼然是時受監臨飲食之禁尚嚴故民得以言亭長耳因念戰國有以二卵棄干城之將者漢法實始於此此法至宋時猶守之故賈漸起請除舊例送酒食外不得買置金帛作土風贈遺及省司參詳今後以公使錢買置珍異等物及見錢送與人皆從違制定斷其收受人坐贓論其有公使錢人受還答之物入已準盜論時曹修知鎮戎軍受鄰人公用酒已而自首法司竟坐贓論廢於是司馬溫公以為舊條之意明許以酒食相遺其有公使錢人受還答之物止謂珍異見錢耳今曹修止於尊酒隨而自首已為刻薄法官又以贓罪加之剖析一條以為二事不察人情不顧大體非厚道也自後所犯如上條必須贓滿五匹以上方得科罪其不滿五匹及以飲食相饋餉者皆勿論遂為令嗚呼古多亷吏固自古風然而古法之嚴如此雖欲不亷得乎今苞苴公行至以餽遺厚薄為官殿最安得賈漸起曹修輩起而按之婦人裸撲為戲宋嘉祐間正月十八日上元節上御宣德門召諸色藝人各進技藝賜與銀絹內有婦人裸體相撲者亦被賞賚夫婦人相撲有何可樂且上有天子下有萬民后妃侍傍臣僚縱觀而使婦人裸戲於前何以隆禮法示四方乎余初疑此或偶爾為之後閲司馬溫公劄子有此一議乃知此戲原置樂籍中又民間街市亦以此聚衆為戲不知始於何時有此不美之俗也司馬光辭知制誥宋朝凡知制誥者皆先試官久而後用故司馬溫公以修起居注試知制誥矣及實授知制誥凡九上辭免乃改天章閣待制後治平四年復除翰林學士亦三劄辭免夫溫公豈不􅈺於詞命者耶其辭知制誥第三劄曰自知文字惡陋又不敏速若除拜稍多詔令填委必閣筆拱手不能供給縱復牽合鄙拙尤甚暴之四逺為人指笑及辭翰林學士第三劄亦曰稟性愚鈍拙於文詞若使解經述史或粗有所長於代言視草最其所短此固公謙損之語然以余閲公生平文字其於詞命之體果不盡合是人各有能不能耳今代知制誥者皆循資而用不問能否何怪乎四逺指笑乎隂陽地理之説隂陽之書使人拘而多畏至於喪葬為害尤甚是以士庶之家或求葬地擇嵗月至有纍世不葬者余按古者葬期天子七月諸侯五月大夫三月士踰月葬於北方北首未嘗問嵗月相山陵也然考其子孫之吉凶亦豈有異於今哉春秋書己丑葬恭嬴雨不克葬庚寅日中乃葬丁巳日葬定公雨不克葬戊午日下昃乃葬是雖卜日亦不拘拘於日也周禮冡人掌公墓之地先王居中以昭穆為左右不擇地形然而周有天下三十六王八百六十七年地之吉凶又何論焉夫葬者藏也本以安祖考之形體得土厚水深髙敞堅實而祖考安則可矣若欲為子孫求福澤至延嵗月令祖考遺體暴露而不得藏是欲子孫安而不必於安祖考也仁人孝子豈其然乎餐菊楚詞餐落英菊英也今人餐菊者皆生餐之亦未聞有烹炮者溫公晚食菊羹詩采擷授厨人烹瀹調甘酸毋令薑桂多失彼真味完不知其法何似蘇子由制䇿差錯嘉祐中溫公差赴崇政殿後覆考應制舉人於直言極諫科試卷內有􅱹氈兩號詞理髙絶獨傷於切直而氈字號之卷又所對一兩事與所出差舛溫公與范鎮同議以􅱹字號為第三等氈字號為第四等詳定官已如議矣初考官以為不當朝廷遂更差官重定復從初考遂以氈字號卷為不入等溫公抗議氈字號文詞臣不敢復言但指陳朝廷得失無所顧慮於四人之中最為切直若以此見黜是名為求直言其實惡直言也上曰言果切直不宜棄也乃降一等收之則蘇轍也今轍集中所對䇿原無差舛豈見收後潤色之耶轍與軾兄弟齊名而對䇿亦有差舛當是少年問學或未到耳今制考試編排字號皆用千文宋時試卷字號必另製字樣故􅱹氈二字非字書所經見者死而尸溫宋嘉祐中廣陵有蔣生者逸其名死十四年矣而尸猶溫妻子不敢殯殮留尸於牀嘗有書自逺方以貽其妻子筆迹宛然劉攽有詩云三徑積荒草玉棺不上天初疑青竹葬有值吳門仙妻子同脫屣衣冠如脫蟬何年獨鶴歸悲歌城市遷此亦載籍未經見者古章奏皆手書宋時百官奏章皆手自書進賈學士直孺為諫官有所條奏仁宗識其手書每嘉賞之古人凡在仕籍無不工書者故一切章奏皆手書之非惟得敬君之體且機密事亦不至宣泄取敗今人多不能書故不得不倩於書史耳但古人章疏未必全用楷書而行草間見今古帖中尚有載者黃六今京師勾闌中諢語言紿人者皆言黃六余初不解其義後閲一小説乃指黃巢兄弟六人巢為第六而多詐故詐騙人者為黃六也宗藩之盛我朝宗藩自古未有若是其盛者余纂修玉牒萬厯二十二年止屬籍者已十六萬人今又十年其生齒尚未知其數也偶閲侯鯖録載唐元稹行李從易宗丞制詞云劉氏子孫在屬籍者十餘萬人夫漢祖掃秦灰之燼我髙祖革元政之弊其功同也故胤嗣之盛亦相同乎燕脂古今注曰燕脂之草出自西方葉似紫蘇花如茜土人染粉以為婦人面色故名燕脂後人效之以紅花染絳為之非彼之草染之者秦始皇宫中悉用紅粧疑始於秦余按李石續博物志三代以降塗紫草為燕脂又非始於秦也紅花一名紅藍又名黃藍張騫使西域得之以其葉同藍故曰藍燕或作胭作因作胭脂或作支丐奴妻曰閼氏讀作胭脂謂其顔色之美也有一説燕脂作煙支唐睿宗女代國長公主少嘗作煙支棄子於階後乃叢生成樹公主歎曰人生能幾我初笄嘗為煙支棄其子今成樹隂映瑣闈人豈不老乎是煙脂又有樹有子非草染者不知何種古詩丐奴歌云奪我焉支山令我婦女無顔色以山有草可染胭脂又不獨出西域也粉古今實録曰蕭史與秦穆公鍊飛雪丹其第一轉與弄玉塗之即今鉛粉也婦人傅粉自秦始余按墨子禹作粉張華博物志紂燒鉛作粉謂之胡粉或曰周文王時婦人已傅粉矣未知然否但婦人傅粉斷非始於秦也周靜帝時禁天下婦人不得用粉黛令宫人皆黃眉黑粧黑粧即黛今婦人以杉木炭研末抹額即其制也若黃眉則唐詩有云纎纎初月上鴉黃又云鴉黃粉白車中出今不復知其制矣一説黑粧亦以飾眉漢給宫人螺子黛故云黛眉曹子建七啓玄眉施兮鉛華落即墨眉也庾信詩云眉心濃黛直點額角輕黃細安是黃黑俱眉飾未嘗廢黛也額上塗黃亦漢宫妝梁簡文詩同安鬟裏撥異作額間黃虞世南袁寶兒詩學畫鴉黃半未成是黛色或以點額或以施眉黃色或塗額上或安眉角古人媚籹隨意皆可妲己妲己古書有作䵣己者説文白而有黑曰䵣字統黑而有豔曰䵣二説皆不離一黑字則妲己之貌斷非瑩白矣古有玄妻亦云其貌如漆有光可鑑晉惠帝賈后短形青黑色南漢主劉鋹得波斯女黑腯而慧豔鋹嬖之賜號媚豬此皆以黑見寵者世廟有尚妃者貌亦黑宫人稱為黑木娘娘寵冠一時則䵣己玄妻當不誣也火浣布逸周書有火浣布贊火浣之布入火不滅布則火色垢則布色出火而振之皎然疑乎雪是白色也山海經云布出火山國火中有白鼠毛可作布敝則以火燒之如新與十洲記同此即周書所稱疑雪者也玄中記又云南中有炎山其山有木取以為薪燒之不燼取其皮績之為火浣布是火浣布有二種也今海外諸國入市嶺南者往往有之余嘗見乃灰色者未及詢其為木皮為鼠毛也今回紇之野馬川有木曰鎖鎖燒之不燼亦不作灰婦人取根為帽入火不焚豈亦炎山木之類耶余於京邸見有數莖合而為一疑鼠毫又不類大較似木皮中可績者其色瑩白以火燃之并沃以膏火中透紅以為必燼及取出則雪白如故雖毫末不損始信逸周書所贊非妄也太玄濳虛易之為書廣大精微天地古今萬物萬事無一不備無一不徹揚雄之太玄司馬光之濳虛皆易之所已詳者也夫玄與虛得無贅乎噫乳出酪酪出酥酥出醍醐若雄光輩之所作是又從醍醐中覓酥從酥中覓乳也楊用修妄改杜詩楊用修謂顔延年赭白馬賦駴出豕之敗駕後人改出為突乃佳杜子美詩大家東征逐子回後人改逐為將乃佳白居易詩千呼萬喚始出來後人改始為才乃佳此癡笨人前説風流也突字拙出字巧才字俚始字文惟作者自知之耳獨以逐為將雖詩有不遑將母及古樂府一母將九雛杜豈不知者其用逐字原有深意婦人三從其一從子逐即從義也意不在將而在從語不以從而以逐此正詩家三昧以將字易之不亦淺乎用修又以杜詩江平不肻流謂意求工而句反拙不及李群玉水深難急流巴渝竹枝詞大河水長漫悠悠為勝於杜余謂竹枝詞此何等語可以擬杜即難急流不亦淺而俚乎杜之妙處全在不肻二字蓋本陶淵明日月不肻遲晨雞不肻鳴來故不肻二字杜嘗四用之秋天不肻明干戈不肻休王室不肻微而惟江平不肻流最佳余家有小樓臨長江每於夏漲時慿闌輒思杜之不肻流句乃詩中畫也象世言象膽隨四時在四足亦未必然劉跂暇日記載象營三象死剖之其二膽果在足其一膽在腹中嵗己亥今象房象死余往詢之膽亦在腹中也聞象具十二肖肉惟鼻是其本肉膽隨月轉在諸肉正月建寅即膽在虎肉其説又不同未詳孰是劉跂云象肉斤理段段不相屬則誠有之又云味亦各異故世言象肉千味亦未必然也天地止有三行西僧利瑪竇言天地間止有三行水也火也土也又以氣為一行人頗以為誕余謂此非利瑪竇之言也邵子曰天依形地附氣至矣盡矣然此非邵子之言也岐伯對黃帝曰大氣舉之葛洪釋渾天曰地居天內天大而地小表裏有水天地各乘氣而浮虞聳曰天形穹窿如雞子羃周接四海之表浮於元氣之上如覆奩於水而奩不沒氣充其中也張子曰虗空即氣減一尺地即有一尺氣人自不知又曰氣之散於太虛猶氷之凝釋於水蓋天包地外所以浮之者氣也所以浮氣者水也氣與水合生生不窮所以能浮天地而升降之鮑景翔曰神為氣主神動氣隨氣為水母氣聚水生故呵氣成潤雲蒸霧涌則水珠流出山川出雲則時雨以降此其證也故天地間有許多氣自有許多水生氣則生水生水則助氣未嘗相離然非火以涸之則陰氣盛陽氣微而為沴矣夫日者火也蓋日圓竟千里無物不破升天萬物焦入海則萬水涸水不涸則盈而濫易至泛濫涸而不生則氣與水俱竭是水也氣也火也三者相為循環於無窮此天地之所以為天地也利瑪竇之言非誕也衣冠以白為忌今世冠服皆以白為忌亦出於古禮父母在衣冠不純素素即白也余閲隋志古未必然宋齊之間天子私宴著白髙帽士庶以黑太子在永福省帽亦以白紗國子生亦服白紗巾晉人多著白接㒿接㒿亦巾也南齊垣崇祖守夀春白紗帽肩輿上城郭林宗遇雨墊巾李賢注以葛為之葛亦白也樂府白紵歌質如輕雲色如銀製以為袍餘作巾袍以光軀巾拂塵即今之白紵列子所謂阿錫而西子之舞所稱白紵紛紛鶴翎亂者是也唐六典天子服亦有白紗帽其下服如裙襦襪皆以白視朝聽訟燕見賔客皆以進御皆古制也白不為忌如此然其下注云亦用烏紗則古制雖存未必肻用多以烏紗代之若以白為忌其或起於唐乎宋明帝末年多忌諱以白門為不祥諱之右丞江謐誤犯上變色曰白汝家門則唐以前已忌之矣海月謝靈運詩挂席拾海月有謂海月係水族一物似水母而非大如鏡白色正圓其柱如搔頭甚佳此癡人前説夢也海月海中之月拾字乃古人用字之巧若以為拾水族之物有何意味詩文必有所本先輩謂杜詩韓文無一字無來歷余謂自古名家皆然不獨杜韓兩公他且勿論即作古選體有一字不從􅗛魏中來便不是古選作律詩有一字不從盛唐諸公中來便不是律詩故唐選體之所以不及漢魏者是以唐人字眼作古選宋律詩所以不及唐者是以宋人字眼作唐律也餘甘子虞允文與人書有云南詔餘甘子一桶王元美宛委餘篇載餘柑子見臨海異物志謂與橄欖同一果及閲異物志謂大小如彈子丸理如定陶瓜瓣初入口苦咽中甘與橄欖同味乃知正余里中所呼油柑子也元美未見遂云今天下饒橄欖絶無餘甘物之難博如此苐柑當作甘不宜從木允文當不誤或傳寫誤耳七七里俗人死每遇七日輒設奠七七四十九日乃已今國朝大臣諭祭亦有七七雖非通行古禮但禮亦有之人生四十九日而後七魄全死四十九日而後七魄散也七七之説蓋本此疑耀卷三
