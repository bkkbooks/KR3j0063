body:
  text: 疑耀卷二明張萱撰栁子厚非國語樓迂齋謂栁子厚文章皆學國語却著非國語是私其所自得而諱其所從来也其天資刻薄如此今世有一士人止能讀一部文選其所撰述皆竊文選中糟粕以自衒但對人輒排斥文選是亦一子厚也余謂即能作文選便足佳何以諱為苐恐其不能為文選耳子厚之非國語其文即可為國語否耶而奈何諱之施全施全於岳武穆死後欲刺秦賊而不得者但全先嘗為秦客最狎名在十客之列今岳死而讎秦豈忠義在人心即恩私不能奪耶賈誼蘇洵薄徳漢賈誼之知名於文帝朝者以守呉公薦之也史逸其名即誼終身亦未有一言及呉公者余嘗疑之蘇老泉為布衣時未知名有雅安守劉大簡字簡夫者深器之以書上韓魏公歐陽文忠公張忠定公薦之語甚切至東坡潁濵文章滿天下獨無一語及簡夫老泉集中亦止有與簡夫辭辟試一書耳而與簡夫請納拜書及老泉所作簡夫墓銘今皆不載豈編集時有意去之耶古人謂感恩易知巳難賈誼之於呉公老泉之於簡夫可謂知巳矣豈有所諱而然耶請納拜者請行門生禮也生前即願出門下身後即諱而去之亦薄徳矣余見有一顯貴人在故相趙文懿公門下二十年恩遇甚厚而文懿公捐館輒肆詆毁真犬彘之不若也噴嚏廣陵嘗有一名醫以醫致富其門如市即貴顯之家不輕造也偶廣陵守署中有病者亟召之醫不得已詣堂下守適有公事不及呼前而此醫適作嚏兩三聲守問曰何為而嚏醫曰外人有念醫士者守笑曰嚏乃肺家中風耳而云外人相念則嚏為肺病且不曉何名曰醫遂叱之去此醫退術遂不行余謂守雖知嚏為肺病而不知人相念則嚏乃古語也毛詩終風章願言則嚏鄭氏箋曰女思我心如是我則嚏也宋王易燕北録契丹俗戎主及太后噴嚏近位畨漢臣僚齊道沿䕫離華言萬嵗也今嶺外人噴嚏亦或呼曰大吉利市者即此意故漢藝文志有噴嚏耳鳴十六卷則嚏者古人亦以吉凶有相關者若月令曰季秋行夏令則人多鼽嚏是嚏未必皆肺病也今噴嚏耳鳴書已亡想有可觀者生乞壙志宋時有䛕王安石者嘗守番禺以書求安石曰某所恨微軀安健惟願早就木冀得丞相一薶銘庶㡬名附雄文不磨滅乎後世近有乞生壙志於名公貴人者想同之也荔枝西京襍記南越尉佗獻漢髙帝龍眼樹負暄襍録謂即今之荔枝也豈宋時龍眼尚未到於上國耶顧文薦亦博物者何言之誤也石炭今西北所燒之煤即石炭也蘇東坡集中有石炭行然亦未著其所自始前漢地理志豫章郡出石可燃為薪隋王邵論火事其中亦有石炭二字則知石炭即為煤而用於世已乆矣介之推燭之武介之推燭之武介與燭皆地名非姓也二人賢者為國人所取信故特標其地以異於衆耳如漢四皓皆以所居為氏而其本姓竟莫可攷開脇而産陸終氏娶鬼方之女孕而不育十一年開其左脇而出三人焉又開其右脇而出三人焉長曰昆吾次參胡次彭祖次㑹人次安次季連皆有名徳於世而受姓為侯伯譙周作古史考乃以為妄廢而弗論見亦隘矣彼修已背坼而生禹簡狄胷坼而生契皆為帝王是天將興之必有異於人者非常理所可測也魏黄初五年汝南屈雍妻王氏生男從右脇下水腹上出而平和自若數月創合母子無恙宋時莆田有市人妻生男從股髀間出亦無恙此亦足以明陸終氏之非妄矣詩叶管絃詩自三百篇而後至於我明卒未有一語可被管絃者葢文采有餘性情不足也音調出於性情性情和而後音調諧此天地自然之妙不假安排者近世有取陶淵明歸去来辭李太白把酒問月李長吉將進酒蘇長公前後赤壁賦協入聲律宋玉灼碧雞漫志謂之暗合孫呉余按今人之以諸公詩賦譜諸管絃者皆更換其句錯綜其章添減其字方於聲律可協皆非諸公原文也於孫呉終非暗合矣妒婦不可少諸葛武侯以醜婦為養心之資余謂妒婦亦然南唐樞宻杜業妻張氏甚妒烈祖命元皇后召張誡之曰業位望通顯得置妾媵何拘忌如此非婦道所宜張雪涕而言曰業本狂生遭逢始運多壘之初陛下所藉者駑馬未竭耳而又早衰多病若縱之反貽其禍將誤於任使矣烈祖聞之大加奨歎以銀盤綵段賞之余謂𦙍嗣既得血氣將衰若張氏者誠不可少也莊周鼓盆莊周妻亡鼓盆而歌世以為達余謂不然未能㤀情故歌以遣之耳情若能忘又何必歌四㐫四㐫者昆屯窮竒檮杌饕餮也堯投之四裔以禦魑魅也四裔者四夷也余謂四㐫在朝雖為㐫族然有今之君子所不能及者是以彼之下駟亦足走我之上駟也不然豈能以變四夷禦魑魅㢤今之君子且有居中國而身為魑魅者不知堯何以處之司馬文正海忠介司馬温公元豐末来京都人奔競觀之即以相公目之左右擁塞馬至不能行及謁時相於私第市人登樹騎屋窺瞰之隸卒或止之曰吾非望而君願識司馬公耳至於呵叱不退而屋瓦為之碎樹枝為之折及薨京師之民罷市而徃吊粥衣以致奠巷哭以過車者葢以千萬數上命户部侍郎趙瞻内侍省押班馮宗道護其喪歸葬瞻等還言民哭公哀甚如哭其私親四方来㑹葬者數萬人而嶺南封州父老相率致祭且作佛事以薦公者其詞尤哀炷香於手頂以送公葬者九百餘人京師民畫其象刻印粥之家至一本飲食必祝焉四方皆遣人購之京師時畫工有致富者張淏雲谷襍識謂千古一人而已余謂温公之後又有一人焉余鄉海忠介是也忠介乆居田里嵗癸未起南京都察院入京之日黄童白叟填溢街巷以觀公凡鄉民過其第者必求一見踵相接也公每歸私第輙危坐聴事不退居亦不閉門以便鄉民之求見者公問見我何為欲言事乎鄉民叩首無事止願一見海爺顔貌耳自朝至暮不少休及卒於官人争畫其像畫士亦多致厚資還櫬之日老㓜提攜頂鑪香夾道呼海爺爺號泣如喪考妣傾城皆至舟次罷市數日今江南郡邑相傳公已為神皆尸祝於家毎於公死日相率追薦至有費千金設一醮者此與温公何異夫温公在宋嘗為執政君子謂其有旋乾轉坤之功故人皆歸之忠介未嘗一日得行其志而人之歸之亦與田夫野老皆號為司馬相公婦人孺子亦知其為君實者同一恱服此豈可以聲音笑貌為㢤苐忠介得於人者與温公同得於天者則不及温公逺甚温公有子康官至侍讀忠介則黒衣之綴蔑如天之報施善人又何異耶温公身後又有不幸者紹聖初章惇蔡卞請發塜斵棺帝不許乃奪贈謚仆所立碑復貶崖州司户參軍蔡京用事復降正議大夫至列名於姧黨之碑若忠介則葢棺之後人無異言令聞不已此又温公所不能得於公者也佛書入中國世但知佛書自漢明帝時始入中國不知秦之先中國已有其書隋經籍志曰其書乆已流布遭秦火之世所以湮滅又劉向列仙傳曰得仙者百四十六人其七十二人已在佛經又漢哀帝元夀元年博士弟子景盧受大月氏王口𫝊浮屠經此皆白馬未入中國之前也况明帝時傅毅對帝所言皆是佛書使先此未有佛書毅何從而得之是明帝前雖有其書尚未盛行自白馬既来之後其說乃浸淫耳殿廷植花栁唐朝殿廷皆植花栁故杜甫詩香飄合殿春風轉花覆千官淑景移又曰退朝花底散歸院栁邊迷宋朝殿廷則植松楸而不植花栁者以見嚴毅也我朝殿廷松楸花栁皆不植亦有深意黄冊今制丁口稅糧十嵗一籍其數曰黄冊自劉宋時已有之齊髙帝即位嘗勑虞玩之與傅堅意檢定詔曰黄籍人之大綱國之政端云云時亦稱人籍今世多不解黄字之義余偶閱唐開元制凡男女始生為黄四嵗為小十六為中二十有一為丁六十為老每嵗一造計帖三年一造户籍即今之黄冊也謂之曰黄亦自男女之始生登籍而名之耳尾大不掉尾大不掉此非喻言也西域有獸曰羯尾大於身之半非以車載尾則不可行元白湛淵有咏羯詩羯尾大如斛堅車載不起此以不掉滅彼以不掉死雁足書雁足傳書世傳為蘇武事但武實未嘗以書縛雁足葢漢使者常惠自胡中還知武尚在故漢家令人入胡求武托言上林獲雁得武書也元中統間有宣慰副使郝經充信使使宋宋留之真州十六年不還有以雁獻經者經畜之雁見經輙鼓翼引吭似有所訴經感悟擇日率從者具香案北向拜舁雁至前手書一詩於尺帛繫雁足而縱之其詩曰露落風髙恣所如歸期囘首是春初上林天子援弓繳窮海纍臣有帛書復書於左中統十五年九月一日放雁獲者勿殺國信大使郝經書於真州忠勇軍營新館虞人獲之以獻元主惻然曰四十騎留江南曾無一人雁比乎遂進師南伐越二年宋亡此又效蘇武而為之也然武留胡中十九年始還漢家不能為武問罪於胡經留宋十六年始還而元主卒以此滅宋為之一歎經字伯常澤州人群龍無首易群龍無首王弼注云以剛健而居人之首則為物之所不與也孔潁達未疏無首之義今之佔俾家謂龍之剛猛在首乾之六爻皆用九是純陽之卦也不宜復濟之以剛必變而為柔是無首者無剛也余謂不然通乾之卦皆是陽剛必純剛而後可為乾故象曰天行健君子自強不息無剛是無健也㡬乎息矣以上諸爻皆不宜息豈以乾之六爻而可息耶且初九曰潛龍九二曰見龍九五曰飛龍上九曰亢龍皆指一龍也而此獨曰群龍則非一龍可知夫首者先也無首者言當此群龍俱興之時我不可以身始事也故象曰天徳不可為首者謂陽剛既在我則候時而動不宜首事左傳曰無為禍始即此意也且乾坤二卦其理相通彼此互用故坤之彖有曰先迷失道後順得常葢居後而不居先在群龍之時即乾亦宜如此不特坤為然也余故曰群龍無首謂無為事首而非謂剛徳可無也若謂剛徳不可純用必變而為柔則上九之亢龍已先詳之矣而此又言無剛得無重復乎宋均曰萬物之始莫能先之不可為首先之者㐫隨之者吉此說得之宜補注疏之闕佛不能作福唐懿宗末年信佛故迎佛骨苐佛骨至而大駕遂晏亦足以明佛之不能作福矣書啓慎餘字今人作書啓於左方之末書慎餘左冲無他諸語世皆仍之而不詳其所始余閱程大昌攷古謂古人以尊賜卑者書啟必於紙尾批曰與某人如宋時詔勑批答之類故紙尾結言慎餘等語者示行卑不敢更有他語也術者决王荆公去位王荆公在相位時嘗向一術者求卜術者曰功名富貴如此又何卜焉公作色曰今力乞去上未許請㸔旦夕便去得否耳術者曰相公相公得意濃時便好休予徃日曾為相公言之矣要去便去只在相公不在上也不疑何卜公悵然歎服去意遂决噫今之鐘鳴漏盡自託於上之不許卒客死長安者安得此術人一决乎易字義易經之易說文曰蜥蜴蝘蜓守宫形象也是易即蜥蜴也余按爾雅及注疏諸書蜥蜴之形殊與易字不相似戴侗作六書故亦已疑之古人製字象形最多亦最似而於蟲豸之類尤不茍作故易字上从日下从月為東西代明變易之象是矣若說文下从勿不从月而曰此象形也於蜥蜴之形何象焉爾雅釋蟲有曰王蛈蜴者注即螲蟷也似蜘蛛居穴中吐絲網穴口有足江北人呼為蛈蜴余謂其形實象易字故亦曰蜴而从勿不从月者象其足也且蛈與蜥音相近或蛈蜴誤為蜥蜴亦未可知况爾雅止言蜥蜴未言蜥蜴之蜴為易也即蛈蜴之蜴亦未明言為易然曰象形則易為蛈蜴而非蜥蜴不待辨矣說文多有可疑此其一也楚子問鼎楚子問鼎羅泌以為妄謂楚莊賢君孫叔敖賢相滅陳且復於申叔之對入鄭且舍於鄭伯之服非復前日之頑獷也周為共主彼豈遽然而窺之又謂鼎非傳國之物問之何益亦似有見苐左氏所載王孫滿之言未必皆妄也余謂九鼎在周乃上代所寶者故周公卜洛亦以安九鼎為首稱楚居漢南嘗聞鼎之名欲一見之而不可得故過周之疆問周之鼎亦嚮慕之私耳王孫滿惡其強梗遂切責之謂其窺伺神器而楚子問鼎初心未必遽至是也若謂楚實未嘗問鼎而以左氏為㒺則又不盡信書之過矣漢髙后答匈奴書漢髙后時匈奴冐頓遺書曰願以所有易其所無亦誖謾甚矣髙后召群臣議樊噲欲擊之季布謂噲可斬是亦一見但令謁者張澤報書即不能直詞切譲亦宜置有無相易之語於不問可也今書乃盛自貶損曰年老氣衰髮齒墮落行歩失度單于過聴不足以自汗能無汗顔乎夥頥沈沈字義陳勝既王陳其故人嘗與傭耕者之陳求見及見勝殿屋帷帳曰夥頤渉之為王沈沈者馬班二史皆同其下文曰楚人謂多為夥索隠曰服䖍云頥者助聲之詞也謂渉為王宫殿帷帳其物夥多驚而偉之故稱夥頤也而班固則削去頤字豈以詞助且上止言夥渉故此不必加一頤字耶王文恪曰夥頤方言也班書不宜削去甚是若沈沈二字索隠未釋應劭注班書曰夥音禍沈沈宫室深邃之貎也沈音長含反余謂沈沈二字亦當是方言若以為宫室深邃之貌則於夥頤二字重複矣沈沈之語必有所指今苦未能詳耳漢書人物表同名古今人同名同姓者甚夥但前漢人物表有一士鞅在中上又有一士鞅在中下相去不遠殆不可曉豈有兩鞅耶抑誤書也機雲為顧婦贈答陸士衡為顧彦先贈婦末章結句願保金石軀慰妾長饑渇是以為彦先之婦贈彦先也且士衡既為彦先贈婦而士龍又為彦先婦答不知彦先之婦於機雲兄弟何所𤓰葛而形之翰墨如此六朝文法不通六朝操觚之士其文法真有不可解者劉越石贈盧諶詩宣尼悲獲麟西狩泣孔丘及盧諶贈劉越石其詩序有云在木闕不才之資處雁乏善鳴之分卷異蘧子愚殊甯生匠者時盻不免饌賔以匠者時盻應在木句以不免饌賔應處雁句而於中間乃添入卷異愚殊二句上下剌戾如是雪月二賦謝惠連雪賦謝希逸月賦詞藻既同機軸不異惠連之賦止多王起為亂耳苐希逸警語濬於心靈大非惠連所可彷彿昭明並録竊所未安他且勿論即惠連起語雪宫建於東國雪山峙於西域此老學究口吻也希逸肻道之乎韜略非吕望筆兵家六韜三略相傳為太公望之書苐騎戰之法始見於趙武靈王而六韜首列其說何也余意太公望嘗為此書久或亡去今所傳六韜三略乃楚漢間好事者所補非望筆也班固志又有六弢下篇則周史所作乃定襄時人又曰顯王之世崇文縂目謂漢世已失此書又不知作何語也明月夜光明月夜光世皆習知其為至寶然莫詳其本末高誘注淮南子漢時中山之國有隋侯見大蛇傷斷以藥傅而塗之後蛇於夜中銜大珠以報之因曰隋侯之珠葢明月珠也是珠名明月起於漢也然秦李斯上書巳曰有隋和之寶垂明月之珠和卞和也隋者非漢中山國之隋矣豈上古故有隋之珠名明月而蛇所銜以遺中山隋侯者亦即此珠耶髙誘注淮南止言漢中山之隋侯珠是紕漏也高誘又曰夜光之珠有似明月是明月珠之外又有夜明珠矣故班固兩都賦上既云隋侯明月下又云懸黎垂棘夜光在焉亦以明月夜光為二珠而許子重即以明月為夜光呉都賦亦云隋侯於是鄙其夜光則明月珠亦名夜光是一珠而兩名也或一珠或二珠經典失詳故說者參差苐夜光明月皆珠也而西京賦曰流懸黎之夜光綴隋珠以為爥懸黎者璧也非珠也鄒陽亦曰夜光之璧是璧亦有夜光不特珠矣尹文子曰田父得寶玉徑尺置於廡上其夜光照一室是夜光為通稱不繫於珠與璧也余謂明月夜光固不繫於珠與璧凡珠與璧夜中能有光照人者皆得名之不必實指隋侯之珠與懸黎之璧也五臣注文選未得其詳故稍詳之珊瑚珊瑚之名詳於載籍廣雅曰珊瑚珠也誤矣張銑注西京賦亦曰珊瑚珠樹也亦誤豈其止見珊瑚之製為珠者而未見珊瑚耶珊瑚止宜言樹不得言珠也珊瑚生於海中司馬光類編云或生於山不知何所㨿珊又桑葛切輦路輦路二字世皆以為車輦所行之路李周翰注文選輦路樓陛也上林賦輦道纚屬如淳注曰輦道閣道也與李說同是輦道即輦路皆非道路矣又甬路亦飛閣之複道今人以官署墀内之道為甬路乃傳誤也慎子名姓辨孟子魯欲使慎子為將軍趙岐注慎子名滑釐正義同朱考亭從之又按史記慎到趙人謂慎子即慎到是到又慎子之名諸書皆同但下文此則滑釐所不識也為慎子自呼余按古人自呼皆呼名未有呼字者豈慎子以滑釐為名而以到為字耶皆不可曉莊子天下篇又曰慎子與彭蒙田駢為友學墨子弟子禽滑釐之術故薛仲常應旂著四書人物攷遂以慎子所云滑釐乃述其師非自呼其名也豈師弟同名耶姓譜諸書又以滑釐字慎子其後以字為氏而以滑釐為慎氏所自出則益誤矣慎子之先當有慎氏慎之姓非自滑釐始也結字即髻字古有紒字而無髻字紒音界即髻也史記西南夷𫝊魁結即魁髻乃借結為髻韓退之石鼎聯句長頸髙結正用此字高結之下有㗋中作楚語句蘇東坡有云長頸髙結㗋是不知結即為髻也故結讀作髻是也楊用修乃欲讀凡結髪皆為髻髮似誤葢結髮即髻猶讀結為髻字義能無重復名字相同古人名字一族之中且有相同者豈其族大且衆不相聞耶據左傳魯莊公之孫有仲嬰齊而魯文公又有孫曰公孫嬰齊仲嬰齊者公孫嬰齊之從祖又且同時而名同何也鄭有公孫段字子石而印段亦字子石乃公孫段從父子也士文伯亦范宣子之族而與宣子同名見昭公六年傳此不可曉冠服不必反古今人行誼文章皆不求如古人惟於冠服間動必以古為式所稱生今反古者非耶昔司馬温公依古式作深衣幅巾縉帶毎出朝服乗馬用皮匣貯深衣隨其後入獨樂園則衣之嘗謂邵康節曰先生亦可衣此乎康節曰某為今人當服今時之衣温公嘆其言合理生今反古者思之袴制褌即袴也古人袴皆無襠女人所用皆有襠者其制起自漢昭帝時上官皇后為霍光外孫欲擅寵有子雖宫人使令皆為有襠之袴多其帶令不得交通名曰窮袴今男女皆服之矣禱夢九鯉湖閩中九鯉湖禱夢者響應靈異無虛禱者然亦於事後乃驗或有當人之身不驗身後子孫始驗者余庚子請告南歸經過其地僕夫以禱夢請余謂之曰吉凶禍福我既不能前知即前知亦豈能移易者禱之何益延篤挂名常侍碑隂趙明誠金石録載漢中常侍州輔碑隂其鄉人為輔立碑者題名自漢陽太守而下凡四十有九人惟延篤叔堅見漢書耳明誠謂東漢名卿賢大夫死則門生故吏為之立碑而題其隂延叔堅當代顯人乃挂名於閹竪之輩似亦可耻余謂不然叔堅嘗有書與李文徳矣此豈出入閹竪之門者且叔堅後坐鉤黨廢錮鄉里至圖其形於屈原之廟非終始無庇安能有此洪适因引漢靈帝時太丘長陳仲躬吊中常侍張譲歸葬潁川事以釋之便自快然葢時政既惽達而得位則正色立朝不可朋奸此經也身退窮處則同塵所以逺害亦一時之權君子所不廢也叔堅居里而同郡為閹竪勒石借其名以為重叔堅豈得而拒之乎此非門生故吏之比明誠又何疑焉坡公論畫竹蘇子瞻畵竹從地一直起至頂米芾問何不逐節分子瞻曰竹生時何嘗逐節生及作文與可篔簹谷畵偃竹記有曰竹之始生一寸之萌耳而節葉具焉自蜩蝮蛇蚹以至於劒㧞十尋者生而有之也今畵者乃節節而為之葉葉而累之豈復有竹乎故畵竹必先得成竹於胸中執筆熟視乃見其所欲畵者急起從之振筆直逐以追其所見如雕起鶻落少縱則逝矣與可之教予如此予不能然者内外不一心手不相應不學之過也故凡有見於中而操之不熟者平居自視了然而臨事懵焉喪之豈獨竹乎余謂此言不獨畵竹為然即推而山水諸丹青又推而臨池又進而天下國家何事不然是東坡言技乃言道也坡公詩文蘇東坡絶世之才早年學詩獨宗劉禹錫而不及王楊盧駱髙岑李杜諸公晚年雖曰學李青蓮其得意處雖迫真然多失於粗止能為白居易則以信手拈来不復措意耳又言平生不好司馬史記然其文多有模倣司馬者朱考亭謂坡公晚年海外文字多是信筆胡說全不看道理此又非知坡公也佛字辯今人以佛為覺余嘗求之不得其說使此佛字為西方所製則譯之為覺可也苐佛未入中國時先有此佛字矣曲禮曰獻鳥者佛其首畜鳥者則勿佛佛者抝戾而不從之言也又釋名曰轡佛也言牽引拂戾以制馬也是佛即為拂而古文拂作􅀢又作􅀈古人觀象而後制字以兩弓从一矢拂之謂也是佛者拂人者也其棄父母離妻子山河大地一切而歸於空皆拂之謂也以佛為覺葢譯者尊信其說而故為此美釋耳不知西方本来果以佛為覺乎即此一字而譯者失之則五千八百卷中皆以漢語譯之者一一皆西方本来意義乎請以質之事佛者瘧病聖人周武王克商之二年即病瘧是瘧且病聖人也何問君子周公雖以身代告天然武王竟以此疾不起乃知人之夀夭皆定於天雖忠如姬旦亦不能囘天也大麓辨書堯納舜於大麓孔安國輩以為大録萬機之政而桓譚新論亦以為領録天下之事若今之尚書然故東漢始以牟融録尚書事葢本於此後代多因之故有以大麓為三公之位者王克己非之矣張九成曰處之深林大澤之間謂觀聖人者皆當自其難堪處觀之耳堯之知舜豈待以難堪者試之㢤惟大傳曰堯推尊舜屬以諸侯致天下於大麓之野應劭云麓者林之大也鄭康成云山足曰麓羅長源得之其說曰古者天子以大事命諸侯則為壇於國之外堯聚諸侯以命舜陟位居攝致天下之事欲天下諸侯皆明知舜之受命也是可以剖千古之惑但長源又云因地譬意大麓者大録天下事也是又於前妄未盡袪也余謂納于大麓烈風雷雨不迷者或當納麓之時適有烈風雷雨而舜偃然自若殊無驚佈見其鎮定耳夫震雷虩虩不喪七鬯舜能不迷於烈風雷雨此非超越尋常足以當天下之大任者乎故舜之授禹亦有納麓烈風雷雨之事葢告終易代皆上關天意堯授舜舜授禹而納于大麓皆有烈風雷雨或天以此而試舜禹亦未可知故當此受禪之日烈風雷雨不迷是足以任天下之大而天遂與之矣如後代有禪位者登壇之日雷雨震電遂至顛隕不能成禮者視舜禹之不迷益可見也此謂天以此試舜禹理或有之而堯以此試舜舜以此試禹則後儒之妄也經與傳各行漢初為傳注者皆與經别行春秋三傳之文亦皆不與經連故石經書公羊傳並無經文至馬融為周禮注乃云欲省學者兩讀故具載本文是後漢以来始就經為注也三字名辨人名未有三字者楊用修以戰國董之蘩菁謂之蘩菁是三字名也余不敢以為然左傳介之推燭之武介與燭皆地名兩之字皆語助非名也董之蘩菁之字即同介之推燭之武之字猶云稱楊用修楊之用修云爾論語微子篇論語微子篇凡十一章一微子去之次栁下惠三黜次孔子去齊去魯次楚狂次長沮桀溺次荷蓧丈人次逸民次太師輩去周此皆門人叙述聖賢出處大致而於末乃綴以周公謂魯公章綴以周有八士章者何居余謂周公謂魯公章大意言所厚者薄則無往不薄親而可施又何有於賢士大夫大臣不以則必愎狠而信任小人無大故而棄故舊則新間舊小加大矣求備一人則賢才有弗獲自全者矣此尚可仕於其朝耶非此四者聖人固不忍去其國也故三人之或去或死栁下惠或絀或處孔子之去齊去魯樂師之適齊適楚意可知矣彼接輿沮溺輩何足以語此㢤而終之以八士者葢慨慕於盛朝謂八士何幸而生於其時以樂行其志不至於為三仁為栁下惠為樂師云爾甚矣孔門弟子善於述聖志也二王名字之繆字學之難不特今人也晉人善書苐不甚解字義如王氏父子名羲字逸少名獻字子敬殊不可曉羲有純義於逸何與獻有成義於敬何與父名羲子名獻尤為可笑禮含文嘉曰羲者獻也後漢書王莽𫝊立斗獻獻音羲禮器羲尊即周禮獻尊故叔獻亦作叔戲戲與羲通故羲與獻通父子立名豈可茍者羲獻名雖異而義則同甚矣晋人之不識字也針砭藥餌世皆知神農嘗百草而孔叢子及世紀皆謂伏羲已先為之并制九針以拯夭枉余意百草之嘗始於伏羲而特詳於神農耳余又按靈樞經岐伯對黄帝以九針是針亦古已有之矣非始於黄帝也治病者惟針之效最神疑古先有針而後有藥餌也針本以石為之名曰砭後世乃易以金耳故曰藥石者謂藥與砭非謂金石之石也冦莱奢儉不同冦莱公寢處一青幃二十餘年時有破壊益命補葺或以公孫𢎞事靳之公曰彼詐我誠雖弊何憂然知鄧州時製花蠟燭不㸃油燈罷官日厠溷間燭淚在地徃徃成堆何此奢而彼儉也青幃之弊豈真異於公孫觔斗今人以頭竪於地以脚畨上為觔斗戲諸書皆作觔斗惟孫吾與韻㑹定正於十五堅末収跟字注脚跟也又跟頭戲倒頭為跟也或作􅀈則觔斗字當從孫吾與為跟頭謂以頭為跟也今作觔斗兩字皆誤劉表工書今人皆知臨池家有鍾元常而不知元常有同學友胡昭又不知元常與昭皆受書法於劉景升也董北苑曰劉景升為書家祖師鍾胡皆其弟子昭肥繇瘦各得一體耳今景升遺蹟絶無存者藝文志有劉表集亦已久亡獨三國志載表與袁尚兄弟書其筆力不减崔蔡之流而表初又為黨人在八及之列其文行如此宜乎書法之工也有餘不足人間世自有參差不能如一者自是正理如周天有三百六十五度四分度之一夫三百六十度可矣而必加之五又加之以四分度之一一嵗有十二月二十四氣三百六十日宜無餘欠矣然氣則盈而朔則虛故律之數必有空積忽微𤣥之數亦有竒零假借是天地造化猶不能無有餘不足而况於人乎水銀水銀一曰汞廣雅謂之澒音同本草圖經曰水銀生符陵平土今出秦州商州道州邵武軍而秦州者来自西𦍑乃於山石中採麤次硃砂作鑪置砂於中下承以水上覆以盆器外加火煆養則煙飛於上水銀溜於下是以人力製之而後成者陶𨼆居曰水銀有生熟生符陵平土者是出殊砂腹中亦别出沙地今不聞有此至於西𦍑来者彼人亦云皆燒煅也及按西粤志云泗城州出水銀取之之法以人其用人從外境市之或逃走僮僕或姧商縳雇役人徃售至其家初以酒飯飼之三日即引至水銀坑中挖窟埋之露其首三日其人癢不可忍號呼徹天乃以鐵鏟去其首仍埋之數日取出則滿腹膓胃指甲骨髓中皆水銀矣安南國近慿祥州地亦有水銀坑取法同是與本草異也焦仲卿妻焦仲卿妻劉氏後人常悲其以嚴姑見逐卒能守志殺身余讀其詩氏非賢婦也姑雖呵責始未相逐乃氏自請去耳一還其家為弟兄所逼遂適太守之郎君此可謂守志不移耶其舉身赴清池乃遇仲卿於途要之以死恐非其志也夏世最文夏尚質周尚文余以為夏固不質而周亦不文也無論夏之九鼎以圖像物者想其工巧必非周所能作即今攷古博古二圖所載周之鼎彞諸物已不能如商之工巧何問夏㢤又如禹貢一書其文章之妙亦豈周書諸篇所能彷彿乃知天下至文必在於質以文為文其文陋矣字學之難漢興尉律太史試學童能諷誦籒書九千字課以八體乃得為史吏民書式不正輒舉劾之石建為郎中令奏事下建讀之驚恐曰書馬者與尾而五今乃四不足一獲譴死矣字學之重如此乃馬援上書臣所假伏波將軍印書伏字大外嚮城臯令印臯字乃白下羊丞印四下羊尉印白下人人下羊即一縣長吏印文不同恐天下不正者多符印所以為信邑所宜齊同宜薦曉古文字者事下大司空正郡國印章是當重字學之漢而印章乃朝廷大信猶差謬若此况今日不講字學之時乎班固賦用騶虞毛詩騶虞序曰蒐田以時仁如騶虞也班固兩都賦遂以騶虞為蒐田之名而曰歷騶虞覽駟鐵然則詩言睢鳩以美后妃之徳今之呼賢婦人者亦可以睢鳩呼之耶翡翠屑金翡翠屑金人氣粉犀古有是語余嘗試之人氣粉犀誠然獨翡翠屑金不知其解偶閱一小說乃知玉有名翡翠者其色如翡翠以之磨金隨手而屑但此玉世不常有未知然否服玉屑魏李預好服玉屑而不戒酒色遂至病篤乃謂妻子曰服玉者必屛居山林排棄嗜欲余謂守此二言何必服玉西方聖人辨列子述孔子西方有聖人之語林希逸謂即佛也至今學者皆然其說惟邢延舉據國語有云西方之書有之曰懐與安實疚大事注云周詩有誰將西歸及西方之人皆謂周也如列子所述孔子稱西方聖人果有是語當謂文王於佛何與余得此為之豁然苐隋王通自稱儒者亦指佛為西方聖人何惑乎今之世也齊鏄鍾銘妣母也考父也父先母後周齊侯鏄鐘銘皇祖皇妣皇母皇考既云妣又云母先言母後言父未詳其義鷫鸘鳯之自西方至者曰鷫鸘至則主疫不祥鳥也古人乃以其羽為裘不知其解花蕋夫人孟蜀時花蕋夫人有宫詞膾炙後世然夫人在蜀不足多也蜀後主之母順聖徐太后及其姊彭王之母翊聖太妃尤能詩乾徳中姊妹以巡禮聖境為名凡駐輦處皆有題咏鐫於金石今載在豪異秘纂者數十篇皆綺麗有致殊非粉黛口吻其風格出花蕋上尚數塵也獨前後二主文詞不少槩見諸妃后得無對牛彈琴乎後人以蜀之亡皆由於此余謂不然周之后妃篇章具在而周道以昌夫婦人能文亦何足損乃公事且孟蜀之國事可知即非二后亦能保其不亡耶余按諸傳記花蕊夫人姓費陶九成輟耕録曰夫人乃徐匡璋女實拜貴妃號曰花蕋者以喻其美也不知與順聖翊聖同族否胡蜀之徐氏女能文若是衆也疑耀卷二
