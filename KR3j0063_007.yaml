body:
  text: 疑耀卷七明張萱撰纂修恩賞今制有經筵頭修書尾之說謂經筵初開在事者俱被恩賞若繼進者不與也修書之初無恩賞書成進御恩賞方行然每修一書常至十餘年始能完進其中雖有纂修之勞而先或物故及遷别官者皆不追叙惟據進書時見在諸臣恩賞及之而已宋元祐間祕書丞劉恕與修資治通鑑及書成而恕先卒恩賞亦不追叙祕書少監劉攽等上言乞依黃鑑梅堯臣例官其一子則特典也今當事者能援劉恕故事建白行之亦右文之一快乎看畫時知孤寒宋文潞公當國時有某甲官人者收得一名畫如李成山水之類某乙官人借去模一夲送與文潞公一日出示衆賔某甲偶在坐一見而笑曰得非某乙所獻乎潞公驚曰何以知之某甲曰真夲乃某家所藏數日前某乙嘗借去恐其模一夲以獻耳潞公驚甚曰不知可以借來一觀乎某甲曰可遂命取來潞公凝視兩夲久之曰畢竟某乙者是真衆賔亦相與和曰某乙者是真某甲更不作聲而退明日有問之者某甲嘆曰某于昨日論畫時方知此身孤寒此話柄古今同之不足訝也驢牽船北地凡百可以代人力者皆用騾驢余嘗欲以驢牽船然世未有見者偶閲元宋正獻公集有驢牽船賦則在濁漳非北地也正獻廣陽人名夲字誠夫醴魯元王為穆生設醴說文一宿熟曰醴今人罕得其法元宋正獻集有雞鳴酒賦序曰將陵李懷德甫家善釀一宿酒法以米三升用水以碗計者倍乃粥之入麴八兩酵半麴以飴為酵殺四之一加麥糵少許和之適宜造于燈時比曉熟矣味甘且醇劇飲不醉豈即醴耶龍無髓龍無髓若有髓者蛟也元時有善墨名黑龍髓謬甚不信夷齊扣馬夷齊扣馬事千古未有致疑者王安石獨不信有詩云孟軻勸伐燕伊尹干說亳扣馬觸兵鋒食牛要祿爵少知羞不為況彼皆犖卓史官蔽多聞自古喜穿鑿此亦一說也頴師彈琴詩韓昌黎聽頴師彈琴詩歐陽文忠以語蘇東坡謂為琵琶語而吳僧海者以善琴名又謂此詩皆指下絲聲妙處惟琴為然也若琵琶則格上音豈能如此而謂文忠未得琴趣故妄為譏評耳余有亡妾善琴亦善琵琶嘗細按之乃知文忠之言非謬而僧海非精于琴也琴乃雅樂音主和平若如昌黎詩兒女相語忽變而戰士赴敵又如栁絮輕浮百鳥喧啾上不分寸失輒千丈此等音調乃躁急之甚豈琴音所宜有乎至于結句淚滂滿衣冰炭置腸亦惟聽琵琶者或然琴音和平即能感人亦不宜令人之至于悲而傷也故據此詩昌黎固非知音者即頴師亦非善琴矣齊醮齊與醮義異而事同羽衣家鮮能辨之靈寶大法引廣成曰醮者祭之别名也牲牷血食謂之祭蔬果精修謂之醮河圖經品三洞之中凡有二十四等醮與齊法相類并諸雜醮法凡五十六門以太上為主北斗為宗是三洞既有二十七等之齊復有四十二等之醮也後世乃謂靈寶立齊正一有醮乃于齊後散壇改正一銜易正一服而後設醮謬矣夫醮三洞皆有之況散壇之醮乃齊事告終酬謝真靈耳豈宜改銜易服别作一式乎婦人在軍中自古出師未有婦人偕行者故杜工部有婦人在軍中兵氣恐不揚之句庾子山奉報趙王出師在道賜詩之作乃云錦車同建節魚軒異泊營軍中女子氣塞外夫人城是趙王宅眷皆在軍中矣磁器宣和格古論古人稱磁器皆曰某窑器某窑器不稱磁也惟河南彰德府磁州窑器乃稱磁耳今不問何窑所製而凡瓦器俱稱磁誤矣視草之義古人稱視草者謂視天子所草也古者詔令多天子自為之特令詞臣立于其側以視所草何如耳故漢武帝詔淮南王令司馬相如視草非令相如代筆也今典制誥者皆代天子筆非視草之義而稱視草不亦謬乎眼鏡閩廣之間有製眼鏡者老人目翳以懸目中則毫髮立覩古無其製獨劉跂暇日記中載杜和叔鞠獄取水晶十數種以入初不喻其意既出乃知案牘故暗者水晶承日以照其文立見此眼鏡之所由製乎不合時宜東坡一日退朝食罷捫腹徐行顧謂侍兒曰汝輩且道是中有何物一婢遽曰都是文章坡不以為然又一婢曰滿腹都是識見坡亦不以為然至朝雲乃曰學士一肚皮不合時宜樣子坡乃捧腹大笑余謂朝雲之言即前兩人之意也古今不合時宜者孰有出于文章識見乎若無文章無識見又何不合時宜之有皮船椽矢宋太祖為周殿前都虞候時率兵圍夀州嘗乘皮船入夀春不知皮船之制何似又夀春城上發連弩射之矢大如椽不知其弩之大亦何似絹易首級宋太祖謂遼人精兵不過十萬欲以二十匹絹購遼人一首計用二百萬匹絹則遼人可盡今制首虜一級賞銀五十兩是重于二十匹絹然嵗費四百餘萬金往往不能易一首級何也王勃千嵗厯王勃以推步自名作大唐千嵗厯其言五行之運以土王者五十代一千年以金王者四十九代九百年水王者二十代六百年木王者三十代八百年火王者二十代七百年夫五行相禪豈有參差若土德獨長或亦分旺之說而水德獨短何也勃或有見惜其書已亡不得而詰耳赫胥氏古有赫胥氏一曰赫蘇氏古蘇胥通傳謂赫然之德為人胥附故云是胥為共義又云胥者胥史之意謂隆名不居而以胥史自況也未知孰是曷字辨曷從曰從匂曰者辭也匂者聲也無義葛天氏之幣葛字從土從曰曰乃古之合字即為聲也曷與堨同所謂田堨田堨土事古人曷多作又說文葛蓋也與􅗾皆音蓋集韻蓋覆也居曷切蓋曷盍三字古通故曷作盍旦渴碣夲從盍堨碣一從蓋䡷礚􅯳一皆從葛世不知爾李虛中以疽死今之祿命家言云子平者其說始于唐殿中侍御史李虛中也苐虛中以服水銀疽發背死不知其曽自推算否九還北斗一日一夜一周天天降地騰從寅至申為七返却到坤處為九還此宋張景之說也天地且不可無還返之說況于人乎故養神者先氣氣先養腦腦先養精精先養血血先養水天門開宋王文正公旦幼時見天門中開其中有公姓名龎莊敏藉帥延安日中夜恍惚見天象成文云龎某後十年作相當以仁佐天下凡十字余初以為誕及余師趙文懿公嘗謂余言丁卯嵗在齊屋中忽見天門開上有金甲神人現形數刻因呼同忩者出視之皆不見惟公獨見也次年即登第後果大拜乃知王龎二公之事不誣在齊聞韶子在齊聞韶曰不圖為樂之至于斯言不圖以帝王之樂而作于諸侯之國也蓋有悲心焉三月不知肉味者悲之至也此亦八佾歌雍奚取于三家之堂意孔子不言樂夏殷之禮子能言之而不及樂鯉趨過庭訊以學禮亦不及樂豈以禮具而樂即存耶夫古樂之亡久矣即孔子亦無得而聞也若告顔子為邦而終之以韶舞則于齊嘗聞韶惟顔子或足以知之耳譜系之學氏族譜系之學我朝廢而不講即講之亦必不能精自昔已然矣如賀氏楚出而慶亦為賀來夲郲後而來纎亦為來孔氏宋後而孔達出于衛孔張出于鄭陳又有孔寧齊又有孔虺孫氏晉出而一出於商一出於衛漢荀卿又曰孫楚宋皆有司馬楚衛皆著子南周楚之王孫既異于衛秦宋之王臣復别於楚諸國之分侯姓三代之殊王氏不可勝數矣至于後世兵火饑疫離析流亡又有違諱避仇隨母假養寄冒之類紛然雜出如之何考之封禪封禪自古有之聖門絶不言及者管仲曰惟受命之君乃可行是一代始一行之也又須考瑞崇德故商有天下六百年惟行于湯周有天下八百年惟行于成王孔子之時天命未改故不必講求也第六經之中亦未有論及封禪者惟見于大戴禮嘗以為疑先儒謂舜類上帝及柴燔岱宗皆封禪也然既曰一代一行則柴燔岱宗之事乃五載且更舉矣即以之為封禪所不敢安能耐通古耐字多作能能耐古通用而義各有在史漢髙紀耐以上請之是也耐者去煩毫而不至髠故耐亦音耐後人耐辱耐久假借以書之爾若以能忍為耐自有朝䇿能寒能暑之例楚辭荀子皆以能讀如耐是也老始學詩昔人有年過五十始學為詩竟以詩名者杜少陵平生之詩千四百五篇斷自贈韋左丞二十二韻為始以年譜考之亦且四十餘矣贈韋之作追憶少年壯逰之詩厯述往昔逺比曹楊近交崔魏然其盛年之詩未有傳者夔州以後益老矣黃魯直八嵗有送人赴舉詩云送君歸去玊帝前若問舊時黃庭堅謫在人間今八年晚年竟自刪去不收集中余不能詩幸今猶未五十再三年乃學詩未晚也苐恐玩愒嵗月耳禮部韻禮部韻略初僅九千五百九十字續􅑙六十有五字分為五聲二百六韻其間通用獨用各别若欣淳覃咸音相近而不同韻者多矣至于冬東魚虞清青語麌御遇徑徑錫昔以字母推之宜可同韻豈不得附于先仙覃談通古之例何乃隔别而不許通押耶麻韻從奢以後馬韻從寫以後禡韻從藉以後雅音别之宜當小異豈不得用歌戈哿果鄰韻之例又何其纎悉于他韻而濶略於此也況變𨽻已久字文猥多知音罕逢反切易舛韻家正如聚訟自唐人釋文音韻行世而士不知古音久矣易有小石易傳說卦艮為山為小石他卦别無為大石者豈說卦有脫簡耶以意度之宜曰為大小石二隂在下小石也一陽在上大石也是故介于石互艮也漸于磐內艮也夲義曰磐大石艮何止為小石亦為大石矣易中凡言石皆主艮惟困于石不主艮遇兌之下剛也故皇極經世少剛為土石土石同根在先天為巽坎故土依于石而石依于土辰石相薄在先天為震巽故辰為之聲則石為之音石之少剛與星之少陽同物故石在天則為星而星在地則為石氣類然也五經皆有韻曲禮以安民哉叶思辭以將入户叶下以將即席叶怍皆古音也如中庸樂記禮運閒居其間韻語更多夫易書禮記夲不必韻而猶有韻則詩宜無有不韻者何以周頌之韻多不叶而清廟維天之命乃通篇無韻然則所謂詩者豈曰韻語而已蓋古詩字音句律皆天然中節漢儒以後乃以訓詁求詩徒說其義不通其音試思三百篇皆可絃可歌後人泛作樂章每有不中絃歌之節者不知音故也四民古之為民者四儒與吏皆士也周禮六卿之官最為親民而獨無府史胥徒不知誰為之吏竊意興賢出長興能入治即所興之賢能為之吏也故經文亟稱鄉吏群吏此時儒無非吏吏無非儒耳古琴經典琴瑟並言魯論三言瑟而不言琴何也宋時郊廟之樂其琴以宫絃之中徽定黃鐘引上一徽即大吕商角徴羽亦自中徽引上每徽一律以與瑟合是古之琴不可聞矣余意必不如今人之弄手取聲也新調淫聲蠲瑣䋴㔢余名之曰琴之異端火鈐道家有火鈐之說鈐金也火鈐言火與金也夲出儒書道家竊其緒耳河圖之為洛書也二七合乎南者四九乘之四九合乎西者二七乘之圖體而書用也五五天數從橫十五則金火易位矣五六地數縱橫十八則水土易位矣聖人不言地數但以天數二十有五著于洛書者金火入用之妙在焉水中有火故甚雨必電電之下為火光火中有金故震電必霆霆之末為聲度人經言擲火流鈐黃庭言火兵符圖又言火鈐冠霄人身中各有金火天丁流金火鈐非外索于鬼神也天以金火行人以金火生用于祈禳容有是理然其學以神霄為宗此林靈素之幻妄也苐以政和之崇尚竟致炎運之中否火反克火曾不能救玊帝之子以長生青華之君況後數百年猶望其有靈乎祀孔子之始自古之學必先釋奠于先聖先師釋禮記者謂詩書禮樂各有師若夔龍伯夷周孔皆先聖先師也故蜀殿畫繪古聖賢其所祀者不止一孔子至唐開元二十七年始専祀孔子而以其門人為配凡今州郡通祀社稷孔子承開元之制也自古仲春季秋入學合樂取斗建日纒卯戍合氣以合樂也唐始定春秋二仲上丁至宋政和四年太學雅樂成凡今釋奠用樂承政和之制也曾㸃鼓瑟曾㸃浴沂之事或是前時群浴因言志或是想像寓言非真浴也若前時群浴此時對師誇說似非答問之禮若託興寓言無乃荒誕于師友之前是狂者又一不讓也宋熊朋來善鼓瑟嘗作瑟譜自言嘗倚瑟三誦覺得春入沂歸猶𢃄韻語當是所鼓之瑟曲如此時曲終道語及之亦是一說曾㸃非有意安排求異三子者三子言異日行志曾㸃說當時瑟曲聖人喟嘆與㸃亦以瑟之曲也古者瑟有歌有語有道道者古人瑟歌之餘以其曲道說一遍故曰道如賦家之有亂也故朋來云然不是真浴沂亦不是寓言也乞墦孟子乞墦章先儒疑章首有闕余意不但闕孟子曰三字而已嘗合上章誦之因思七篇中别無瞷字此二章以瞷夫子瞷良人洊言之當出于一時也竊意儲子更有問答若曰人皆可為堯舜而不得為者何也遂及乞燔事韻釋瞷與觀皆視也因齊婦之瞷言君子之觀君子存之則堯舜與同庶民去之則妻妾不羞其分路處有相關者因知二章未必同余以兩瞷字疑其同蓋自君子觀之則知齊人所以不得為堯舜矣石介七十喪未葬宋石介自言石氏自周漢已來至于宋百餘祀自高曾以降至于七世孫有七十喪皆未改葬遂以書干王舍人君貺須五十萬書云先人沒祿賜絶故不免于凍餒不知先人存日祿賜不乏不以改葬七十喪何也世之緩葬者固不少然亦未有自髙曾而下七十喪之衆皆不葬者豈拘于堪輿之說耶其云不改葬者假葬也古有假葬三年即吉之條晉郤詵母亡便于北堂壁間下棺謂之假葬三年遂即吉衛瓘以其不應除服而議之介既云七十喪未改葬則祖喪亦在其中而先人乃仕宦如彼豈不應除服之議不行于宋耶介賢者余偶讀其書不能釋然也帝王之後皆蠻夷閲諸傳記古帝王之後多為蠻夷戎狄巴人出于伏羲𤣥氐羌九州戎出于炎帝諸蠻髦民党項安息出於黃帝白民防風歡兜三鱙出于帝鴻淮夷允夷鳩蓼羣舒出于少昊昆吾滇濮歐閩駱越出于髙陽東胡儋人暴輿吐渾出於髙辛胸奴突厥沒鹿無餘出于夏后夫中國姓氏譜系且不可據而謂蠻夷戎狄皆系于帝王其可信乎昔元魏自謂蒼林之後慕容自謂厭越之後赫連自謂伯禹之後亦猶安祿山自謂昌意後耳古帝王有知能不髮指文天祥考陶宗儀輟耕録元至元間文丞相天祥有子出為郡教授行數驛不病而卒士人皆以詩悼焉閩士翁某者有曰地下修文同父子人間讀史各君臣蓋誚之也余不以為然子即不肖亦豈肯忘父事讐耶元人見丞相不屈于元故誣以子復事元耳及按宋史丞相僅一子景炎三年丞相屯軍麗江浦時軍中疫起子與母皆死于麗江是丞相無子又按丞相集中紀年及丞相集杜句諸詩丞相有二子與丞相母曾夫人俱以疫死麗江者十三嵗名道生歐陽夫人出也次名佛生則黃夫人所出景炎二年空坑之敗黃夫人携之以竄遂失所在故集杜句第一百四十三章小序佛生已死第一百四十九章小序曰吾有二子是丞相之子又似止有道生佛生皆物故矣丞相囚燕京于辛巳年正月元日嘗為書以付男升則弟璧之子丞相撫以為嗣者也宗儀所誣事元者豈即升耶丞相被誅升既襄大事且廬墓三年矣非不肖者豈復事元乎若是則丞相未嘗無子特非丞相所出耳宋史即謂丞相無子者蓋隨丞相守余惠州而以城降元者丞相雖死而興復宋室一念目猶不瞑撰宋史者元人也恐丞相後人有欲為伍員者故璧也父既不忠子即事元理或有之然丞相家傳又曰丞相無子以絶人望耳丞相有二弟曰璧曰璋皆云元仁宗在潜邸嘗聞升名召見之及即位官以集賢直學士乞歸得代于南海道卒乃官其子富為興文署丞是升果嘗事元而云乞歸或亦良心時露耳苐至元至仁宗凡隔四十餘年既云至元間出為教授不病而卒矣又安得至仁宗朝復官集賢學士耶甚矣宗儀之謬也嗚呼璧之以城降于元也元主呼璧曰是能孝順我若璧者亦難為兄矣宋史既不欲詳丞相後事近代吉安郡志傳丞相者亦復草草而丞相被執時即余鄉五坡嶺麗江亦余鄉歸善地也余數四往來輒低佪不能去偶閲輟耕録故詳著焉宫詞古今宫詞唐王仲初建一百篇宋王禹玊圭六十七篇蜀花蕊夫人九十八篇宋寧宗楊后五十篇此世所共傳也宋元豐初有宦者王紳效仲初亦作宫詞百篇則世無傳焉偶于他書得其二篇太皇皇太后生日詩云太皇生日最尊榮獻夀宫中未五更天子捧觴仍再拜寶慈侍立到天明太后幸景靈宫駕前露面雙童女詩平明綵仗幸琳宫紫府仙童下九重整頓瓏璁時駐馬畫工暗地畫真容二詩亦有思致其餘必多有可觀者豈以其出于奄竪輩故不傳耶苐古今此輩能文者絶少安可以人廢言也寶慈二字宋史不載當是皇太后宫名雙童女露面則當時從幸女侍皆帕覆首也此亦宋制諸書未詳者禹錫𤣥圭禹貢禹錫𤣥圭告厥成功書𫝊直言堯賜𤣥圭此于錫字固當但正文明言禹錫而解之以堯賜不相背乎故蔡沈又謂錫與師錫之錫同言禹以𤣥圭為贄而告成功于舜也是于正文不背但沉于堯典師錫則從書𫝊錫與也禹告成功時尚為人臣而以𤣥圭贄見于君可稱與乎按爾雅錫賜也是錫止為上賜下之義若如沉說以禹錫𤣥圭為錫于堯亦猶端木賜之字子貢也以貢為賜以錫為贄終屬强解宋儒熊朋來謂五經惟尚書最難讀以古文今文既異且壁藏嵗逺殘闕既多伏生口授不無訛舛余謂禹錫𤣥圭之語上下必有闕誤書𫝊既失蔡沉亦未為得也郭公春秋書郭公胡安國以為郭亡本于齊桓公郭何故亡之語邢延舉謂春秋中所書昔無今有者皆以為災如有􅈮有蜚之類是也遂以夲草所載鳥名布穀者江東呼為郭公疑此郭公為如書􅈮書蜚之類謂昔無郭公而今始有之故書也亦太鑿矣古今傳疑不可曉者即孔子且闕之後學何必强為之說顔謝優劣昔人皆以顔謝並稱至今宗之余謂顔不及謝非止一塵謝詩竒拔意多在言外即鮑明逺初日芙蓉之喻亦止言其色澤耳未足以盡謝之妙處若顔則一以組織為工間作老學究口吻無論全集即昭明所選顔詩已不及謝詩多矣漢髙祖尊母不尊父漢髙祖得天下之五年二月即皇帝位先封髙后曰皇后子曰皇太子亦追尊其母曰昭靈夫人婦為后母為夫人豈當時禮制尚未暇講耶時太公乃遺而不封已不可解七年春正月又封劉賈及兄喜暨弟交之子肥諸人為王三月復趣丞相差次大小功臣封之而太公復未議封即羣臣亦無一言及之何也逮帝五日一朝太公家令說太公擁篲郤行帝乃大驚始下詔曰諸王通侯將軍羣卿大夫已尊朕為皇帝而太公未有號今尊太公曰太上皇帝是帝為天子已七年而太公尚為庶人也至九年置酒未央宫帝奉玊巵為太上皇夀乃曰始大人以臣亡賴不能如仲治産今所就孰與仲多羣臣皆大笑噫太公之七年為庶人也帝得無宿怨乎亦大異矣後十年太上皇帝崩雖令諸侯國皆立太上皇廟亦何益哉更可異者太上皇之號秦始皇以封秦莊襄也以死者之封封生者季不讀書信乎九州考禹貢九州雍梁荆豫徐揚冀青兖周禮夏官職方氏之九州則無徐梁而加幽并漢地理志謂監二代改徐梁二州合于雍青分冀為幽并爾雅亦以并為營故先儒謂禹貢之九州乃唐制而禹因之也余按真源賦伏羲别九宫因置九州法語亦曰伏羲作八卦分九州周公職録又曰黃帝受命風后受圖割地布九州則九州又非始于唐而先儒誤矣余意九州斷非始于夏商特九州之名至禹而始定耳第未知伏羲黃帝時九州之名與夏周同否誅少正卯孔子攝相事七日即誅少正卯此固去惡欲速之意然亦以其非真相也特攝之耳其不待八日九日者安知八日不遭逐而九日不失位乎七日之內萬一女樂至則吞舟終漏網矣此七日而誅少正卯非失于欲速也蓋有深意也郭汾陽二十四考辨郭汾陽二十四考書中書余嘗思之不得其說汾陽以天寶八載始為左衛大將軍至德宗建中二年卒于官夀八十五其在事僅三十有五年耳及為中書令乃德宗即位建中元年也是為中書令未滿二年安得有二十四考耶今汾陽傳明言以身係安危二十年校巾書考二十有四此何謂也因閲唐書職官志凡入仕之後遷代則以四考為限此武德初年所定考叙之制然亦未著若干年為一考又閲唐考功令百司之長嵗較其屬凡有四善四善之外有二十七最疑二十四考即二十四最而汾陽所居官又止與兵士調習戎裝克備為督領之最賞罰嚴明攻戰必勝為將帥之最二條相合耳且未嘗為人屬吏也其非二十四最可知況中宗朝盧懷愼疏凡百官在任未經四考不許遷除𤣥宗二十五年詔考課官人三年一奏永為定式二十七年赦文亦云三載考績歷肅至德守而未變其云嵗終之課正如今外官季報年報之考語非大計之考也故汾陽當時亦三年一考無疑如二十四考則為七十二年是汾陽十三嵗即入仕也史傳固未言汾陽若干嵗入仕其斷非十三嵗明矣或者又以考功員外郎李渤議嵗終考校宰相而下升黜之名第其時以宰相段文昌為下考則一年一考汾陽在事三十五年故亦得二十四考耳余又按李渤為考功員外乃憲宗元和二年則汾陽捐館久矣余臆斷之汾陽有大功與諸臣不同豈其或行師或出鎮每有一功即為一考耶其云校中書考者亦每一考即紀録于中書省云耳非以居中書而考也考古君子幸是正之薛居正子婦張齊賢亦宋之名相也故相薛居正子婦柴氏無子欲攜資産改適齊賢而為居正庶子安上者訴於真宗既足掩口矣安上不肖真宗著令不得貿其居第而向敏中則貿之於是柴氏憾安上并憾敏中亦訴於真宗謂敏中嘗求娶己不許故隂芘安上此一嫠婦也而兩相君皆欲娶之豈以資聞抑以色重耶漢書古本今世所行史記漢書未必皆舊本也宋仁宗朝詔胡瑗定雅樂益州鄉貢士房庶嘗著樂書補亡云嘗得古本漢志論黃鍾起數脫去之起積一千二百黍八字則古本漢書與今世所行者不盡同矣墨今世有新都方建元者為墨譜又有程君房墨苑皆行於世其中所裒集皆一時名公筆也然未有能詳墨之所自始者上古無墨以竹揵㸃漆而書中古有黑石可磨汁以書或云即延安石液也晉陸雲與兄機書曰三臺上藏石墨數十萬斤不知即此石否第又云燒此消可用然烟中人又疑此石燒之為燼乃成墨非磨汁即成墨也魏晉間始有墨丸則以漆燒烟和松煤為之晉之後乃有螺子墨但陸雲送石墨與兄機已云今送二螺則墨之名螺自晉已然特未制之為螺也名之曰螺亦是丸子猶未製之為片也故米元章畫史謂晉人多用凹心硯正以磨墨丸貯墨瀋耳至唐初髙麗嵗貢松烟墨用多年老松燒烟和鹿角膠為片與魏晉間墨丸以漆燒烟而不用膠者異矣唐末墨工奚廷邽乃倣其法然亦止用烟膠宋熙豐間有張遇者供御墨始用油烟入腦麝金箔謂之龍香劑其法遂至今不改世第知廷邽之墨入水不渝而不知其法蓋出於髙麗也與張遇同時者又有葉茂實最得法清黑不凝余故表而出之以補墨譜之闕璽印古者天子未有璽璽之一字始見于周禮之九節有璽節也鄭康成謂即今印章止用之貨賄而已節所以合之而璽所以封之也然掌之者小行人非天子也左傳季武子取卞使公冶問襄公璽書追而與之諸侯有璽始此故秦以前民皆佩璽金玊銀銅犀象皆方寸各佩所好至秦惟天子始得稱璽諸侯而下皆不得言璽而曰印丞相將軍曰章中二千石亦曰章千石六百石四百石亦曰印是章與印一也皆古之璽也而天子言璽蓋自秦始也然皆以組繫而佩之余嘗見漢銅印匾而方大僅一寸許紐中有圓竅以容組按古今考方回曰印之背即謂鼻紐印之面即印文篆鐫字空處為竅而以組穿之是組又不穿于鼻紐也豈用時即解去其組而用訖復穿以組耶然余見漢印甚多未有於篆文空處作孔以穿組者不知方回之說何所據又古者百官印皆佩於腰故曰丈二之組南部新書三十四司部官印悉納直㕔每郎官交印時吏人繫之於臂以相授繫腰繫臂所以皆謂之佩也楊虞卿為吏部員外郎始置匱加鎖以貯之蓋以今之印重而大既非腰與臂所宜非貯之於匱蓋不便矣是印之有匱自宋始也若今之印有牌以稽出入有胥吏主之在宋謂之印司則今之印牌亦自宋已然也不施其親論語君子不施其親何晏以施為易言不以他人之親易已之親也邢昺從之開元五經文字以施為廢弛故陸氏本作弛朱考亭從之余按諸子書施皆為殺而肆之故內則施羊施麋施鹿施麕左傳秦施冀芮晉施邢侯與叔魚於市山海經殺而施之晉語從欒氏者大戮施莊子萇𢎞肔肔即施也史記施陳餘周公首戒伯禽以不施其親者正謂親者不可殺也親而可殺是于所厚者薄則無所不薄矣又何有于賢士大夫故秦二世之殘骨肉晉朝之戕宗室賢士大夫尚可仕其朝耶微子一篇皆論出處大致而以周公謂伯禽章次于中其亦九經以親親繼尊賢之意乎商之後獨盛于夏周舜典所稱伯禹以下二十有二人而禹之功最大故踵舜以興身有天下矣稷養契教功亦不在禹下而于天下未能身有之惟子孫始繼世光大焉稷之後為成周天地文明萃于一代契之後亦數生聖賢而商之賢君比夏與周又再多者何也開闢以來未有性命之說至湯始言降𠂻恆性也其萬世道學之祖乎故不獨能身有天下即其後王若大戊盤庚武丁皆能著書立言雖凌遲之末猶有三仁焉微子宜有商而避之弗父何宜有宋而又避之至孔父嘉乃别為公族而受氏五世之後復生聖人為萬世帝王之師是二十二人之中契之明德豈夏與周所能及乎几古者室中度以几故古人以几名室者以諸器制度惟几有考工之遺法也今稱方丈函丈即此意君子朝與燕坐則設几而不敢倚几之義重矣哉故丹書之銘誦訓之諌曰無即安于几禮也黃山谷不言命黃山谷道機禪觀皆臻其妙獨不言命其詩文為星命家作者絶少其與趙言桞彥輔兩人一方士一日者僅見于外集遺文而已觀其志非熊之墓慨嘆夫命之不可恃日者之不可憑猶曰此為非熊嘆耳若其答林為之有曰由命非由拙而放言亦云廢興宜有命乃知君子不可不知命罕言之可也梧桐自生鳳鶉火之禽桐大火之精梧桐嘗以三星見而放葉火西流而落葉鳳非梧不棲以陽從陽也一說凡燒餘赭黔之土心星照之則梧桐自生是梧桐乃自生之物非待于種也故詩曰梧桐生矣用字不茍如此書經今文古文六經自易而外惟尚書最古亦惟尚書最難讀自孟子已不能盡信而況㷊滅之餘口授壁藏僅有存者科斗隸古文字屢更今所讀者皆今字也能與古文盡合乎然古文尚書未必古今文尚書未必非古至若典謨分合不同則不能無疑耳能取舜典二十八字刪去乎洪範康誥梓材諸篇未免錯簡多士多方先後失次能以集傳武成之例而改定乎亦右文之世所當講也拆字法易卦雖先聖之書而于後世小術亦相同者宋人胡易鑑者能以易卦拆字知吉凶于咸其輔頰舌得癸丑狀元于臀無膚得丁未探花蓋字文臀即尻也殿諧其聲乃以無膚去肉為殿頭之祥而以卦爻第三知其名次以拆字法也易鑑嘗有易說行于世必有可觀者惜今不傳矣石介不能書偶友人持宋人真蹟相過賞鑒者中有石介行書二十餘字其遒徑不减蘇黃米蔡諸公余嗟賞久之蘇黃米蔡真蹟在世不乏石公此蹟真鳳尾麟角矣偶閲徂徠集歐陽永叔嘗以書與介言介字怪而且異古今皆無天下非之介復永叔書言自幼學書至于壯積二十年訖無所成且不能自寫一刺必倩能者或時急要文字必奔走鄰里祈請于人則介不工書明甚又云屑屑致意于數寸枯竹半握禿毫將以取髙于人特六藝之一耳善如鍾王妙如虞栁不過在君人左右供事圖寫近乎執技以事上者此皆强辨以解說其無能者也前友人所藏為僞蹟益明矣疑耀卷七
