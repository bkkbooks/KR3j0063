body:
  text: 疑耀卷六明張萱撰茶古人冬則飲湯夏則飲水未有茶也李文正資暇錄謂茶始於唐崔寧黃伯思已辯其非伯思嘗見北齊楊子華作邢子才魏收勘書圖已有煎茶者南牕紀談謂飲茶始扵梁天監中事見洛陽伽藍記及閱吴志韋曜𫝊賜茶荈以當酒則茶又非始扵梁矣余謂飲茶亦非始扵吴也爾雅曰檟苦茶郭璞註可以為羮飲早采為茶晚采為茗一名荈則吴之前亦以茶作飲矣第未必如後世之日用不離也葢自陸羽出茶之法始講自吕惠卿蔡君謨輩出茶之法始精而茶之利國家且藉之矣此古人所不及詳者也林逋林逋居孤山畜一鶴客至則童子放鶴逋見鶴即歸其好客如此宋江鄰幾作雜志載許洞嘲逋詩有豪民送物伸鵞頸好客窺門縮鼈頭之句葢無根之􅉪也鄰幾載之何意李畋聞見錄載和靖隠居朝廷命守臣王濟訪之逋聞之即懐詩文求見濟乃以文學保薦逋及詔下唯賜帛而已濟曰草澤之士不學稽古不友王侯文學之士修詞立誠俟時致用今林逋兩失之矣夫以和靖之髙隠而猶以詩文取譏亦不念古人身既隱文焉用之語也今之自稱山人者又何以文為哉樂府之誤樂府夲以被管絃者今所傳古樂府詞多不可讀沈休文曰樂人以聲音相傳大字是詞細字是聲聲詞合寫愈傳愈訛至今遂不得其解耳故後人作古樂府止用其題不襲其意亦不諧其調如朱鷺則詠鷺之色艾如張則詠射雉事或五言或七言或近體或歌謡皆如詠物體葢自魏而後皆然不特唐人也至扵可被管絃與否不復問矣書簡用死罪侯鯖錄謂晉宋兵革之間禁書疏非吊喪問疾不得輙行晉人書啟多用死罪死罪是違制令故也余謂不然漢董仲舒詣丞相公孫𢎞記室書已前用之矣張楚陳勝自立為王號張楚劉徳曰若云張大楚國也張晏曰先是楚為秦滅今立之為張也而師古從晏說余謂兩說皆兼為是立楚而號曰張猶大唐皇宋大明云爾王弼註利貞王輔嗣註易利貞者性情也曰不性其情何能久行其正不性其情言不以性制情也句法甚古而理亦明盡止此四字不知宋儒費幾多說話孔子責冉求季氏伐顓㬰冉有季路問扵孔子孔子不責由而責求曰求亡乃爾是過與且呼其名而責之此正寧有盗臣意王道王路洪範無有作好遵王之道無有作惡遵王之路注疏止言王之道為正道王之路為正路而已道路二字未分别蔡沉集傳亦未及解新安陳氏止云互詞叶韻耳抑何鹵莾也箕子作洪範其字豈輕下者余按周禮遂人及匠人自遂上之經至扵川上之路凢五又有經涂環涂野涂大小相異而道容二軌路容三軌是道小而路大也則作好之害小作惡之害大耳夷齊不食周粟伯夷叔齊不食周粟餓扵首陽之下葢不食周之禄非絶粒不食也古人祿皆以粟如原思為宰與之粟五秉是也時夷齊特不欲為周之臣故辭其祿耳若自耕之粟未嘗不食也餓而采薇者粟或不足有時采薇以充之非止食一薇也周土之毛即所耕之粟亦毛也程伊川之說得之特未發明耳三秦記謂夷齊食薇三年顔色不變得無誕乎宋石曼卿謂夷齊不死扵周之土而死扵蒲阪以蒲阪為堯舜揖遜之區葢有深意焉苐首陽之山散見各郡國諸家紛紛未有的據夷齊之死或在首陽或在蒲阪宜冄詳之獬豸獬豸性忠能觸不直咋不正見扵徃籍不一而足宋羅泌不以為然因引齊莊公有臣曰王國卑與東里徼訟三年不决乃令二人共一羊盟扵社二子相從刲羊以血灑社讀王國卑之詞已竟東里詞未半羊起觸之是能觸不直者羊之性也不必獬豸余因憶里中故老嘗言有重辟甚寃厯數官皆不能直有一郡守復判此獄而郡堂一鹿闖至公案上銜其文卷嚙碎之左右不能奪郡守心動遂反前斷而寃者得白是鹿性亦能知曲直矣鹿與羊凡畜也能知曲直況神羊乎能知曲直者有羊與鹿而況可謂無獬豸乎天生神物自有出扵常理之外者草木最為無知尚有指佞之草而謂無獬豸者過也苐許叔重又以獬豸似牛與神羊之名戾或羊類或牛類所不可知耳伯益之夀孟子稱伯益避位扵禹之子啟詳閲諸書伯益乃髙陽氏之子其猶子黎逮事其父則髙陽之崩益年不下四十矣厯髙辛唐虞凡二百二十載是伯益年必二百六十嵗乃及禹之傳位扵啟也堯之諸臣夀最髙者惟彭籛臯陶伯益三人而臯陶年百有六十則前聞之彭籛或云即彭祖或云非是獨未聞伯益二百六十嵗之說豈孟子别有所授耶堯舜被誣堯舜禹以聖人為之君又以聖人為之臣禪受之際昭著往䇿豈復纎芥可疑而竹書紀年謂堯之末年徳衰為舜所囚故相之湯隂有囚堯城又謂舜既囚堯遂堰塞丹朱使父子不相見故鄄城西又有堰朱城𤨏語因之亦曰舜放堯扵平陽而任昉記亦以朝歌有獄基禹囚舜故地也扵是劉知幾遂疑舜廢堯既立其子俄又奪之嗟嗟堯舜禹而猶不免於稗官小說之妄議又何怪乎秦火耶余按竹書紀年出於魏晉間是時魏晉得國無不簒弑者知無以自解於世而逢君之臣偽撰此書為主分謗耳竹書又云殷仲壬即位居亳其卿士伊尹相之仲壬崩太甲立伊尹放太甲於桐乃自立後三年太甲潜出自桐殺伊尹立其子伊陟伊奮命復其父之田而中分之夫太甲伊尹之事見於尚書孟子者不可信耶左傳曰伊尹放太甲而相之卒無怨色杜預乃以竹書而疑伏生之尚書為有昏妄則以小人心置君子腹者不獨劉知幾矣鼻天子冡舜封象於有庳即今湖廣永州府零陵縣今零陵尚有有鼻墟羅長源謂鼻庳音相近也余按幽明録始興有鼻天子冡鼻天子城今統志亦載之始興屬今南雄府而南康記南康縣亦有鼻天子城先儒或謂始屬始興今屬南康故統志於南康不載鼻天子城冡豈南康始興古皆為楚地傲象雖封於零陵及卒乃葬扵南康耶然南康始興去零陵逺甚象封扵零陵矣卒乃葬扵始興耶余竊惑之統志又云始興鼻天子墓昔人掘之見銅人數十擁笏列侍器飾皆金銀俄聞墓内擊鼓大呼懼弗敢取而返夫銅人狥葬乃出扵末代非有虞之世所宜有也此鼻天子非象明甚羅長源作路史扵古今疑誤最為詳核而亦以始興之鼻天子為庳象何也張生夢舜舜號泣扵田為怨慕孟子必有所據纂異記有張生至蒲闗夢舜召之問以所業生曰孟子舜問何人也生誦其書至號泣怨慕章舜謂孟子不能善傳其意朕之泣怨已不合於父母耳號天怨慕非朕之所行者想舜當時用意亦合如此苐所述夢中舜語謂孟子為不知而作則孔子之語也莫之為而為莫之致而致則又孟子語也孔孟生扵舜之後凡若干年舜既死而亦習孔孟語乎其誕妄如此羅長源路史亦引據之殊足掩口儒釋相通儒不可不通釋典釋亦不可不通儒書離之則兩傷合之則並美雷次宗周續之嘗從釋慧逺受毛詩鄭氏箋今世佛子多以不能習儒乃去而為釋欲其闡揚𤣥教烏可得哉九言詩古之詩自二言以至七言止耳後人有八言以毛詩十月蟋蟀入我牀下我不敢效我友自逸為八言之始獨未有九言者摯虞流别論曰泂酌彼行潦挹彼注茲指為九言余檢諸夲皆云泂酌之章章五句則非九言明甚顔延之亦云詩體夲無九言將由聲度闡緩不協金石故仲治云然耳今之詩有九言者其法非古也司馬温公之貧今制黄冊凡糧米多者自立一户糧少者共立一户此宋制也司馬温公罷相居洛中所買田宅猶以兄郎中公為户謂糧少不自立户也以宰相田糧不能自立一户亦足以㢘頑矣苐未知其産所入若何今蘭溪趙文懿公自登第以至柄國十年止守祖父遺産瘠壤四十七畆毫不加舊若其後人田宅稍饒則皆治生所致扵公無與余從公逰二十年猶未悉公及公捐館其里人數為余言如此公之相業不具論獨清修一節則司馬之後如公者指不多屈矣琴辯世本曰琴作扵神農而琴操曰作扵伏羲爾雅曰大琴謂之離孫叔然曰音多變聲流離也此伏羲之琴也樂錄曰二十七絃郭璞從之未詳其制之長短何如中華古今注曰二十五絃琴或曰二十絃皆失之而樂錄為正按伏羲以木王三與八皆木之數也故三其九而二十七為之絃耳廣雅曰伏羲琴七尺二寸則八其九而七十二寸為之長也亦以木為數也廣雅曰琴長三尺六寸六分五絃邢昺曰此常用之琴也長三尺六寸六分者象三百六十六日五絃象五行至文王武王始加大絃為君小絃為臣五絃第一為宫其次商角徵羽二絃少宫少商上曰池言其平下曰濱言其服前廣後狹象尊卑上圓下方法天地十三徽象十二月加閏此即今之琴也夫以伏羲之離而名之曰大琴乃後人名之耳比琴為大故曰大琴在伏羲時止名離不名琴也少宫少商二絃始扵周矣而减二十七絃為五絃减七尺二寸為三尺六寸六分與名之為琴也皆在周之先也不知始扵何時請以俟知者九河考古之九河諸書相傳者曰馬頰即馬篤河曰覆釡河曰鈎盤河曰鬲津河曰徒駭河即徒河皆在今濟南府境而胡蘇河簡河潔河皆在滄州又云徒駭河亦在滄州惟太史河莫詳所在自漢以來講求九河者甚詳漢世近古止得其三唐人累集積𫝊之語遂得其六歐陽忞輿地記又得其一或新河而載以舊名或一地而立為兩說要之皆似是而非無所依據至其顯然謬戾者班固以滹沱為徒駭而不知滹沱與徒駭不相渉也樂史扵馬頰又以漢馬篤河當之鄭氏求之不得其說乃謂齊桓公塞九河為一河今河間弓髙以東至平原鬲津徃徃有其遺處春秋緯寳乾圖云移河為界在齊吕鎭閼八流以自廣宜蔡九峯深折其非也夫曲防齊桓之禁也豈躬犯之即霸者輕變古而重扵自利然河水可塞而河道可盡平乎酈元水經獨曰九河碣石苞淪扵海程子宗之乃援尚書禹貢夾右碣石之文謂九河果從碣石入海今兖冀之地皆無碣石而碣石尚在海中去岸五百餘里卓然可見是九河之說當以酈元為正今之治河者輙言九河故道穿鑿求之宜乎支離而無益于河矣龍涎香龍涎香眞偽難辯按張世南㳺宦紀聞云諸香龍涎最貴廣州市直毎兩不下百千次等亦五六十千出大食國近海傍常有雲氣罩山間即知有龍睡其下或半載或二三載土人更相守視俟雲散則知龍已去往觀必得龍涎或五七兩或十餘兩視所守人多寡均給之又有說大洋海中有渦旋處龍在其下湧出其涎為太陽所爍則成片風漂至岸人取之龍涎入香能収歛腦麝氣雖經數十年香味仍在嶺外雜記云龍枕石睡涎沫浮水積而能堅鮫人采之以為至寳新者色白稍久則紫甚久則黑白者如百藥煎而膩理黑者亞之如五靈脂而光澤其氣近扵臊似浮石而輕和香焚之則翠烟浮空結而不散又一說龍出沒海上吐出涎沫有三品一曰汎水二曰滲沙三曰魚食汎水輕浮水面善水者伺龍出随而取之滲沙乃被波浪飄泊洲嶼積多年風雨浸滛氣盡滲扵沙土中魚食乃因龍吐涎魚競食之復作糞散扵沙磧其氣腥穢惟汎水者可入香用餘二者不堪往嵗有詔求龍涎香而眞偽莫辯余故錄之以廣時人耳目漢碑孫宗鑑東臯雜錄言漢碑額多篆身多隸是矣獨云隸多凹篆多凸則洪适之隸釋歐陽修之集古錄趙明誠之金石錄皆未及也豈漢碑尚有遺扵三公之見聞者耶柴桑山海經所載皆山川之大者獨未載廬山而止載柴桑之山郭景純曰柴桑山在潯陽南與廬山相連余意廬山舊當名柴桑及匡君兄弟廬之遂稱廬山耳今以柴桑别為一山而曰與廬山相連似誤荔枝荔枝之名諸書皆未詳其義扶南傳謂結實時枝弱蒂牢不可採皆以刀斧剜取其枝故以為名余按荔枝之樹甚髙大惟樹杪結實最多故採者不能攀其枝多連枝斫之耳蒂牢之說殊不然也消摩呼藥為消摩詳杜蘭香别傳蘭香降嫁張碩碩問禱祀事香曰消摩自可愈疾滛祀無益消摩謂藥余意消摩按摩也今治病者有按摩之術擊壤堯民擊壤壤以木為之其形如履前廣後銳長尺四寸闊三寸將戲先側一壤扵地遥扵三四十歩外以手中壤敲之中者為上今京師中兒童猶有此戲或以桃或以甃其擊壤之遺乎獨吴盛彦有擊壤賦曰論衆戲之為樂獨擊壤之可娱因風化勢罪一殺兩或擊之法與今不同耳以糟飼馬今京師官馬雖有芻豆之給皆為馬軍乾没日惟以枯糟飼之故雖有良馬不一二年輙斃矣海馬骨者最巨水火俱不能毁惟以糟漚之遂腐海馬神馬也其骨且畏糟今乃以糟飼凡馬乎然京師售馬者云以糟飼之可暴壯惟其暴壯是以易斃家里白樂天詩還家問鄉里詎堪持作夫鄉里謂妻也南史張彪傳呼妻為鄉里今我不忍令鄉里落他處今人言家里夲此五大夫松秦始封泰山松為五大夫此秦時第九爵也非謂五株松為五員大夫也今人相傳為一松封一大夫五松五大夫殊謬芍藥握椒毛詩溱洧之卒章贈之以芍藥芍藥破血女人無子當服之故芍藥之贈為男滛女東門之枌其卒章貽我握椒椒氣下逹可以壯陽故握椒之贈為女淫男此先儒之俚談然理或有之千文千字文劉公嘉話曰梁武帝教諸王書令殷鐵石扵王右軍書中搨一千字不重者毎字一片紙雜碎無序武帝謂周興嗣曰卿有才思為我韻之興嗣一夕編次進上鬚髪皆白南史文學周興嗣傳又云武帝檄魏文于右軍書中書千字令興嗣韻之非殷鐵石也又有一說武帝喜鍾繇書而秘書省所藏鍾繇眞蹟甚多獨年久漫滅散亂乃令興嗣韻之為千文未知孰是今世有鍾繇千文與興嗣所韻者不同乃後人偽撰也蘭香余里中製蘭香乃以土香曰白木香者為骨即今牙香粗榦也剉成片以水漬之數日去其木氣然後暴烈日下候乾燥方採樹蘭花與此香片用紙包褁復暴扵烈日凡數易花而後成樹蘭一名珍珠蘭今俗云傳扵吴商不知此薰香法在宋已有之自吾廣始不始扵吴也余閱宋葉寘論香品吾廣故有吴氏者以薰香獲富素馨茉莉柚子花皆可為之顧文薦負暄錄亦云畨禺有吴監稅者以香名豈即其人耶獨未言及樹蘭花今樹蘭花薰香盛行而素馨茉莉柚花皆未有製者試為之當不减樹蘭也樹蘭獨産廣東不見傳疏亦不知其當作何名以其花香似蘭草而木為夲故曰樹蘭其花如黄粟盛扵夏間亦可以薰茗東方朔滑稽東方朔傳有幸倡郭舍人令朔射覆中之武帝榜舍人舍人不勝痛呼號而朔嘲焉曰咄口無毛聲謷謷尻益髙舍人恚曰朔擅詆欺天子從官當棄市帝問朔何故詆之朔曰與為隱耳口無毛狗竇也聲謷謷鳥哺鷇也尻益髙鶴俛啄也獲免余謂朔之初為此語實以詆欺舍人非隱語也舍人曰幸倡必弄臣之流口無毛者少而無鬚也聲謷謷謟佞而取給也尻益髙者滛交之態也非詆欺而何然即朔之假為隠語其詆欺更甚以其無毛之口為狗竇以其仰食扵人為鷇之仰哺以其俯首而求食為鶴之俛啄皆以鳥獸之類眎之而武帝與舍人不暇察耳􅏺刺如此非自託扵滑稽何以免於世哉木棉余鄉多木棉集韻綿作棉樹髙者至於十丈其枝如桐葉如胡桃葉而稍大花如今之玊蘭花紅如渥丹一樹常數千枚春夏放花其紅燄燭天花謝乃結子剖之如酒匜其殻堅硬其中有絮皓白故曰木棉今名攀枝花吴錄云其絮如蠶所作者非也唐李琮詩腥味魚中墨衣裝木上棉則此棉亦可作衣絮今止充裀褥而已方勺泊宅編稱海南蠻人以此紡織為布布上出細字雜花卉尤工巧名曰吉貝布即古白㲲布也㲲音牒苐余郷既未有以木棉為布者即詢之海南諸蠻亦不知其制為何似或云曹溪六祖所傳信衣曰屈㫬布即白㲲布乃西域木棉心所織者余嘗見之實類褐豈西域木棉與中土不同耶范政敏遯齋閒覽又云林邑等國出吉貝布木棉為之不知六祖信衣即林邑等國所産否陶九成南村輟耕錄又云閩廣多種木棉紡績為布名曰吉貝松江東去五十里許曰烏泥涇多種之彼初無踏車椎弓之製率用手刮去子線弦竹弧置案間振掉成劑厥功甚艱國初有一嫗名黄道婆者自崖州來乃教以紡織之具至扵錯紗配色綜綫挈花各有其法以故織成被褥𢃄帨文采甚巧土人多以此致富者嫗卒土人祠焉陶九成元人也世代尚近其詳著如此余嘗以詢之松江士夫皆不知木棉為何樹吉貝為何布豈道婆者卒其織造之法莫傳故土人不復種藝此樹耶據陶說道婆崖州人則泊宅編謂海南蠻人能為此布其言不誣若六祖信衣果西域木棉心所織者則其法當如秦洮間織褐試倣其法以織木棉便可成布不必復求道婆遺法矣閩中呼綿花為吉貝其聲稍轉為家貝或云非木棉也林邑所産疑即此物又有山吉貝不堪作布朱提銀今人多稱白金為朱提非是蜀之叙州府有朱提山出銀諸葛孔明有言漢嘉金朱提銀採之不足以自食若以銀為朱提亦可以金為漢嘉乎唐韓愈贈崔立之詩我有雙飲盞其銀得朱提亦非以銀即為朱提也蜀漢不制樂三國時魏最强吴次之而蜀為最弱者非獨其土地蹙也葢人才文物亦單陋焉即以禮樂考之魏武帝常使魏襲製鼓吹曲十二章矣吴孫休亦常使韋昭製鼔吹曲如魏之數矣獨不聞蜀有製樂者豈其時救亡之不給而不暇及此耶抑其人皆樂扵軍旅不能如二國之從容文物也安得諸葛武侯起而問之分野星次之說古今卒無一定之論費直以易卦配地域蔡邕以節氣當國分皇甫謐以月律配入辰次僧一行以度為紀據河山以分其野又或以古受封之日嵗星所在為王彼亦是非此亦一是非也宋羅泌惟以九州之說為正然其說亦未能詳著扵書豈亦疑而未安耶按周禮保章氏以星土辯九州之地所封封域皆有分星以觀妖祥葢以天象而占其地特占法而已儒者不考星官不著故凡言郡國之分野者皆據成說而錄之而不暇察察之者又不能詳明故諸說紛紛不一耳今諸說不具辯姑以周禮注疏辯之賈公彦謂吴越地南而星北葢以國屬諸初受封之日嵗星所直之辰此不得其說而附㑹妄語也周封太伯扵吴夏封無繹扵越豈同嵗月乎況後之所謂吴越者不啻百倍何以皆屬此星耶秦雖罷封建後之立君長者皆此例也豈皆同此嵗月乎分野所屬唯斗牛女之地極逺星經謂毎度計一千四百六里二十四歩六寸四分有竒似渉荒唐但以日月薄蝕秒忽觀之似亦可信然其所謂里乃以鳥道計之非人跡屈曲之謂也縱一大府能當其一二度耶故以某地當某宿亦姑取其槩耳今譔郡邑志乘者即區區一縣亦曰某分野可笑矣故元僧徳儒扵此致疑而作分野辯意謂天之經星二十八宿皆屬中國分野而無餘中國之外四方萬國豈無一星分耶夫豈先中國而後及四方萬國耶又豈别有一天星宿耶徳儒不得其說欲下風膝行以扣儒衣冠而通天地人者余嘗恨不得見許魯齋耶律楚材諸公一明此說妄意以今之占法擬之葢天道流行其大無外萬象異形而同體三才異位而同神故以占法變化之神妙窺天人感應之徵騐如吴越之災祥則應扵斗牛之纒度故以斗牛而占吴越非謂吴越正在斗牛之下也史家天文志曰某地入某宿幾度而所記亦有不同葢當時占法亦異耳如東方蒼龍南方鶉尾皆以昏中而言豈曰東者常在東耶各家占法不同今以易占明之易固非瑣瑣也而曰京房曰鬼谷曰軌革之類以第幾爻為家宅第幾為牛馬第幾為舟車各各取驗正猶以某星占某地立此定格也若徳儒所論中國萬國則同此一天星宿而各國之占法自異各取徵應耳千古不决之疑豈余之淺陋所能剖苐析千慮一得故姑識之以俟知者古樂之亡古先聖王在位皆作樂皆有歌詩惟至周始大備者以一代兼數代也故古樂自雲門而下必皆有歌先聖王亦皆世世傳習以遺後人故周公得而用之耳或者謂伏羲之立基神農之下謀祝融之屬續顓頊之五莖帝嚳之六英周公棄而不用者以其過扵質也余謂不然葢嵗久制亡不可復考故不得而兼用之即周公當時亦不能無遺憾者有其存之周公自當兼用固不止監扵二代矣自漢髙帝為武徳之舞時雖叅用韶舞而更曰文始武舞更曰五徳又因秦樂人以制宗廟樂詩唐山夫人及武帝宛馬等篇出而古聖人之制遂泯故黄帝以下之詩扵是併亡矣夫公子完去陳時虞韶猶不廢即負擔流離之際不敢失墜漢興時老師宿儒當有存者扵此時能訪求之猶可存十一扵千百今秦既不師古漢又因秦舊而不復求古則古樂之亡固秦之罪漢亦不得辭其責也惜哉無逸之誤祖甲賢武丁欲廢其兄祖庚而立之遂逃為民即無逸稱享國二十三年者是也先儒見史國語皆稱祖甲滛亂遂改無逸之祖甲為太甲不信經而信史惑矣周武王十三年伐紂后稷封邰子不窋失其官竄戎狄間不窋之孫曰公劉復修后稷之業遷扵􅃎商末大王避狄遷岐傳至王季為西伯文王繼之五十年武王立十三年伐紂泰誓云十有三年春大㑹于孟津是也而書序乃以為十一年矣記亦稱十一年伐紂二年訪箕子與洪範維十三祀之數合世因疑泰誓經文為誤漢儒又創言文王受命九年武王二年伐商通十一年歐陽公著泰誓論定為即位之十一年葢因二年後方訪箕子也按經文皆稱十三而武成釋箕子即伐紂之嵗不在伐紂二年之後當以經文十三年為正河清酒蘭溪河清酒自宋元已有名苐其時已有甘滯不快之訾見范成大驂鸞錄矣在田之義見龍在田王弼注龍處扵地上故曰在田孔頴達曰六位有天道地道人道一二地道也九二是二在一上故以在田為在地上也朱考亭作夲義亦未明言以田為地余謂古先聖人立文垂訓字字的確今不言在地而言在田則在田自有在田之義非止言在地也以前諸儒亦有推廣者言田之耕稼利益萬物猶若聖人利益萬物故言在田也此說得之古祀必卜今郊祀蒸嘗之禮皆遵古制而行獨卜其吉㓙則絶不講矣愚謂他祭皆有定期可以不卜至扵今之祈雨祈晴者即雩也原無定期獨不可倣古而卜乎但古人龍見即雩乃建巳之月不待雨𤾉愆期而後舉之葢先已為民祈禱至扵雨𤾉愆期之日又復為民祈禱也今建巳之月大雩古禮亦不復行矣人奴古之為人奴者必髠其髪又以鐵束其頭以為鉗最困辱者故趙王郎中田叔孟舒自髠鉗為王家奴隨王入長安是以漢初有詔自賣為人奴婢者皆免為庶人意免其髠與鉗也若如今之為奴婢者亦猶庶人耳何必免而後為庶人哉不庭左傳以征不庭言不來在王庭者史記不庭作不享索隱曰舊夲史記作不亭亭直也征不亭者征諸侯之不直者也是庭與亭古皆通用者享字與亭字相似而訛耶今人稱日午為亭午即直午之義直午正午也星隕如雨春秋魯莊公七年星隕如雨葢星之隕如雨之降耳杜預訓如作而訓偕作俱言星與雨俱下此甚不通既星與雨俱下又是夜間胡從而辯其為星隕也且左傳上言恒星不見以為夜明星隕即是夲夜既云夜明又安得有雨乎燒酒汎荔枝余鄉噉荔枝多以燒酒汎之即製荔枝酒者亦以燒酒葢自唐已然矣白樂天有詩曰荔枝新熟雞冠色燒酒初開琥珀香欲摘一枝傾一盞西樓無客共誰嘗此一証也龍蛇歌龍蛇歌介子推作吕氏春秋司馬史記述之而劉向新序俱載此歌大同小異而說苑又以為舟之僑歌何自相矛盾若是乃知新序說苑未必盡出於劉向也爛柯爛柯之說人皆知為奕者之事東陽記信安縣有懸室坂晉中朝時有民王質者伐木至室中見童子四人彈琴而歌質因倚柯聽之童子以一物如棗核與質含之便不復饑俄頃童子曰其歸承聲而去斧柯爛盡既歸質去家已數十年矣一以為觀奕一以為聽琴當是一事而兩傳也盗跖盗跖人知為栁下惠之弟不知黄帝時先有大盗名跖者後人因惠之弟為惡故以盗跖名之今之菩薩觀世音亦古佛有名觀世音者因今之觀世音受記扵古之觀世音故亦以觀世音名之也如秦越人曰扁鵲亦軒轅時有神醫名扁鵲秦越人能醫人亦稱為扁鵲耳是柳下惠之弟及今之觀世音皆别有名字也今𨽻𨽻有古𨽻有今𨽻今之楷書即今隷也世言隷創扵王次仲又言創扵程邈皆秦世也羅長源曰宋時臨淄人有得齊胡公之銅棺前和隱起皆為今隷則隷書秦已前已有之矣水經注亦云隷自出古非始扵秦藥箭兩粵溪洞之蠻以毒藥傅弩矢射人者俗語曰綿藥余初不解其義及讀揚子方言凡飲藥傅藥而毒東齊海岱之間謂之眠乃知綿藥當作眠藥也弱翰揚子雲荅劉歆書雄嘗把三寸弱翰筆賫白素三尺問異語此作方言也余嘗疑既稱弱翰又稱筆是筆有名弱翰者因悟今京師中寒沍南來之筆多敗京師有名水筆者掾史家多用之其毫甚弱蘸一墨即可書數行攜之出苐須飽墨不必復蘸子雲作方言時正攜此筆以行有得輙書不復蘸墨者即今水筆也馬汗血嘗言汗血之馬不知者謂出汗皆血偶閱漢明帝報東平王蒼書并遺宛馬一匹中言血從前􅈩上小孔中出因言武帝天馬霑赤汗親見其然余乃悟凡血盛者筋力必强壯善馬愈走而性愈躁疾氣血愈怒張必至横溢故此所遺馬血從前􅈩小孔中出則汗血之馬其血亦有從他出者非謂遍體皆汗血也水利五行之用皆以利民者然金火木土皆不言利惟水獨言利者何也易以利為四徳之一凡卦之象川者必言利渉書陳六府始于水而三事亦稱利用水之利大矣哉鱷魚潮有鱷魚之害世皆知為韓昌黎所除不知昌黎之後其害尚存至宋咸平中通判陳堯佐始計捕而獲之鳴鼓于市以文告于神而戮焉其害始永絶吴復古揭陽吴復古毎論出世法以長生不死為餘事煉氣服食為土苴蘇東坡居惠時嘗問以養生復古以安與和荅之東坡南遷往見之無一言及得喪事獨曰邯鄲之夢猶足以破妄而歸眞今子目見而身履之亦可以少悟矣若復古者葢有道之士哉漢劉熊碑唐王建題劉熊碑有曰蒼苔滿字土埋龜風雨消磨絶妙詞不向圖經中舊見無人知是蔡邕碑宋蘇邁書胡戢之語謂此碑與劉文饒同建詩為不誣余謂此碑固漢隷最佳者然非中郎詞也且其文有云七葉勃然而興咸居今而好古其詩則曰有父子然後有君臣此何等語而謂之絶妙詞乎既非中郎之詞又安得云中郎之筆葢東漢諸碑流俗多以為中郎筆猶王子敬好書洛神賦故世一有洛神賦輙以為子敬書耳夷齊考論語正義引春秋少陽篇伯夷姓墨名允字公信叔齊名致或曰智字公達夷齊者謚也伯叔者少長之稱也少陽篇不知何人所著其書已亡一云父名初字子朝或曰即殷湯三月丙寅日所封者孤竹地名産孤生之竹可作管孤或作觚地道記在肥如南二十里秦為離支縣漢為令支春秋時齊桓公嘗至其地今山海闗北十里有孤竹君之墓在焉姓纂墨氏即墨台氏墨音眉孤竹君之後鄭樵亦從其說遂以孤竹君為姓墨名台余按國名記墨台即禹之師墨一曰黙怡怡音台炎帝之後姜姓國也則墨台又孤竹之先矣虞書伯夷降典析民注疏云姜姓不知即此墨台氏否則孤竹君之子伯夷也少陽姓纂鄭樵皆誤矣山海經又有伯夷父者生西岳為氐羗所自出郭璞注伯夷父顓頊師亦不知與墨台氏同否是古今名伯夷者凡四世代綿邈諸說混淆竟莫可考而以伯夷為姓墨名台余不敢安也孔叢子注孤竹君又有子名伯遼周曇詠史詩注伯當作仲孤竹君之次子也是孤竹君有三子遼既是名則夷齊又似名而非謚矣近有陳繼儒者宏博士也譔逸民史行扵世顧不能詳夷齊名氏夫尚論其人而不知其名氏可乎抑亦有疑而闕乎故詳著之以補其闕孔子姓氏孔子宋人宋襄公十一代孫也夲姓子氏古者君之同姓有五服親盡者必賜别姓以為公族故襄公有五世孫曰父嘉者賜姓孔氏是以不復姓子而孔氏之姓實出扵此父嘉扵孔子為六世祖父嘉之父即正考父父嘉之孫曰孔防叔乃自宋奔魯不仕至其孫叔梁紇始仕扵魯受采扵聊古者必貴而後别為氏故叔梁紇得以王父之字為氏其氏曰叔者孔防叔之叔也苐叔梁紇時諸大夫皆世官而孔子不復世父之官此既不可曉且貴而賜氏子孫不復改者孔子又不以父之氏為氏乃復以孔為氏此尤不可曉也余按孔字从子从乙子者商之所以封也乙者𤣥鳥也契之母吞𤣥鳥卵而生契為商之鼻祖賜姓孔者所以紹祥𤣥鳥也今字書皆以孔為嘉美之稱以乙之生子為嘉美故鄭子孔名嘉是孔父嘉亦若因字為氏者其說終屬强觧古者賜氏或以地或以官或以謚未聞有因其人之字即以其字之義賜為姓者葢後人因父嘉姓孔子孔名嘉故遂以孔為嘉美義耳癰疽瘠環萬章謂孔子扵衛主癰疽扵齊主侍人瘠環趙岐以癰疽為癰疽之醫瘠環者瘠姓環名也孔頴達曰未詳其人但以經文詳之亦誠然也朱考亭亦從其說劉向說苑以癰疽為雍睢余按古文及諸字書癰雍疽睢原不相通如向之說是雍姓睢名非癰疽之醫而趙岐誤矣至扵以瘠為姓其說更誤余按姓譜諸書有姓痛者有姓疾者瘠之姓絶無岐何所據以為姓耶余憶左傳有曰巫尫因其尫而名之非巫之名與姓也瘠環者名或謂環其人瘠弱故呼為瘠環如今人呼長者為長某小者為小某之類是也朱考亭注經亦傳訛如此王荆公不知詩池塘生春草園栁變鳴禽靈運猝以景遇備以成章故常自稱此語得之神助客有以此問王荆公不知此詩何以得名扵後世何以得罪扵當時荆公曰池塘生春草言王澤竭也園栁變鳴禽言物候變也當時以此服荆公之博殊足一笑以此論詩則從古稱詩者何往而不得罪荆公非惟不知靈運亦不知詩矣精舍精舍二字始見扵後漢包咸傳咸往東海立精舍教授是為儒者設也姜肱傳盗就清廬求見注清廬即精舍也晉孝武帝奉佛立靜舍扵内殿引沙門居之是佛家所居當名靜舍惟吾儒乃得名精舍及清廬耳三國志注江表傳干吉來吳立精舍燒香讀道書製作符水療病則道家亦稱精舍矣老人子無影老人子無影說者謂子之腎囊下筋謂之影不知何所據朝野僉載栁州曹太年八十五少妻生子日中無影南史張元始年九十七生子無影丙吉斷老人生子之獄置羣兒日中獨老人子無影遂以决之其說不虛則影非腎囊下筋明甚苐今七八十老翁生子其子扵日中未嘗無影豈皆非眞骨血耶一笑一笑疑耀卷六
