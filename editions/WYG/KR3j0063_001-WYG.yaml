body:
  text: 疑耀卷一明張萱撰孔子無鬚眉辨先聖生有異質凡四十九表萇𢎞之所談姑布子卿之所稱老萊弟子之所識荀卿司馬遷之所述亦云備矣獨未及舌者舌内藏不得稱表也緯書所載舌理七重又鈎文在手共四十九表其言互異至鬚與眉則載記皆未之及惟祖庭纂要謂孔子眉有十二采孔叢子述子思之言乃曰先君生無鬚眉天下王侯不以此損其敬何燕泉亦信然其説謂先聖委無鬚眉今世所傳先聖之像頷頰間鬚髯甚盛謂皆呉道𤣥誤筆也苐今闕里有先聖行教小圖又一如呉道𤣥筆豈先聖後人所𫝊亦可云誤筆耶余按左氏傳魯昭公七年孟僖子病命其子學禮於孔子其言曰聖人有明徳者若不當世其後必有逹人今其將在孔邱乎孔子生魯㐮公二十一年至是年僅十有七耳其為當時尊敬如此故孔叢子所云者謂先聖雖少年未有眉鬚時天下王侯亦皆起敬不敢以為稚㓜而狎之非真謂果無眉鬚也按方言東齊謂老曰眉此言無鬚眉者猶云未鬚而老也若作眉毛之眉則誤矣夫無鬚尚可信至於無眉亦可信乎舜有兄妹舜弟曰象或云隨母嫁瞽瞍者未知是否然人皆知舜有弟象而不知其有兄與妹也尸子曰舜事親養兄為天下法是舜有兄但逸其名耳許氏説文畫嫘舜妹嫘或作婐史正義作顆又作繫畫始於嫘故曰畫嫘列女傳舜女弟繫與二嫂諧是也故或云瞽瞍與象欲殺舜其妹嫘每為之解故舜得免但不知其與舜同母否又按世本曰黄帝之臣史皇善圖畫則畫又非始于舜妹矣事物紀原引周穆王𫝊穆王時其臣封膜始作畫者誤也唐張彦逺歴代名畫記郭若虛圖畫見聞志鄧椿畫記又畫紀補遺陳徳輝續畫紀米芾畫史湯君載畫鍳夏文彦畫評諸書皆詳畫所自始然亦皆止言有虞作畫而不知作畫者舜妹嫘也故詳著之生子無功晉元帝生子普賜羣臣殷羡謝曰臣無勲猥蒙頒賚帝笑曰此事豈可使卿有勲苕溪漁隠又載南唐時宫中賜洗兒果有近臣謝表云猥蒙寵數深媿無功李主曰此事卿安得有功何前後人之紕繆相合如此姣童司馬温公家一僕三十年止稱君實許魯齋在中書日欲買一僕牙儈以能應對嫻禮節者進輙謝去最後得蓬首垢面愚騃者乃用之或詰其故許曰聰明過我我反為其所使矣㫖哉斯言余見衣冠家畜姣童如龍陽秦宫輩非惟能役使主人且徃往能滋物議乃知魯齋之言非欺我也余性絶不喜此輩交遊中嘗以為訝余曰許魯齋聰明人尚恐為奴僕聰明者所役余愚騃人也能堪其役使乎誤躬作弓漢陳寔字仲弓余嘗疑之漢人名字皆相合以弓字寔有何意義及讀洪适𨽻釋載寔壇碑君諱寔字仲躬乃了然始知諸書皆誤作弓苐洪氏又謂躬乃借作弓字用又何誤也書籍板行上古書籍皆編竹為簡以韋貫之用漆作書簡袠浩重不便提挈自有製紙筆及墨者乃易去竹簡誠為便易然皆寫本亦未有刻板印行也後唐明宗長興二年宰相馮道李愚請令刋國子監田敏校正九經又母昭裔貧時嘗借文選於交遊其人有難色昭裔發憤曰異日若貴當版鏤之以遺學者後仕孟蜀為宰相遂踐其言又以石鏤九經於成都是印行書籍始之者後唐繼之者孟蜀也葉夢得曰書籍未印行之先人以藏書為貴書雖不多而藏者精於讐對故往徃皆有善本學者以傳録之難故誦讀亦精詳蘇東坡作李公擇山房藏書記亦謂少時嘗見前輩欲求史記漢書不可得幸得之皆手自書日夜誦讀惟恐不及近市人轉相摹刻諸子百家之書日傳萬紙學者於書既多且易致如此其文辭學術當倍蓰昔人而今乃不然者豈非多而難精耶二公之言誠中時弊高皇帝像先大夫令滇時從黔國邸中模高皇御容龍形虬髯左臉有十二黒子其状甚竒與世俗所𫝊相同似為真矣余直西省始得内府所藏高成二祖御容高皇帝乃美丈夫也鬚髯皆如銀絲可數不甚修無所謂龍形虬髯十二黒子也成祖則有豹額環眼之状若聳其肩兩髭横分鬚長褁臍皆翼善冠衣緑不正立頗與二后若相對意至二后則以紙蒙之不敢啟云許由張茂先博物志稱司馬遷云無堯譲許由事揚子雲亦云誇大者為之高士傳堯召許由為九州長則知荘周謂堯以天下譲者乃文飾過當耳而雄遂以為全無許由故楊誠齋有詩云子雲到老不曉事不信人間有許由余謂雄非不信有許由也許由當堯之時尚不屑為九州長而楊雄當王莽之時乃以莽大夫終其不信有許由也欲以自掩也五霸霸之有五春秋傳皆謂齊桓晉文秦穆宋㐮楚荘而孟子止言齊桓晉文不言其三故有以宋㐮何足言霸秦穆楚荘本皆夷狄皆不足稱霸而以夏之昆吾啇之大彭豕韋與齊桓晉文為五者何燕泉亦從其説余謂不然孟子曰五霸者三王之罪人也昆吾大彭豕韋亦皆三王之罪人乎五霸之名當以春秋為正窈窕窈窕二字説文解窈深也窕極深也窈窕幽閒之地也詩稱窈窕淑女鄭𤣥箋為幽閒深宫貞専之善女楊子方言以美心為窈美容為窕故朱子訓詩以窈窕為徳楊用修深辨之歴引漢魏詩賦所用窈窕字皆屬居處遂以朱氏之訓為謬余謂不然窈窕原有二義詩之窈窕淑女即以居處與容徳並解不兩妨也孟母姓仉孟母三遷其母之姓世莫知者母姓仉音掌齊後也晉有瑯琊掌同前凉掌椽宋有掌禹錫修本草者即同孟母仉姓仉掌通用字書反𤓰為掌放生浮圖氏謂殺生者有罪放生者獲福夫佃漁罟網始自庖犧若如浮圖之言則聖人庖犧當為地下罪人矣此歐陽永叔之言誠足以破世人之惑苐仁人君子存心誠有聞其聲不忍食其肉者孟軻氏所稱君子逺庖厨此語得之又安問罪與福哉韓縝不識女字與俗人書劄不可用古字多有不解者宋韓荘敏縝字玉汝初求字於歐陽文忠公公書玉女二字與之荘敏不樂及見殊有愠容文忠曰此女字古書原無㸃水君何怪耶乃取筆添女字傍三㸃水始相與大笑荘敏韓忠獻公億之子豈俗人者亦不解古字如此漢祀以鶩易鳬武帝祭宗廟以鶩當鳬董仲舒不可謂名實不相應鳬非難得之物鶩與鳬大小相當以鶩易鳬想必有説俟之博古者望帝化䳌子規子嶲杜䳌杜宇又名規又曰周鷰又曰催歸又曰秭規皆一鳥也來敏本蜀論有云荆人鼈令死其尸隨水上荆人求之不得至汶山下復生起見望帝立以為相許慎註説文云蜀王望帝滛其相妻以慙死化為子嶲鳥李義山詩曰望帝春心託杜䳌余按常璩華陽國志杜宇稱帝㑹有水災其相開明决玉壘山以除害帝遂委以政事升西山隠焉時適二月子䳌鳥鳴故蜀人每聞子䳌輙悲而思之是子䳌之鳥非望帝所化明甚癡了晉楊濟嘗與傅咸書有云生子癡了官事官事未易了也了事正作癡夫癡之一字豈但了官事而已人能解得此癡字則人間世無一不了了矣顔子安貧古之安貧者如黔婁原思榮公東郭皆其難者然惟顔回最著而古傳記所稱回有田二頃此亦足以具饘粥矣何至簞瓢陋巷而屢空耶無亦回之好學不求安飽故孔子亟稱之遂以安貧之名獨著於後世耳韓昌黎謂簞瓢陋巷乃哲人之細事又何怪其羡二鳥之光榮歎一飽之無時也古人辭大晉周處嘗為廣漢太守以母老罷歸尋除楚内史未之官徴拜散騎常侍處曰古人辭大不辭小乃先之楚而後就徴今之仕宦每有左遷或降調者輒先辭其小必得其大而後之官與古人異矣伯仲塤箎八音皆克諧無有乖戾而不和者巧言喻兄弟之和止以塤箎注疏及朱考亭注嚴氏緝皆未能發其㫖余因閲古今樂律諸書乃知七音各自為五聲如宫磬鳴而徴磬和獨塤箎則二器共為一音塤為宫而箎之徴和塤為宫而箎之羽和故曰伯氏吹塤仲氏吹箎伯宫也仲徴也此古人所以喻同氣也其㫖㣲矣嗚呼余有四弟而同母者三中道見損門祚衰薄孤塤之奏何以成音一歎蘇武娶胡婦蘇子卿娶胡婦卒蒙後世訾議余竊疑之新安文獻志載宋建炎中有朱勣者以校尉隨奉使行人在尼堪所數日便求妻室尼堪喜令於所擄内人中自擇勣擇一最陋者人皆莫曉不半月勣遂逃去人始悟曰求妻所以固尼堪之心使不疑受其陋者無顧戀也子卿之妻於胡得無朱勣之見耶苐未知此胡婦美陋何如耳或曰胡婦之美無疑不然子卿何丁年奉使皓首始歸耶余為掩口徐庶歸曹晉周􅡟為西戎校尉守涪城母妻為苻堅將楊安所獲遂降于安此與徐元直舍劉歸曹同情但􅡟既歸秦屢折辱堅又嘗潜至漢中為堅追獲後遂與堅兄子苞謀襲堅事泄被撻徙太原而卒亦足以明其不事秦矣元直一歸曹遂安于曹無他自明處以此恨恨北音無入聲周徳清在元時自謂知音者故嘗著中原音韻今所行洪武正韻多宗之余故有侍兒工琵琶嘗譜太和正音止有平上去三聲而無入聲余竊疑之不知其與周徳清之音韻實暗合也徳清北人其所著音韻皆北聲故以六為溜以國為鬼謂之中原之音可乎至四聲而闕入聲尤為謬妄聲之有平上去入猶天之有元亨利貞地之有東南西北也闕一其可乎故余所梓太和正音譜曰北雅以此經濟學者有志用世固當講究經濟然不可以經濟一念先入其心董子明道不計功正誼不謀利所以為萬世醇儒也宋仁宗朝胡安定教授湖州至以治事名齋王介甫作詩以美安定三以先生尊稱之非安定經濟之教深入其心乎迨熈寜柄國安定歿矣遂行免役青苗市易首實保馬保甲農田水利則皆其平日聞安定之教以講求者故介甫少嘗見濓溪耻於下問及其為相時濓溪年五十有四張横渠年五十有一二程年三十有八九介甫皆以為不足與有言其所用之人吕恵卿曽布蔡京蔡卞之徒皆急於經濟者也陸氏之學高於事功陳同父之學専於事功皆為朱考亭所不取其意念深矣漢唐二高識度漢高帝初為亭長告歸之田有老人過請飲因相吕后及孝恵帝魯元公主皆大貴及見高帝乃曰鄉者夫人兒女皆以君君相貴不可言高帝謝曰誠如父言不敢忘徳唐太宗方四嵗有書生謁高祖曰公在相法貴人也然必有貴子及見太宗曰龍鳳之姿天日之表其年弱冠必能濟世安民書生辭去高祖使人追而殺之殺之是也先儒謂其徳色如漢高祖者非也何者古今欲為不義求福於非望者多起於佞人之諛詞有以激發而成之當秦隋將亡之時欲為漢祖唐宗之所為者不知其幾為父老書生之談者亦不知其幾彼父老書生偶騐於二帝耳安知其不以告他人哉以是告他人而不騐者多是激發他人求福非望以䧟于禍敗者亦多嗟夫匹夫狂言天下受禍其罪可勝誅哉追而殺之唐高之逺識過漢高萬萬矣史乃謂唐高之追殺書生懼其語泄理亦有之苐其意雖私其事則是如以為徳色不過女子小人歆慕富貴之心英雄如季而肯遽徳色於偶然之虛譽乎巫覡惑人南人信鬼里中有以婦人代神語曰聖即古之巫也亦有男人為之者即古之覡也嘗有婦人喪子徃聖男所請問其子聖云子來矣聖乃代其子語云我饑當得母乳此婦人遂開襟出其乳哺之於是聖男就抱此婦人頸哺乳此婦人不覺痛哭而歸語其夫以聖為亡子状相與神之其夫大怒撻之曰汝子死而問聖聖妄為汝子而欲乳汝輒開襟出乳乳之設他日汝夫死汝或問聖而聖妄為汝夫欲求汝合汝得無從之乎余聞之不勝扺掌後讀元魏高允𫝊諌高宗書有言敝俗未改者謂祭必立尸使亡者有憑今魏俗已葬䰟人直求貌類者事之如父母燕好如夫妻損敗風俗凟亂情禮與開襟乳聖為子正同生烟劉禹錫竹枝詞瀼西春水縠文生宋人小説以此生字為生熟之生殊足一笑楊用修亦以為然至引謝朓詩逺樹曖芊芉生烟紛漠漠又引謝靈運賦云披宿莽以迷徑覩生烟而知墟此為生烟何者為熟烟耶此三處生字皆當作生發之生方有意味蔞字今南人多用梹榔及蔞然皆不解蔞字劉淵林蜀都賦注縁木而生其子如桑椹味辛香生巴蜀嶺南即鄭樵所辯西南夷𫝊蒟醤曰浮留是也又名扶留徐廣曰木似榖樹其葉如桑用葉作醤以酢羮蒟亦作枸音矩徐廣注音窶俗呼作蔞葢本於此苐今乃藤生非樹生也故蒟醤者以蒟為醤今其制已不可知然亦醤成乃可稱蒟醤若稱蒟即為蒟醤是秫可製酒而未製酒之秫亦可稱秫酒乎又云司馬相如使蜀時求而得之者苐今巴蜀絶無此物惟滇中有之其子作穂土人乾之以代其葉殊不類桑椹若産嶺南者又絶不作穂劉淵林云實長二三寸辛似薑不酢小顔云縁木而生二説得之鬱林葛粤中多産葛惟鬱林州所産者知名最乆齊武帝作估客樂曲被管絃乗龍舟遊江中令榜人皆着鬱林布作淡黄袴以舞此曲即今之鬱林葛也泰山神祠海内神祠惟泰山碧霞元君最盛然世莫詳神所自出余閲馬端臨通考泰山絶頂故有玉女池池側有玉女石像泉源壅濁宋真宗登封先營頓置泉忽湧出清泚可鑑味甚甘美王欽若請浚治之像頗摧折詔易以玉石既成上與近臣臨觀復礱石為龕祭焉及考李諤瑶池記謂黄帝建岱岳觀嘗遣女子七人雲冠羽衣奉香火以迎西崑真人則元君或亦七女中之得道而仙者織女名天孫而岱岳亦名天孫豈以此邪李白遊泰山詩玉女四五人飄颻下九垓似亦有據是元君在唐已有之至宋而香火始盛耳星命禄命家言其星辰名字皆後人杜譔不足信者熊退叟嘗作命説送術者雲岫有云三代盛時家有受田阡陌未裂䕃耗之星夫何居里有公選科目未興科名科甲之星夫何麗此言真足以袪干古之惑韓昌黎未見道昔人謂韓昌黎因文見道余謂昌黎文固自佳而道或未之見無論三上書三及門為有識者所嗤即潮州到任謝表更露破綻通篇千餘言無非帖首揺尾乞憐之態夫東西南北唯君所命何逺何近何美何劣昌黎則首言潮地逺惡人所不堪毛遂自薦雖五尺之童羞之昌黎則繼言其學問文章為時輩推許至論述朝廷功徳則古人不譲此時朝廷有何功徳足以稱述而昌黎至欲以封禪泰山歆動人主夫司馬相如何足效也始以諌佛骨而見斥既欲以請封禪而媒進非兩截人乎謂之見道誰則信之宋石介獨尊信昌黎嘗著尊韓論其徂徠集中不一而足且曰吏部不敢名也豈好而知其惡者耶洞庭湘妃墓辯按永州志帝舜陵在九疑山一名永陵禮記檀弓舜葬蒼梧之野司馬史記舜南廵崩於蒼梧之野歸葬零陵之九疑又載於家語皇覧竹書世紀岳之洞庭有君山其上為湘妃墓古今相傳為堯之二女以妻舜者舜南廵溺於湘江二妃從征偕溺而死神遊洞庭之湖故湖有黄陵廟以祀二妃詳具秦博士之對始皇也王逸楚詞亦遂以二妃為湘君與湘夫人而劉向張華酈道元羅含諸人相承為萬世不解之惑及樂正子寰宇記張叔範零陵志楊廷秀揮麈録呉格甫九疑考古並述之楚靈王作章華之臺壅漢水旋其下以象舜陵而秦皇漢武皆嘗望祀宋置守陵五戸而國朝布在祀典仍建廟簫韶峰下二妃墓在黄陵廟西云乃漢荆州牧劉表所建國朝命有司以六月六日致祭焉余按尚書舜五月南廵狩至南岳即衡山也是嵗八月復西廵狩矣溺死之説謬妄不足辨獨怪孔氏傳舜典陟方註亦曰舜南廵狩死於蒼梧之野而葬焉尤足掩口夫尚書所稱舜陟方乃死是在受終文祖之後而南廵狩則堯未殂落而舜攝政之時安得云舜以南廵狩而死於蒼梧耶但舜葬蒼梧又見禮經與秦博士合夫尚書聖經也禮經則出漢儒之手秦始皇時尚書猶在孔壁中秦博士未之見也豈其時始皇廵狩遍天下百姓疲勞而博士輩託言舜以廵逰溺死警悟君心耶抑尚書未出而讖緯百家熒惑耳目博士亦妄言傅㑹故傳禮者又傅㑹博士耶或為之説曰古者天子五載一廵狩尚書所載舜廵狩在攝政時安知受終文祖之後不復廵狩故或復廵狩而溺死亦未可知耳余曰否否廵狩大典也天子而溺死大變也受終復廵狩而溺死尚書豈有不明言以紀之者且舜年二十以孝聞三十堯妻以二女五十攝行天子事五十八堯崩六十一踐位故董鼎曰舜廵四岳朝諸侯封山濬川考禮正刑汲汲不少暇乃攝政時事至踐位後則惟責成於岳牧九官垂裳恭己而已孔子曰有天下而不與此自舜踐位後言也豈復出而廵狩耶况尚書已明言三十徴庸三十在位五十載陟方乃死是舜之死葢百一十嵗也復廵狩而溺死耶説者又以陟方為廵狩韓退之乃云地傾東南南廵非陟也陟者升也方乃死者釋陟為死也蘇子瞻云陟方猶升遐乃死為章句闕故汲書紀年帝王之死皆曰陟書云在位五十載陟者紀舜之崩也何謂南廵哉他𫝊又云舜伐苗民崩於蒼梧夫伐苖者禹也已竄三危矣何得勞無為之舜於耄期之時耶都𤣥敬聴雨紀談乃疑舜冡在零陵之九疑而九疑在南岳千有餘里蒼梧在廣西域内去九疑又數百里書云舜南廵狩至於南岳豈又幸九疑遂崩而葬其地乎孟子言舜卒於鳴條鳴條在東方夷服今又不聞有舜陵是𤣥敬亦有疑而不能祛者也羅長源曰象封有鼻墓在始興有鼻者有庳也即今道州九疑之墓或象塜耳不然啇均窆也大荒南經赤水之東蒼梧之野舜子啇均所葬元次山九疑山圖記亦謂啇均窆其隂豈啇均徙此因葬之後世遂以為舜陵耶漢章帝時零陵文學奚景於泠道舜祠下得笙白玉之琯十二枚吕氏春秋戴延君大戴禮伏子賤尚書大傳許叔重説文應仲逺風俗通陳晉之樂書范蔚宗后漢書皆言昔西王母獻舜玉琯注云西王母神也曽伯端集仙録亦云舜在位西王母使獻白玉琯以和八風則白玉之琯為舜之寳器明矣胡為乎藏於零陵哉無乃帝舜諸子分封巴陵上虞衡山江華等國各錫寳器如成周錫封之制而啇均則得白玉之琯遂𫝊流零陵耶又按舜陵載在山海經者非一説海内南經蒼梧山帝舜葬其陽又大荒南經帝舜葬于岳山又海北經有舜臺臺即陵也又海内朝鮮記南方蒼梧之泉其中有九疑山舜之所葬在長沙零陵界中夫山海經世稱伯益作而長沙零陵乃秦漢郡名則知此書多後人附益而九疑舜陵𣺌不可信矣又寳櫝記云舜葬于蒼梧有鳥自丹州而來吐氣名曰馮霄能銜土成丘墳舜墓鳥所營也集仙録又云舜瞑目端坐乗空而至南方之國其中有九疑山焉厯數既徃歸理兹山真源賦云舜因南廵走馬逐鹿同飛蒼梧莫知所去王仲任論衡書虛篇云舜𦵏蒼梧象為之耕四説尤妄誕不足辯故朱晦菴粤西舜祠記業已疑之曰舜死蒼梧無明文可據獨未為之辯耳司馬光有詩虞舜在倦勤薦禹為天子豈有復廵狩迢迢渡湘水似為得之是舜之不死于南廵狩與不葬蒼梧明甚彼洞庭又安得有二妃墓哉嗟嗟禮有三不吊水其一也以大聖人而誣以不吊之災萬世下卒未有辯白之者不亦悲乎若山海經云洞庭之山帝之二女居之然亦曰帝之二女而已未嘗明言誰之女也豈以堯典有二女之文遂以洞庭二女即堯典之二女耶郭璞稍晰其妄曰湘君湘夫人自是二神且既謂之堯女安得復稱湘君因引禮記舜葬蒼梧二妃不從此亦足為考古一快獨惜舜不葬於蒼梧璞亦未之辯也羅長源復曰虞舜晚年已禪禹矣南狩之舉總之伯禹則二妃必不從舜于蒼梧沈存中繼其説亦云舜陟方之時二妃皆百餘嵗豈宜復稱女信若二説是舜且未嘗南廵狩則尚書亦不足據矣景純又云即令二女從舜其靈逹鍳通無方尚能鳥工龍裳救井廪之難豈不能自免風波况二女乃帝舜之配不應降附小水為夫人故當以此二女為天地之女夫鳥工龍裳乃迂怪之談既不足據而帝妃不可降於洞庭小水為夫人天地之女又可降于小水為夫人乎此王逸韓愈所以力辯之似得其情也羅長源又為之説此二女者當為舜之第三妃癸比氏所生者是舜之二女也一曰宵明一曰燭光其説亦有所倣山海經有言舜妻癸比氏所生二女處河大澤其靈能照百里然亦未明言處于洞庭也長源又豈以河大澤可為洞庭也耶陳士元心叔亦該博者其江漢叢談乃謂湘祠為舜之二女黄陵墓為癸比氏所葬而以山海經之言為實至引陸士規黄陵廟詩帝子不知春可去亂山無主鷓鴣啼帝子者謂舜女也此又信山海經之過也余按竹書紀年舜即位三十年而后育卒后育者娥皇也葬于渭帝王世紀又云舜三妃娥皇無子女英生均舜崩之後曽隨其子徙封于商故曰商均商州有女英塜至唐時盗乃發之今平陽府蒲州南十五里曰蒼陵谷者亦有娥皇女英塜絳州鼓堆祠神為婦人像祠中石刻亦云舜之二妃夫渭與商與蒲與絳三者必有一實然皆非楚地則岳之湘妃墓非女英之窆明甚獨盗所發女英塜乃多得大珠璆金玉盌又似與茅茨土階之風不協則不能無疑者竹書云鳴條有蒼梧山舜崩遂葬焉按今山西平陽府即古河中地解州安邑縣西北二十里有鳴條崗一名鳴條陌而舜墓具在孟子曰舜卒于鳴條此萬世不易之定論也鄭康成以鳴條為南夷地謬之謬矣但古今地理諸志鳴條之地並無蒼梧之山豈古之河中地或有蒼梧而世代綿邈圖牒失真寖不可考記禮者或傅㑹竹書與竹書之或傅㑹禮文皆不可知也余謂考古者當以聖經為正信漢儒不如信吾孟軻氏故舜既葬鳴條則雖南廵矣斷非崩于蒼梧二妃一葬于渭一葬于商或葬于蒲洞庭湘妃豈得云舜之二妃楚辭所稱湘君湘夫人信如景純所核斷非舜妃亦非舜女近代撰楚通志者皆博古君子也亦未及詳考而是正之故不得不為之辯附徐司馬鑾書讀洞庭湘妃辯援引博而彈駁精大快人意今鳴條崗即在安邑舜陵亦在安邑以孟子卒於鳴條一言斷之確乎無疑再考竹書紀年舜三十二年命夏后總師陟方岳三十三年夏后受命神宗三十五年命夏后征有苖四十九年帝居鳴條五十年陟此本文也註云鳴條有蒼梧山今海州註係沈約所述隠侯博而傍渉不盡據經當由檀弓一語誤之史記及孔氏尚書傳疏皆本檀弓宋孫奭孟子疏又本史記孫又引書傳云鳴條在安邑之西而不能深辯今天下稱蒼梧者三粤西蒼梧今梧州洞庭蒼梧今岳州鮑照賦所謂南馳蒼梧也九域志東海縣有蒼梧山今海州贑榆縣粤西舜祠無謂已不待辯洞庭蒼梧之説至今牢不可破然宋陸均作翼孟已曽疑之困學紀聞引吕氏春秋舜葬於紀以蒼梧山在海州界近莒之紀城以附㑹於吕覧及竹書注海州之説愚以為此亦穿鑿好異之見耳竹書文最古縱有𫝊譌亦不出于漢儒之手據尚書五十載陟方乃死似總言舜受禪後遍陟方岳乃崩如竹書三十二年所云紀其大政非必以陟方為舜崩之年也九疑舜墓千古以來孰知其處特衡岳舜所南廵今有舜祠理為近之海州蒼梧山記載幾湮絶無舜墓舜祠遺址豈有帝都冀方而身没乃葬於海僻一隅莒紀小國春秋時且為附庸唐虞時當甚荒落帝陟方岳朝羣后當之名嶽通都乃之窮海之濵野死不還而葬此乎唯孟子卒於鳴條與竹書四十九年帝居鳴條語合故當以孟子為信矣又有帝王世紀一説有苖氏叛舜南征崩於鳴條殯以瓦棺葬于蒼梧九疑山之陽是為零陵謂之紀市此其無端牽合尤為可笑虞書有苖弗率命禹徂征即在三十四年禹受命神宗之後與紀年所載無異越十五年而帝始陟親征而死敢於誕妄瓦棺殯葬乃周人以葬下殤者而以証帝制抑又誕矣禮經蒼梧一語或出漢儒且蒼梧既無定名安知古鳴條之野不有以蒼梧號者山海經云蒼梧山帝舜葬其陽丹朱葬其隂舜以唐封丹朱即今平陽則古蒼梧即鳴條地可為一證如云楚之蒼梧則丹朱亦從舜南廵而葬此耶足下所述已詳已悉因尚有數種姑述所聞以共折時人三尺之喙若舜墓之説明則湘君湘夫人堯女舜妻之謬不攻自破矣石經自有九經以來鐫于石者有十四種而始之者東漢也世鮮有能詳者故論列焉漢建寜間蔡邕以八分書書石經而其文則諌議大夫馬日磾五官中郎將堂谿典光禄大夫楊賜議郎張馴韓説太史令單颺等奏求校定者也洛陽記曰石經五部碑凡四十六板三行分樹於太學之前西行周易尚書公羊傳共碑二十八板時十六板存十二板毁南行禮記碑共十五板悉毁然尚有可讀者東行論語三碑而二碑毁矣是蔡邕所書四十六碑此時毁者已十八板而存者尚有二十八板也然亦止周易尚書論語禮記公羊傳五經而已隋志乃云鐫刻七經皆邕筆豈建寜石經至隋時尚有七而記洛陽者未及見耶七經之外皆不書豈其力有未及耶方仁聲泊宅編石經䟦云石經殘碑在洛陽張景元家世傳蔡中郎書未知何所據而邕所書石經乃八分仁聲誤以為三體不知三體者乃謝承書也東漢書儒林傳註熹平四年又詔謝承書五經鐫碑乃古文篆𨽻三體其碑高一丈許廣四尺駢羅相列與邕碑不同水經注又云漢光和六年刻石鏤碑載五經立於講堂前余按建寧熹平光和皆獻帝年號建寜四年熹平六年光和六年是十六年之中三書石經矣然熹平石經雖知為謝承之筆而不知所書為何經光和石經非惟不知經為何經書為何體即書者亦不知其何人矣豈邕既書七經之外未書者熹平續書之熹平未書者光和續書之耶若然則東漢石經葢十有七矣夫邕之石經八分也承之石經三體也光和之石經不知其書為何體然三石經想亦不出五與七之外其間必有重書而其文亦必有互異者今三石經皆亡無從考據唐經籍志又有蔡邕金字論語二卷而隋經籍志則一字論語二卷即金字本不言作者姓名後人遂以唐史為誤然其書乆亡亦窮經博古者之一憾也魏陳留邯鄲淳嘗書三字石經於漢碑之西亦即漢之三體也然亦未詳其為何經正始中又有一字石經江式曰魏嘗立二字石經其蹟已亡亦皆未詳經為何經筆為何人一字二字之為何體也晉裴頠嘗奏修國學刻石寫經唐開成元年鄭覃奏言宜凖漢舊事鏤石太學示萬世法乃表周墀崔球張次宗孔温業等是正之凡九經共一百六十卷亦不知為何人書大厯中司業張參又承詔校定五經鑱石太和七年又勑唐𤣥度覆定石經并孝經論語爾雅為九經凡一百五十九巻字様四十巻則開成九經未收孝經論語爾雅而九經者不知何經即太和九經自孝經論語爾雅外其六經者亦不知為何經也但太和字體大乖師法名儒宿學多不窺焉是唐有兩石經也李陽氷又願刻石作篆備書六經後不果其所稱六經豈即周易尚書毛書春秋傳禮記及周禮耶今秘閣所藏有孝經二冊乃唐𤣥宗八分書天寳四年國子祭酒李齊古摹勒上石者完好如故葢宋搨也偽蜀相母昭裔嘗取唐太和本琢石於成都而文與唐本小異孝經論語爾雅則廣政甲辰張徳釗書周易辛亥楊鈞孫逢吉書尚書周徳政書周禮孫朋吉書毛詩禮記儀禮張紹文書公羊榖梁二傳則宋皇祐間田元均補刻孟子宋宣和間席叔獻補刻皆未著書者名氏閲統志宋紹興間席益嘗刻禮殿聖賢圖於成都石經堂豈益即叔獻耶春秋傳亦未知為何人書而於祥字皆闕其畫此必孟蜀時筆也余幸承乏西省校閲秘閣藏書及見蜀本石經周易三冊尚書三冊毛詩八冊左氏春秋三十冊公羊七冊榖梁七冊禮記十四冊周禮八冊儀禮十冊孝經十冊論語三冊孟子三冊爾雅三冊完好如故獨左氏春秋未知為何人書其紙墨之精拓法之妙當是宋物真希世寳也撫玩一月不忍釋手宋至和元年命皇姪右屯衛大將軍克繼書石經又以上所書論語刻石國子仁宗又命以易詩書周禮禮記春秋孝經作篆𨽻二體刻石於太學兩楹楊南仲書周易十書十三詩二十春秋十二禮記二十時與南仲同書者草澤章友直殿中丞張次立也國子王洙乃言刻石經已十五年矣止完一孝經耳尚書論語見書鐫未就乞促限畢工餘經權罷從之紹興十三年内出御書左氏傳及史記列傳周易令臨安知府張澄刋石十四年又出御書尚書毛詩十六年又出御書論語孟子皆刻石立於太學然御書間有困倦輙令憲聖呉后代書與御書毫不可辯是紹興石經未必皆高宗筆也然趙宋御筆高宗最勝而憲聖能亂其真亦彤史中之希有乎苐自古鐫石者惟經而紹興獨鐫史記列傳此亦腐史千載特逹之知也賀季真乞休賀季真乞鑑湖歸老古今以為美談余攷其時年已八十餘矣故其回鄉詩㓜小離鄉老大回聲音難改髩毛衰家童相見不相識却問客從何處來夫仕宦而至八十餘不歸復何為耶季真嘗謁一賣藥王老問黄白之術持一珠貽之老即以珠易餅共食季真心念寳珠何以易餅口不敢言老曰慳吝未除術何由得是季真者乃貪戀富貴一老悖耳張旭謂賀八真清鑑風流千載人豈别有所據耶若以乞鑑湖歸老時為風流則鑑湖有靈必為吐穢矣因考漢二疏乞身亦皆居閒曹耳若居津要未知能勇退否白居易有詩散員疏去未為貴小邑歸休何足云此足以評二疏矣疑耀巻一
