front:
  text: 欽定四庫全書子部十
  hash: sha256:6558828ce7672044657017b2bb9c6172233a999f18551baa91b8fd0e67ea1b4b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0063_WYG_000-1a, image: WYG0856/WYG0856-0159a.png}
body:
  text: 疑耀雜家類二雜考之屬提要臣等謹案疑耀七卷舊本題明李䞇撰䞇有九正易因己著録是編前有張萱序稱負笈數千里修謁其門迺裒一編見示屬以訂正戊申嵗以地官郎分務吳㑹登梓以傳云云案䞇恃才妄誕敢以邪説誣民所作藏書至謂毋以孔夫子之是非是非我其他著作無一非狂悖之詞而是編考証故實循循有法雖間倡儒佛歸一之說其言亦謹而不肆至云儒不必援佛佛不必援儒又云經典出六朝人潤色非其本真且與䞇論相反斷乎不出其手王士禎古夫于亭雜録云家有疑耀一書凡七巻乃李䞇所著而其門人張萱序刻者余嘗疑為萱自纂而嫁名於䞇以中數有校秘閣書及修玉牒等語萱嘗為中書舍人篹文淵閣書目而䞇未嘗一官禁近也及觀論温公一條中云余鄉海忠介益信不疑云云今因士禎之説而考之奉朝請一條云余今將五十矣始為尚書郎是萱官户部時語䞇亦未嘗官六曺也蘭香一條云此法在宋己有之自吾廣始蘇東坡一條云東坡寓吾恵最乆文天祥一條云文璧葢守余恵州而以城降元者是皆廣東人語與萱之鄉貫相合䞇本閩人無由作此語也知此書確出於萱士禎所言為不謬盖以萬厯中勢名最盛託䞇以行而其中刪除不盡者尚有此數條耳周亮工書影稱䞇四書第一評第二評皆葉不夜所偽撰知當時常有是事也其書多由記憶而成如文彦博偽帖不知為玉照新志所載石蒼舒事翡翠屑金不知為歐陽修歸田録語謂沈約還家問鄉里詎堪持作夫二語為白居易詩謂左傳巫尩為巫者名尩皆失之疎舛謂本草稱螬可療目故陳仲子耳無聞目無見食螬李而即愈又謂本草稱蓴鱸作羮下氣止嘔張翰在當時意氣鬱抑遇事嘔逆故思此味尤穿鑿無理然其他考証乃往往有依據舊以惡䞇之故併屏斥之過也今改題萱名從其實焉乾隆四十六年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書子部十疑耀目録雜家類二雜考之屬巻一孔子無鬚眉辯舜有兄妹生子無功姣童誤躬作弓書籍板行高皇帝像許由五霸窈窕孟母姓仉放生韓縝不識女字漢祀以鶩易鳬望帝化鵑癡了顔子安貧古人辭大伯仲塤箎蘇武娶胡婦徐庶歸曹北音無入聲經濟漢唐二高識度巫覡惑人生煙蔞字欝林葛泰山神祠星命韓昌黎未見道洞庭湘妃墓辯附徐司馬書石經賀季貞乞休卷二栁子厚非國語施全賈誼蘇洵薄徳噴􅅉生乞壙志荔枝石炭介之推燭之武開脇而産詩叶管絃妬婦不可少荘周鼓盆四凶司馬文正海忠介佛書入中國殿廷植花栁黄冊尾大不掉雁足書羣龍無首佛不能作福書啓慎餘字術者决王荆公去位易字義楚子問鼎漢高后答匈奴書夥頥沈沈字義漢書人物表同名機雲為顧婦贈答六朝文法不通雪月二賦韜畧非呂望筆明月夜光珊瑚輦路慎子名姓辯結字即髻字名字相同冠服不必反古袴制禱夢九鯉湖延篤挂名常侍碑隂坡公論畫竹坡公詩文佛字辨瘧病聖人大麓辨經與𫝊各行三字名辨論語㣲子第二王名字之謬針砭藥餌冦萊奢儉不同觔斗劉表工書有餘不足水銀焦仲卿妻夏世最文字學之難班固賦用騶虞翡翠屑金服玉屑西方聖人辯齊鏄鐘銘鷫鸘花蕊夫人卷三八分𨽻楷辨丘明非姓左蚩尾誤作䲭障車文射䇿之制烏鬼之辨晁無咎能畫韓昌黎白太𫝊皆惑於服食男女兩體詠花不語滕王蛺蝶圖婦人自稱瓊奴宋紙背面皆可書衚衕骨肉相關給事中不宜稱黄門二千石五星聚婦人以父姓為名七均七始雲南荔枝習流文正美諡石奴茶用鹽薑白牯青奴秦法棄灰臧文仲至老稱詩樂府訛缺官吏不得受監臨飲食婦人裸撲為戯司馬光辭知制誥隂陽地理之説餐菊蘇子由制䇿差錯死而尸温古章奏皆手書黄六宗藩之盛燕脂粉妲己火浣布太𤣥濳虛楊用修妄改杜詩象天地止有三行衣冠以白為忌海月詩文必有所本餘丼子七七卷四圖書生剋雲列祀典附徐司馬議拜帖不古東坡前定佛經不真通家之稱莫愁李至有功名教假葬建文還京壇醮之始地下有世界周禮太司樂辨附徐司馬議帝王簮珠翠檮杌雞口牛後之誤晏安鴆毒之誤觷剒雕字窖養花木蘦苓字相通治亂甘苦黒白介雞欝鬯之辨虉字辨無亷耻做得尚書孔子采詩不及楚三十六奉朝請詞人用事惡獸為名佛不度女人上林羽獵二賦風流罪過佛經恐非西來大意仙書皆偽筆仙宦非共途陶淵明乞食道學可䕶短姜維母書天問可疑元㣲之詩元白皆無兒九歌禹娶四日即治水荆公不事修飾古今兩羿西北水田詩文顯白古奥古無騎字露觔廟辯儒釋不必相援宋玉招䰟二王書法丙午丁未老於宦途不能自引卷五蒼梧寄生酒螬可療目朱考亭妄評杜詩阮宣子歛錢為㛰帝王謚號元俗近古以詩句定人品滁地為南北要地樂律不講國初乘驢詩法淫亂之始婦女遭亂王導遺誅陶侃被誣青紙詔禄命家言司馬遷論五音改元州里難行漢昭烈顧命更漏學官邵堯夫不娶險字押韻世宗崇道教晉八伯燈夕蘇東坡寓惠韓昌黎登華山戴逵阮瞻邉韶孫叔敖寒食上墓設烏飯生兒詩以行呼社稷二氏太監雲竒女兒把子諸葛入蜀疑馮宿代韓昌黎筆觀日出入東漢碑文篆體獸名窮竒繡襦𫝊竒古装書法秦始皇年嵗婦人不宜稱姬五刑張徳釗書石本孝經生而有文在手戒臘受財産玉牒火葬蓴鱸牛頭阿旁鉅靈皇帝王梅竹宜瘠地藥樹監搜佛書可疑漢閏之誤婟嫪珠池烏寳石有生長子孫用祖宗樂骨董拾青紫種竹持齋卷六茶林逋樂府之誤書簡用死罪張楚王弼註利貞孔子責冉求王道王路夷齊不食周粟獬豸伯益之壽堯舜被誣鼻天子冡張生夢舜儒釋相通九言詩司馬温公之貧琴辨九河考龍涎香漢碑柴桑荔枝消摩擊壤以糟飼馬家里五大夫松芍藥握菽千文蘭香東方朔滑稽木棉朱提銀蜀漢不制樂分野古樂之亡無逸之誤周武王十三年伐紂河清酒在田之義古祀必卜人奴不庭星隕如雨燒酒汎茘枝龍蛇歌爛柯盗跖今𨽻藥箭弱翰馬汗血水利鱷魚呉復古漢劉熊碑夷齊考孔子姓氏癰疽瘠環王荆公不知詩精舍老人子無影卷七纂修恩賞看畫時知孤寒驢牽舩醴龍無髓不信夷齊扣馬頴師彈琴詩齋醮婦人在軍中磁器視草之義眼鏡不合時宜皮舩椽矢絹易虜首王勃千嵗歴赫胥氏曷字辨李虛中以疽死九還天門開在齊聞韶孔子不言樂譜系之學封禪能耐通老始學詩禮部韻易有小石五經皆有韻四民古琴火鈴祀孔子之始曽㸃鼓瑟乞燔石介七十䘮未葬帝王之後皆蠻夷文天祥考宫詞禹錫𤣥圭郭公顔謝優劣漢高祖尊母不尊父九州考誅少正卯郭汾陽二十四考辨薛居正子婦漢書古本墨璽印不施其親商之後獨盛於夏周几黄山谷不言命梧桐自生書經今文古文拆字法石介不能書疑耀原序萬厯己亥歳卓吾先生藏書出一時士大夫翕然醉心無論通邑大都即窮鄊僻壤凡􅍾觚染翰之流靡不争搆殆急于水火菽粟也已既而焚書説書易因諸刻種種漸次播𫝊海内愈出愈竒不啻長安紙貴僉謂先生著述無遺矣曩余在青衿時嚮慕先生當代羽儀負笈數千里修謁先生之門庶幾幸拾咳唾不謂甫再見遂倒中郎之屣及侍函丈有日廼褏一編見示屬以訂正初矍然懼旣躍然喜私念曰余果有當于先生者耶及門者多矣胡不他屬而我屬也再拜而受至于莊誦竟業廼見上遡黄虞近該昭代大而經史細及禆官四始之宗三倉之學禮樂畢踪經綸咸貫拯二氏之沈冥覺九流之迷妄名物辯其異同輿論正其毁譽攄獨得之見决千載之疑猗歟盛哉所謂探賾索隠窮理盡性無過是編矣卷心七篇倣子輿氏題曰疑耀若以莊叟自居此先生之謙也余向以為枕中之寳然輕𫝊之而終秘之均非先生授書意也戊申歳余叨以地官分務吴㑹視事之暇檢之笥中登梓以廣其𫝊余知是編之行也王充之論衡譲其確應劭之風俗通讓其典班固之白虎通讓其辯蔡邕之獨斷讓其閎其他諸子𤨏猥勦襲徒足以騁談資于實際盖茫然已豈能窺先生之藩籬耶雖然非特超軼古人巳也即先生藏書諸集或專揚確古今或專研精訓詁至求上下骨徹天人㑹通亦當以是編為首出云張萱序
